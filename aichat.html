<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloudy Brain AI</title>
    <style>
        :root { --bg: #f5f7fa; --panel: #ffffff; --text: #1a1f36; --accent: #7c3aed; --bot-msg: #f1f5f9; --user-msg: #7c3aed; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .chat-container { width: 100%; max-width: 500px; height: 85vh; background: var(--panel); border-radius: 1.5rem; display: flex; flex-direction: column; box-shadow: 0 10px 25px rgba(0,0,0,0.05); overflow: hidden; border: 1px solid #e2e8f0; }
        .header { padding: 1.2rem; background: #fff; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e2e8f0; }
        #chat-window { flex: 1; overflow-y: auto; padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; }
        .msg { max-width: 85%; padding: 0.8rem 1.2rem; border-radius: 1rem; line-height: 1.5; font-size: 0.95rem; }
        .bot { background: var(--bot-msg); align-self: flex-start; color: #334155; }
        .user { background: var(--user-msg); align-self: flex-end; color: white; }
        .input-area { padding: 1.2rem; display: flex; gap: 0.8rem; border-top: 1px solid #e2e8f0; }
        input { flex: 1; border: 1px solid #e2e8f0; border-radius: 0.8rem; padding: 0.8rem; outline: none; font-size: 1rem; }
        .btn { background: var(--accent); border: none; padding: 0.6rem 1.2rem; border-radius: 0.8rem; cursor: pointer; color: white; font-weight: bold; }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="header">
            <strong>CLOUDY BRAIN ☁️</strong>
            <button class="btn" style="background:#ef4444; font-size: 0.7rem;" onclick="document.getElementById('chat-window').innerHTML=''">Clear</button>
        </div>
        <div id="chat-window"></div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Ask Claude..." onkeypress="if(event.key==='Enter') askAI()">
            <button class="btn" onclick="askAI()">Send</button>
        </div>
    </div>

    <script>
        async function askAI() {
            const input = document.getElementById('userInput');
            const chat = document.getElementById('chat-window');
            if(!input.value.trim()) return;

            const userText = input.value;
            chat.innerHTML += `<div class="msg user">${userText}</div>`;
            const botMsgDiv = document.createElement('div');
            botMsgDiv.className = 'msg bot';
            botMsgDiv.innerText = 'Cloudy is thinking...';
            chat.appendChild(botMsgDiv);
            input.value = '';
            chat.scrollTop = chat.scrollHeight;

            try {
                // This connects to the free DuckDuckGo Claude bridge
                const response = await fetch("https://herokuapp.com", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ 
                        model: "claude-3-haiku", 
                        message: userText 
                    })
                });

                const data = await response.json();
                // If using the proxy bridge, the response is usually in data.reply
                botMsgDiv.innerText = data.reply || data.choices[0].message.content;
            } catch (e) {
                botMsgDiv.innerText = "Cloudy is sleeping. Try again in a second!";
                console.error(e);
            }
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
