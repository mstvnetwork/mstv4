<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>MSTV Network</title>

<link rel="icon" href="https://mstvnet.netlify.app/mstv-thumbnail.png">

<script defer src="./shaka.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>

html,body{
margin:0;
font-family:Arial,sans-serif;
background:#0F1115;
color:#fff;
}

/* HEADER */

.sticky-header{
position:sticky;
top:0;
z-index:1000;
background:#0F1115;
display:flex;
align-items:center;
justify-content:space-between;
padding:10px 15px;
box-shadow:0 3px 10px rgba(0,0,0,.6);
flex-wrap:wrap;
}

.brand{
display:flex;
align-items:center;
gap:10px;
}

.logo{
width:38px;
height:38px;
border-radius:8px;
}

.site-name{
font-weight:700;
font-size:18px;
color:#90EE90;
}

.tagline{
font-size:11px;
color:#aaa;
}

#search{
padding:8px 12px;
border-radius:20px;
border:none;
background:#1A1D20;
color:#fff;
width:160px;
}

/* PLAYER */

.player-sticky{
position:sticky;
top:65px;
z-index:900;
background:#0F1115;
display:flex;
flex-direction:column;
align-items:center;
padding-top:10px;
}

.player-container{
position:relative;
width:95%;
max-width:900px;
aspect-ratio:16/9;
background:#000;
border-radius:12px;
overflow:hidden;
}

video,iframe{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
border:none;
display:none;
}

#placeholder{
width:100%;
height:100%;
display:flex;
align-items:center;
justify-content:center;
font-size:60px;
color:#90EE90;
}

#loading{
display:none;
margin:10px;
}

#live-stamp{
position:absolute;
top:8px;
left:8px;
background:#E50914;
color:#fff;
font-size:11px;
padding:4px 8px;
border-radius:5px;
display:none;
}

/* CHANNELS */

.channels-section{
max-width:900px;
margin:auto;
margin-top:15px;
}

.channels-title{
margin-left:10px;
font-size:16px;
color:#ccc;
}

.channel-row{
display:flex;
overflow-x:auto;
gap:10px;
padding:10px;
scroll-behavior:smooth;
}

.channel-row::-webkit-scrollbar{
height:6px;
}

.channel-row::-webkit-scrollbar-thumb{
background:#333;
border-radius:5px;
}

.channel-card{
min-width:120px;
height:90px;
background:#1A1D20;
border-radius:10px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:6px;
cursor:pointer;
flex-shrink:0;
transition:.2s;
}

.channel-card:hover{
transform:scale(1.05);
box-shadow:0 5px 15px rgba(0,255,160,.3);
}

.channel-card img{
width:50px;
height:50px;
object-fit:contain;
}

/* hidden dropdown (logic only) */

#channel-select{
display:none;
}

</style>
</head>

<body>

<header class="sticky-header">

<div class="brand">
<img src="https://mstvnet.netlify.app/mstv-thumbnail.png" class="logo">
<div>
<div class="site-name">MSTV NETWORK</div>
<div class="tagline">Indian TV • Punjabi • Cricket</div>
</div>
</div>

<input id="search" placeholder="Search channel">

</header>

<section class="player-sticky">

<div id="loading">Loading...</div>

<div class="player-container">

<div id="placeholder">📺</div>

<video id="video-player" autoplay playsinline controls></video>

<iframe id="iframe-player"
sandbox="allow-scripts allow-same-origin allow-presentation"
allow="autoplay; encrypted-media; picture-in-picture"></iframe>

<div id="live-stamp">LIVE</div>

</div>

</section>

<section class="channels-section">

<h2 class="channels-title">Channels</h2>

<div id="channel-row" class="channel-row"></div>

</section>

<select id="channel-select"></select>

<script>

const select=document.getElementById("channel-select")
const video=document.getElementById("video-player")
const iframe=document.getElementById("iframe-player")
const placeholder=document.getElementById("placeholder")
const loader=document.getElementById("loading")
const liveStamp=document.getElementById("live-stamp")
const row=document.getElementById("channel-row")

const JSON_URL="./channels.json"

let channels=[]
let hls=null
let shakaPlayer=null

async function stopAll(){

loader.style.display="none"
liveStamp.style.display="none"

if(hls){hls.destroy();hls=null}
if(shakaPlayer){await shakaPlayer.destroy();shakaPlayer=null}

video.pause()
video.removeAttribute("src")
video.load()

iframe.removeAttribute("src")
iframe.src="about:blank"

video.style.display="none"
iframe.style.display="none"

placeholder.style.display="flex"

}

function renderDropdown(data){

channels=data
select.innerHTML=""

row.innerHTML=""

data.forEach((ch,i)=>{

const opt=document.createElement("option")
opt.value=i
opt.textContent=ch.name
select.appendChild(opt)

const card=document.createElement("div")
card.className="channel-card"

card.innerHTML=`
<img src="${ch.logo||''}" loading="lazy">
<div style="font-size:12px;text-align:center">${ch.name}</div>
`

card.onclick=()=>{
select.value=i
playChannel(i)
}

row.appendChild(card)

})

}

async function loadChannels(){

try{

const res=await fetch(JSON_URL,{cache:"force-cache"})
const data=await res.json()

renderDropdown(data)

}catch(e){

console.error("Channel load error",e)

}

}

async function playChannel(index){

const channel=channels[index]
if(!channel) return

await stopAll()

loader.style.display="block"
placeholder.style.display="none"

liveStamp.style.display=channel.isLive?"block":"none"

if(channel.type==="iframe"){

iframe.style.display="block"
iframe.src=channel.url
iframe.onload=()=>loader.style.display="none"

return

}

video.style.display="block"

const isHls=channel.type==="hls"||channel.url.includes(".m3u8")

if(isHls){

if(window.Hls && Hls.isSupported()){

hls=new Hls({enableWorker:true})

hls.loadSource(channel.url)
hls.attachMedia(video)

hls.on(Hls.Events.MANIFEST_PARSED,()=>video.play())

}

else if(video.canPlayType("application/vnd.apple.mpegurl")){

video.src=channel.url
video.play()

}

return

}

if(window.shaka && shaka.Player.isBrowserSupported()){

shaka.polyfill.installAll()

shakaPlayer=new shaka.Player(video)

try{

await shakaPlayer.load(channel.url)
video.play()

}catch(e){

console.error(e)

}

}

}

video.onplaying=()=>loader.style.display="none"

loadChannels()

const search=document.getElementById("search")

search.addEventListener("input",()=>{

const term=search.value.toLowerCase()

document.querySelectorAll(".channel-card").forEach(card=>{

card.style.display=
card.innerText.toLowerCase().includes(term)
?"flex"
:"none"

})

})

</script>

</body>
</html>
