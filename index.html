<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>Global Performance Player</title>
    
    <!-- 1. PRE-CONNECT: Speeds up external iframe handshakes -->
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <!-- DNS prefetch is a low-cost hint for other possible origins -->
    <link rel="dns-prefetch" href="https://www.googletagservices.com">

    <!-- 2. LIBRARIES -->
    <script src="shaka.js"></script>
    <script src="https://cdnjs.cloudflare.com"></script>

    <style>
        body { margin: 0; background: #111; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; }
        .player-container { position: relative; width: 100%; max-width: 800px; aspect-ratio: 16 / 9; background: #000; margin-top: 20px; overflow: hidden; }
        video, iframe { width: 100%; height: 100%; border: none; display: none; }
        #loader-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; align-items: center; justify-content: center; background: #000; z-index: 10; }
        .spinner { width: 45px; height: 45px; border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid #00d2ff; border-radius: 50%; animation: spin 0.6s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .controls { margin: 20px; width: 90%; max-width: 400px; position: relative; z-index: 20; }
        select { width: 100%; padding: 14px; border-radius: 8px; font-size: 16px; cursor: pointer; background: #222; color: #fff; border: 1px solid #444; }
    </style>
</head>
<body>

<div class="player-container">
    <div id="loader-overlay"><div class="spinner"></div></div>
    <!-- Removed loading="lazy" for maximum priority on click -->
    
    <video id="video-player" playsinline controls></video>
    <div id="placeholder" style="height:100%; display:flex; align-items:center; justify-content:center; color:#666;">📺 Select a channel</div>
</div>

<div class="controls">
    <select id="channel-select"><option value="">⌛ Initializing...</option></select>
</div>

<script>
    const select = document.getElementById('channel-select');
    const videoPlayer = document.getElementById('video-player');
    const iframePlayer = document.getElementById('iframe-player');
    const loader = document.getElementById('loader-overlay');
    
    // --- POINTED TO CHANNELS.JSON ---
    const JSON_URL = "./channels.json"; 

    let hlsInstance = null;
    let shakaInstance = null;
    let channelsData = [];

    // IFRAME-KILL: Wipes memory and stops background data session
    async function stopAll() {
        loader.style.display = 'none';
        if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
        if (shakaInstance) { await shakaInstance.destroy(); shakaInstance = null; }
        
        videoPlayer.pause();
        videoPlayer.removeAttribute('src'); 
        videoPlayer.load(); 
        
        // Force-kill the iframe portal to save 3G/4G bandwidth
        iframePlayer.removeAttribute('src');
        iframePlayer.src = "about:blank"; 
        
        videoPlayer.style.display = 'none';
        iframePlayer.style.display = 'none';
        document.getElementById('placeholder').style.display = 'none';
    }

    function renderDropdown(data) {
        channelsData = data;
        select.innerHTML = '<option value="">👉📺 Click & Select Channel</option>';
        data.forEach((ch, i) => {
            const opt = document.createElement('option');
            opt.value = i;
            opt.textContent = ch.name;
            select.appendChild(opt);
        });
    }

    async function loadChannels() {
        const cached = localStorage.getItem('channels_cache');
        if (cached) renderDropdown(JSON.parse(cached));
        try {
            const res = await fetch(JSON_URL);
            if (!res.ok) throw new Error("List not found");
            const data = await res.json();
            localStorage.setItem('channels_cache', JSON.stringify(data));
            renderDropdown(data);
        } catch (e) { console.error(e); }
    }

    async function playChannel(index) {
        const channel = channelsData[index];
        if (!channel) return;
        await stopAll();
        loader.style.display = 'flex';

        if (channel.type === 'iframe') {
            iframePlayer.style.display = 'block';
            // Setting src starts the pre-connected handshake
            iframePlayer.src = channel.url;
            iframePlayer.onload = () => { loader.style.display = 'none'; };
        } else {
            videoPlayer.style.display = 'block';
            const isHls = channel.type === 'hls' || channel.url.includes('.m3u8');

            if (isHls && typeof Hls !== 'undefined' && Hls.isSupported()) {
                hlsInstance = new Hls({ startLevel: 0, enableWorker: false });
                hlsInstance.loadSource(channel.url);
                hlsInstance.attachMedia(videoPlayer);
                hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => videoPlayer.play());
            } else if (typeof shaka !== 'undefined' && shaka.Player.isBrowserSupported()) {
                shaka.polyfill.installAll();
                shakaInstance = new shaka.Player();
                await shakaInstance.attach(videoPlayer);
                shakaInstance.configure({ streaming: { rebufferingGoal: 1 } });
                try { await shakaInstance.load(channel.url); videoPlayer.play(); } 
                catch (e) { loader.style.display = 'none'; }
            }
        }
    }

    select.onchange = () => { if(select.value !== "") playChannel(select.value); };
    videoPlayer.onplaying = () => { loader.style.display = 'none'; };
    loadChannels();
</script>
</body>
</html>
