<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSTV Network Player</title>
    <style>
        body { background: #111; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; margin: 0; padding: 20px; }
        #player-container { width: 90%; max-width: 1000px; margin: 20px auto; aspect-ratio: 16/9; background: #000; border: 2px solid #333; border-radius: 8px; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; }
        .epg-bar { background: #222; padding: 20px; width: 90%; max-width: 1000px; margin: 0 auto; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .live { color: #ff4545; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        #now-playing { font-size: 1.4em; margin-bottom: 10px; }
        #next-up { color: #aaa; font-size: 1em; border-top: 1px solid #333; padding-top: 10px; }
        .debug-info { margin-top: 20px; font-size: 0.8em; color: #666; }
    </style>
</head>
<body>

    <div id="player-container">
        <iframe id="main-player" src="" allow="autoplay; fullscreen" allowfullscreen></iframe>
    </div>

    <div class="epg-bar">
        <div id="now-playing"><span class="live">Status:</span> Loading Schedule...</div>
        <div id="next-up">Next: Checking...</div>
    </div>

    <div class="debug-info">
        System Time: <span id="current-time-display">--:--:--</span> | 
        Last Update: <span id="last-update">Never</span>
    </div>
<script>
    // FIXED URL: Includes the full path PLUS the cache-buster
    const jsonUrl = 'https://raw.githubusercontent.com' + new Date().getTime();
    let currentActiveUrl = "";

    async function updatePlayer() {
        try {
            const response = await fetch(jsonUrl);
            if (!response.ok) throw new Error("File not found on GitHub");
            
            const schedule = await response.json();
            const now = new Date();
            
            document.getElementById('current-time-display').innerText = now.toLocaleTimeString();

            let currentIndex = schedule.findIndex(item => {
                const startTime = new Date(item.start);
                const endTime = new Date(item.end);
                return now >= startTime && now < endTime;
            });

            if (currentIndex !== -1) {
                const currentShow = schedule[currentIndex];
                const nextShow = schedule[currentIndex + 1] || { title: "End of Programming" };

                const player = document.getElementById('main-player');
                if (currentActiveUrl !== currentShow.url) {
                    player.src = currentShow.url;
                    currentActiveUrl = currentShow.url;
                }

                document.getElementById('now-playing').innerHTML = `<span class="live">● LIVE:</span> ${currentShow.title}`;
                document.getElementById('next-up').innerHTML = `UP NEXT: ${nextShow.title}`;
            } else {
                document.getElementById('now-playing').innerHTML = `<span style="color:gray">OFF AIR</span>`;
                document.getElementById('next-up').innerText = "No show scheduled.";
                document.getElementById('main-player').src = ""; 
                currentActiveUrl = "";
            }

            document.getElementById('last-update').innerText = now.toLocaleTimeString();

        } catch (err) {
            console.error("Fetch Error:", err);
            document.getElementById('now-playing').innerText = "Connection Error. Check console.";
        }
    }

    updatePlayer();
    setInterval(updatePlayer, 10000); 
</script>

</body>
</html>
