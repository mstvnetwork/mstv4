<!DOCTYPE html>
<html>
<head>
    <style>
        :root { --primary: #00ffA0; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; }

        .viewport {
            width: 90vw; max-width: 1000px; aspect-ratio: 16 / 9; 
            overflow: hidden; position: relative;
            border: 4px solid var(--primary); border-radius: 12px;
            background: #000;
        }

        #captureFrame {
            position: absolute;
            width: 130%; height: 150%; 
            top: -30px; left: -15%; 
            border: none;
            /* Allow clicks initially so you can select the device */
            pointer-events: auto; 
            z-index: 1;
        }

        /* The Lock Layer starts INVISIBLE and NON-BLOCKING */
        #lockLayer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10;
            background: rgba(0,0,0,0);
            display: none; /* Hidden until video starts */
        }

        .start-prompt {
            position: absolute;
            z-index: 20;
            color: #fff;
            font-family: sans-serif;
            background: rgba(0,255,160,0.2);
            padding: 15px 30px;
            border: 2px solid var(--primary);
            border-radius: 50px;
            cursor: pointer;
            pointer-events: none; /* Let the click go through this text to the iframe below */
        }
    </style>
</head>
<body>

    <div class="viewport" id="mainContainer">
       
        <!-- The actual invisible shield that will activate later -->
        <div id="lockLayer"></div>

        <iframe id="captureFrame" 
                src="https://tplay.live" 
                scrolling="no" 
                sandbox="allow-forms allow-scripts allow-same-origin">
        </iframe>
    </div>

    <script>
        const container = document.getElementById('mainContainer');
        const lockLayer = document.getElementById('lockLayer');
        const prompt = document.getElementById('prompt');

        // Logic: When the user clicks anywhere in the container...
        container.addEventListener('click', function() {
            // 1. Hide the prompt text
            prompt.style.display = 'none';

            // 2. Wait 2 seconds (time for the device selection to process)
            // Then activate the 'lock' so they can't change channels
            setTimeout(() => {
                lockLayer.style.display = 'block';
                console.log("Controls Locked.");
            }, 2000); 
        });
    </script>

</body>
</html>
