<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:,">

    <title>Global Performance Player</title>
    
    <!-- 1. CORRECT LIBRARIES -->
    <script src="shaka.js"></script> <!-- Local Shaka -->
    <script src="https://cdn.jsdelivr.net"></script> <!-- HLS Fallback -->

    <style>
        body { margin: 0; background: #111; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; }
        .player-container { position: relative; width: 100%; max-width: 800px; aspect-ratio: 16 / 9; background: #000; margin-top: 20px; }
        video, iframe { width: 100%; height: 100%; border: none; display: none; }
        #loader-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; align-items: center; justify-content: center; background: rgba(0,0,0,0.7); z-index: 10; }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.2); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .controls { margin: 20px; width: 90%; max-width: 400px; }
        select { width: 100%; padding: 12px; border-radius: 8px; font-size: 16px; cursor: pointer; background: #222; color: #fff; }
    </style>
</head>
<body>

<div class="player-container">
    <div id="loader-overlay"><div class="spinner"></div></div>
    <!-- Allow attribute is CRITICAL for iframes to play encrypted or autoplaying video -->
    <iframe id="iframe-player" allow="autoplay; encrypted-media; fullscreen; picture-in-picture" allowfullscreen></iframe>
    <video id="video-player" playsinline controls></video>
    <div id="placeholder" style="height:100%; display:flex; align-items:center; justify-content:center;">Select a channel</div>
</div>

<div class="controls">
    <select id="channel-select"><option value="">⌛ Loading...</option></select>
</div>

<script>
    const select = document.getElementById('channel-select');
    const videoPlayer = document.getElementById('video-player');
    const iframePlayer = document.getElementById('iframe-player');
    const loader = document.getElementById('loader-overlay');
    const placeholder = document.getElementById('placeholder');
    
    let shakaInstance = null;
    let hlsInstance = null;

    function toggleLoader(show) { loader.style.display = show ? 'flex' : 'none'; }

    // --- CHANNEL LOADING ---
    async function loadChannels() {
        const cached = localStorage.getItem('channels_cache');
        if (cached) renderDropdown(JSON.parse(cached));

        try {
            const res = await fetch("./channels.json");
            const data = await res.json();
            localStorage.setItem('channels_cache', JSON.stringify(data));
            renderDropdown(data);
        } catch (e) { console.error("JSON Error", e); }
    }

    function renderDropdown(data) {
        window.channelsData = data; // Crucial for global access
        select.innerHTML = '<option value="">👉📺 Select Channel</option>';
        data.forEach((ch, i) => {
            const opt = document.createElement('option');
            opt.value = i;
            opt.textContent = ch.name;
            select.appendChild(opt);
        });
    }

    async function stopAll() {
    clearTimeout(retryTimer);
    
    // 1. Kill Shaka Instance immediately
    if (shakaInstance) {
        try {
            await shakaInstance.detach(); // Detach from video element first
            await shakaInstance.destroy(); 
        } catch (e) { console.error("Shaka destroy error", e); }
        shakaInstance = null;
    }

    // 2. Kill HLS.js Instance immediately
    if (hlsInstance) {
        hlsInstance.stopLoad(); // Stop downloading segments NOW
        hlsInstance.detachMedia();
        hlsInstance.destroy();
        hlsInstance = null;
    }

    // 3. HARD RESET the video element to clear the buffer
    videoPlayer.pause();
    videoPlayer.removeAttribute('src'); // Removes the ghost link
    videoPlayer.load(); // Forces the browser to flush the video memory
    
    // 4. UI Reset
    videoPlayer.style.display = 'none';
    iframePlayer.src = "";
    iframePlayer.style.display = 'none';
    liveStamp.style.display = 'none';
}


    async function playChannel(index) {
        const channel = window.channelsData[index];
        if (!channel) return;

        await stopAll();
        toggleLoader(true);

        // 1. IFRAME CHANNELS
        if (channel.type === 'iframe') {
            iframePlayer.style.display = 'block';
            iframePlayer.src = channel.url;
            toggleLoader(false);
            return;
        }

        // 2. VIDEO CHANNELS (HLS/SHAKA)
        videoPlayer.style.display = 'block';

        if (shaka.Player.isBrowserSupported()) {
            shaka.polyfill.installAll();
            shakaInstance = new shaka.Player(videoPlayer);
            shakaInstance.configure({
                abr: { defaultBandwidthEstimate: 500000 },
                streaming: { rebufferingGoal: 2, bufferingGoal: 10 }
            });

            try {
                await shakaInstance.load(channel.url);
                toggleLoader(false);
            } catch (e) {
                console.error("Shaka failed, trying HLS.js", e);
                tryHls(channel.url);
            }
        } else {
            tryHls(channel.url);
        }
    }

    function tryHls(url) {
        if (Hls.isSupported()) {
            hlsInstance = new Hls({ startLevel: 0 });
            hlsInstance.loadSource(url);
            hlsInstance.attachMedia(videoPlayer);
            hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
                videoPlayer.play();
                toggleLoader(false);
            });
        }
    }

    select.onchange = () => { if(select.value !== "") playChannel(select.value); };
    loadChannels();
</script>

</body>
</html>
