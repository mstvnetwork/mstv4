<!DOCTYPE html>
<html>
<head>
    <style>
        /* Base page styling */
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; display: flex; align-items: center; justify-content: center; }

        /* This matches the dimensions you provided for your player-container */
        .player-container { 
            position: relative; 
            width: 90%; 
            max-width: 900px; 
            aspect-ratio: 16/9; 
            background: linear-gradient(135deg,#141618,#1A1D20); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border-radius: 15px; 
            box-shadow: 0 8px 25px rgba(0,255,160,0.2); 
            overflow: hidden; 
        }

        /* 
           FIXED IFRAME: 
           Removed the negative 'top' and 'left' values. 
           Using width/height: 100% so it fills the 16:9 container perfectly.
        */
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 15px;
            /* Prevents distortion */
            object-fit: contain; 
        }
    </style>
</head>
<body>
    <div class="player-container">
        <iframe src="https://tplay.live" 
                sandbox="allow-forms allow-scripts allow-same-origin"
                allow="autoplay; encrypted-media; fullscreen"
                scrolling="no">
        </iframe>
    </div>
</body>
</html>
