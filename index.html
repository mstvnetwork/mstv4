<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MSTV Network | Live TV</title>
    
    <!-- Player Libraries -->
    <script defer src="./shaka.js"></script>
    <script defer src="https://cdn.jsdelivr.net"></script>

    <style>
        /* 1. Reset & Global Layout */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { 
            margin: 0; padding: 0; height: 100%; width: 100%;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: #0F1115; color: #E0E0E0;
            display: flex; flex-direction: column; overflow: hidden; 
        }

        /* 2. Sticky Header */
        .sticky-header {
            position: sticky; top: 0; z-index: 1000;
            background: #1A1D20; padding: 10px 15px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 2px solid #00FFA3;
            height: 70px; flex-shrink: 0;
        }
        .brand { display: flex; flex-direction: column; }
        .logo-title { 
            font-size: 1.4rem; font-weight: 800; line-height: 1;
            background: linear-gradient(90deg, #90EE90, #00FFA3); 
            -webkit-background-clip: text; color: transparent; 
        }
        .slogan { font-size: 0.65rem; color: #777; margin-top: 4px; text-transform: uppercase; letter-spacing: 1px; }
        
        .search-bar { width: 45%; max-width: 250px; }
        .search-bar input {
            width: 100%; padding: 10px 15px; border-radius: 20px;
            border: 1px solid #333; background: #0F1115; color: #00FFA3; outline: none;
        }

        /* 3. Sticky Player Section */
        .sticky-player-section {
            position: sticky; top: 70px; z-index: 900;
            background: #0F1115; padding: 10px 0;
            flex-shrink: 0; width: 100%;
            display: flex; flex-direction: column; align-items: center;
        }
        .player-container { 
            width: 95%; max-width: 850px; aspect-ratio: 16/9; 
            background: #000; border-radius: 12px; position: relative;
            overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        video, iframe { width: 100%; height: 100%; border: none; position: absolute; top: 0; left: 0; }
        #placeholder { height: 100%; display: flex; align-items: center; justify-content: center; font-size: 4rem; }
        #loading { position: absolute; z-index: 10; background: rgba(0,0,0,0.7); width: 100%; height: 100%; display: none; align-items: center; justify-content: center; color: #00FFA3; }
        #live-stamp { position: absolute; top: 10px; left: 10px; background: #FF0000; color: white; padding: 4px 10px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; z-index: 20; display: none;}

        /* 4. Scrollable Footer (Channel List) */
        .scrollable-footer {
            flex-grow: 1; overflow-y: auto;
            padding: 15px; background: #141618;
            border-top: 1px solid #222;
        }
        .channel-grid {
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 12px; padding-bottom: 20px;
        }
        .channel-card {
            background: #1A1D20; border-radius: 10px; padding: 15px 5px;
            text-align: center; cursor: pointer; border: 1px solid #222;
            transition: all 0.25s ease; font-size: 0.85rem; font-weight: 500;
        }
        .channel-card:hover {
            background: #25282c; border-color: #00FFA3;
            transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0,255,163,0.15);
        }
        .channel-card.active { border-color: #00FFA3; background: rgba(0, 255, 163, 0.05); }

        /* Responsive */
        @media (max-width: 480px) {
            .logo-title { font-size: 1.1rem; }
            .slogan { display: none; }
            .channel-grid { grid-template-columns: repeat(3, 1fr); }
        }
    </style>
</head>
<body>

    <header class="sticky-header">
        <div class="brand">
            <div class="logo-title">MSTV NETWORK</div>
            <span class="slogan">Premium Live Streaming</span>
        </div>
        <div class="search-bar">
            <input type="text" id="channel-search" placeholder="Find Channel...">
        </div>
    </header>

    <section class="sticky-player-section">
        <div class="player-container">
            <div id="loading">🌀 Loading...</div>
            <div id="placeholder">📺</div>
            <video id="video-player" autoplay playsinline controls style="display:none;"></video>
            <iframe id="iframe-player" style="display:none;" sandbox="allow-scripts allow-same-origin" allow="autoplay"></iframe>
            <div id="live-stamp">LIVE</div>
        </div>
    </section>

    <footer class="scrollable-footer">
        <div class="channel-grid" id="channel-list">
            <!-- Cards generated by JS -->
        </div>
    </footer>

<script>
    const video = document.getElementById('video-player');
    const iframe = document.getElementById('iframe-player');
    const placeholder = document.getElementById('placeholder');
    const loader = document.getElementById('loading');
    const liveStamp = document.getElementById('live-stamp');
    const channelList = document.getElementById('channel-list');
    const searchInput = document.getElementById('channel-search');
    
    const JSON_URL = './channels.json';
    let channels = [];
    let hls = null;
    let shakaPlayer = null;

    async function stopAll() {
        loader.style.display = 'none';
        liveStamp.style.display = 'none';
        if(hls){ hls.destroy(); hls = null; }
        if(shakaPlayer){ await shakaPlayer.destroy(); shakaPlayer = null; }
        video.pause(); video.src = ""; video.load();
        iframe.src = "about:blank";
        video.style.display = 'none'; iframe.style.display = 'none';
        placeholder.style.display = 'flex';
    }

    function renderChannels(data) {
        channelList.innerHTML = '';
        data.forEach((ch, i) => {
            const card = document.createElement('div');
            card.className = 'channel-card';
            card.innerHTML = `<div>${ch.name}</div>`;
            card.onclick = () => {
                document.querySelectorAll('.channel-card').forEach(c => c.classList.remove('active'));
                card.classList.add('active');
                playChannel(ch);
            };
            channelList.appendChild(card);
        });
    }

    async function playChannel(channel) {
        await stopAll();
        loader.style.display = 'flex';
        placeholder.style.display = 'none';
        if(channel.isLive) liveStamp.style.display = 'block';

        if(channel.type === 'iframe') {
            iframe.style.display = 'block';
            iframe.src = channel.url;
            iframe.onload = () => loader.style.display = 'none';
            return;
        }

        video.style.display = 'block';
        const isHls = channel.type === 'hls' || channel.url.includes('.m3u8');

        if(isHls) {
            if(window.Hls && Hls.isSupported()) {
                hls = new Hls();
                hls.loadSource(channel.url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
            } else {
                video.src = channel.url;
                video.play();
            }
        } else if(window.shaka && shaka.Player.isBrowserSupported()) {
            shaka.polyfill.installAll();
            shakaPlayer = new shaka.Player(video);
            try { await shakaPlayer.load(channel.url); video.play(); } catch(e) { console.error(e); }
        }
    }

    video.onplaying = () => loader.style.display = 'none';

    // Search functionality
    searchInput.oninput = (e) => {
        const term = e.target.value.toLowerCase();
        const filtered = channels.filter(ch => ch.name.toLowerCase().includes(term));
        renderChannels(filtered);
    };

    async function init() {
        try {
            const res = await fetch(JSON_URL);
            channels = await res.json();
            renderChannels(channels);
        } catch(e) { console.error("Load failed", e); }
    }

    init();
</script>
</body>
</html>
