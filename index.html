<!DOCTYPE html>
<html>
<head>
    <style>
        /* Container to crop out YouTube UI */
        .player-wrapper {
            position: relative;
            width: 100%;
            max-width: 800px;
            aspect-ratio: 16 / 9;
            overflow: hidden;
            background: #000;
        }

        /* Scaled iframe to hide the Title and Logo */
        #yt-iframe {
            position: absolute;
            top: -12%; 
            left: -5%;
            width: 110%;
            height: 124%;
            border: 0;
            pointer-events: none; /* Prevents user from clicking/pausing the video */
        }

        /* Custom Unmute Button Overlay */
        .unmute-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            padding: 10px 15px;
            background: rgba(255, 255, 255, 0.9);
            color: #000;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-family: sans-serif;
            font-weight: bold;
            z-index: 100;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

<div class="player-wrapper">
    <!-- enablejsapi=1 is required to control the video with our button -->
    <iframe 
        id="yt-iframe"
        src="https://www.youtube.com/embed/KMWcefrAKLg?si=zTCOpmIeQOL_mc3q" 
        allow="autoplay; encrypted-media">
    </iframe>

    <!-- Custom Button -->
    <button class="unmute-btn" id="unmuteTrigger" onclick="unmuteVideo()">UNMUTE 🔊</button>
</div>

<script>
    function unmuteVideo() {
        var iframe = document.getElementById('yt-iframe');
        
        // This sends a command directly into the YouTube iframe to unmute
        iframe.contentWindow.postMessage('{"event":"command","func":"unMute","args":""}', '*');
        
        // Hide the button after unmuting
        document.getElementById('unmuteTrigger').style.display = 'none';
    }
</script>

</body>
</html>
