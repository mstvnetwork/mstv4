<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MSNET Cinema Mode</title>
    <style>
        :root { --red: #ff0000; --bg: #000; --card: #111; --text: #eee; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { height: 100%; width: 100%; background: var(--bg); color: var(--text); font-family: sans-serif; overflow: hidden; }

        /* The Container must be relative so the overlay can be absolute to IT */
        .player-wrapper { 
            position: relative; 
            width: 100vw; 
            height: 56.25vw; 
            background: #000; 
            z-index: 1;
        }

        #videoPlayer { width: 100%; height: 100%; border: none; display: block; }

        /* THE SHIELD: This is what blocks the controls */
        #silentLockOverlay { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            z-index: 9999; /* Highest priority */
            pointer-events: none; /* Initially off */
            background: rgba(0,0,0,0);
        }

        .ui-section { padding: 15px; height: 40vh; }
        .card { background: var(--card); padding: 15px; border-radius: 8px; border-left: 4px solid var(--red); display: flex; align-items: center; gap: 12px; }
        .dot { height: 8px; width: 8px; background: var(--red); border-radius: 50%; display: inline-block; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
        .progress-bg { width: 100%; height: 4px; background: #333; margin-top: 10px; }
        #progress-fill { height: 100%; background: var(--red); width: 0%; }

        /* Forced Landscape Mode */
        @media (orientation: landscape) {
            .player-wrapper { height: 100vh; width: 100vw; position: fixed; top: 0; left: 0; }
            .ui-section { display: none; }
        }

        #browser-error { display: none; height: 100vh; align-items: center; justify-content: center; text-align: center; }
    </style>
</head>
<body>

<div id="browser-error"><h1>CHROME REQUIRED</h1></div>

<div id="app-content">
    <div class="player-wrapper">
        <iframe id="videoPlayer" sandbox="allow-scripts allow-same-origin allow-forms allow-presentation" allow="autoplay; fullscreen" playsinline></iframe>
        <div id="silentLockOverlay"></div>
    </div>

    <div class="ui-section">
        <div class="card">
            <div style="flex: 1;">
                <div style="font-weight: bold;"><span class="dot"></span> <span id="title">Loading...</span></div>
                <div id="time-range" style="font-size: 0.8rem; color: #888; margin-top: 5px;">--:--</div>
                <div class="progress-bg"><div id="progress-fill"></div></div>
            </div>
        </div>
        <p style="margin-top: 15px; font-size: 0.8rem; color: #444;">UP NEXT: <span id="next-time">--:--</span></p>
    </div>
</div>

<script>
    const GITHUB_JSON = "https://raw.githubusercontent.com/mstvnetwork/mstv4/main/schedule.json";
    let schedule = [];
    let lockTimer;
    const lockOverlay = document.getElementById('silentLockOverlay');

    function isStrictChrome() {
        const ua = navigator.userAgent;
        return (ua.indexOf("Chrome") > -1 || ua.indexOf("CriOS") > -1) && 
               !(ua.indexOf("Edg") > -1 || ua.indexOf("SamsungBrowser") > -1 || ua.indexOf("OPR") > -1);
    }

    async function sync() {
        try {
            const r = await fetch(GITHUB_JSON + "?v=" + Date.now());
            const d = await r.json();
            schedule = Array.isArray(d) ? d : d.schedule;
            refresh();
        } catch(e) { console.error(e); }
    }

    function refresh() {
        if (!schedule.length) return;
        const now = new Date();
        const timeStr = now.getHours().toString().padStart(2, '0') + ":" + 
                        now.getMinutes().toString().padStart(2, '0');

        let show = schedule.find(s => timeStr >= s.start && timeStr < s.end) || schedule;
        const player = document.getElementById('videoPlayer');

        // IF NEW SHOW STARTS
        if (player.src !== show.url) {
            player.src = show.url;

            // RESET LOCK (Exactly like your original logic)
            clearTimeout(lockTimer);
            lockOverlay.style.pointerEvents = 'none'; 
            console.log("Unlocked for 40s");

            lockTimer = setTimeout(() => {
                lockOverlay.style.pointerEvents = 'auto';
                console.log("Locked - Interaction Disabled");
            }, 40000); 
        }

        // Update UI
        document.getElementById('title').innerText = show.title;
        document.getElementById('time-range').innerText = `${show.start} - ${show.end}`;
        
        // Progress Logic
        const [sh, sm] = show.start.split(':').map(Number);
        const [eh, em] = show.end.split(':').map(Number);
        let sM = sh * 60 + sm;
        let eM = eh * 60 + em;
        if (eM < sM) eM += 1440;
        const pct = ((now.getHours() * 60 + now.getMinutes() - sM) / (eM - sM)) * 100;
        document.getElementById('progress-fill').style.width = Math.min(100, Math.max(0, pct)) + "%";

        const nIdx = (schedule.indexOf(show) + 1) % schedule.length;
        document.getElementById('next-time').innerText = schedule[nIdx].start;
    }

    if (isStrictChrome()) {
        sync();
        setInterval(sync, 30000);
    } else {
        document.getElementById('app-content').style.display = 'none';
        document.getElementById('browser-error').style.display = 'flex';
    }
</script>
</body>
</html>
