        // --- 2. THE PLAYER ENGINE ---
        async function initPlayer() {
            const video = document.getElementById('video');
            const badge = document.getElementById('engine-badge');
            const player = new shaka.Player(video);

            // Configure Player
            player.configure({
                streaming: { rebufferingGoal: 1, bufferingGoal: 5, lowLatencyMode: true },
                manifest: { dash: { autoCorrectDrift: true } }
            });

            // Get channel from URL #
            const hash = window.location.hash.substring(1);
            let index = (parseInt(hash, 10) || 1) - 1;
            const stream = streamList[index] || streamList[0];

            badge.innerText = `ENGINE: ${stream.type.toUpperCase()} | ${stream.name}`;

            if (stream.type === "dash" && stream.drm) {
                player.configure({ drm: { clearKeys: stream.drm } });
            }

            try {
                await player.load(stream.url);
            } catch (e) {
                badge.innerText = "STREAM ERROR";
                badge.style.color = "red";
            }
        }

        // --- 3. BULLETPROOF SCRIPT LOADER ---
        function loadScript(url) {
            return new Promise((resolve, reject) => {
                const s = document.createElement('script');
                s.src = url;
                s.onload = resolve;
                s.onerror = () => reject(`Failed to load: ${url}`);
                document.head.appendChild(s);
            });
        }

        async function startApp() {
            const badge = document.getElementById('engine-badge');
            try {
                // Load Mux first, then Shaka
                await loadScript("https://cdn.jsdelivr.net");
                await loadScript("https://cdn.jsdelivr.net");
                
                shaka.polyfill.installAll();
                if (shaka.Player.isBrowserSupported()) {
                    initPlayer();
                } else {
                    badge.innerText = "BROWSER NOT SUPPORTED";
                }
            } catch (err) {
                badge.innerText = "CDN BLOCKED - CHECK INTERNET";
                badge.style.color = "red";
                console.error(err);
            }
        }

        window.addEventListener('hashchange', () => window.location.reload());
        window.onload = startApp;
