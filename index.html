  :root { --accent: #00FFA3; --bg: #0F1115; --card: #1A1D22; }
  body { 
    margin: 0; background: var(--bg); color: #fff; font-family: system-ui, sans-serif;

  /* Sticky Player Area */

  }

  /* NEW: Placeholder Text */

  }

  /* FIX: Obscured List - sidebar remains scrollable */
  #sidebar { 
    flex: 1; overflow-y: auto; padding: 15px; 
    overscroll-behavior: contain; -webkit-overflow-scrolling: touch;
  }
  /* Optional: Header inside the scroll area */
  .sidebar-header { padding-bottom: 15px; font-size: 1.3rem; color: #555; text-transform: uppercase; font-weight: bold; }

  .channel-card { 
    display: flex; align-items: center; padding: 12px; margin-bottom: 10px; 
    background: var(--card); border-radius: 12px; cursor: pointer; transition: 0.2s;
  }
  .channel-card.active { border: 1px solid var(--accent); background: #252A31; }

  #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10; display: none; color: var(--accent); font-weight: bold; }
</style>


<body>
   

<div class="title">MSTV NETWORK</div>
<h1>MSTV Network – Watch Indian, Punjabi & Religious TV Channels Live</h1>
<div id="main-view">
    <div class="player-container">
        <!-- Placeholder - disappears on play -->
        <div id="player-placeholder">
    <div style="font-size: 5rem; margin-bottom: 10px; filter: drop-shadow(0 0 10px rgba(0,255,163,0.3));">📺</div>
    <span style="letter-spacing: 1px; font-weight: 500; opacity: 0.8;">Select a channel to start streaming</span>
</div>

        
        <div id="loading">⚡ Loading...</div>
        <video id="video-player" autoplay playsinline controls></video>
        <iframe id="iframe-player" allow="autoplay; encrypted-media"></iframe>
    </div>
    <div class="channel-details">
        <h1 id="display-name" style="font-size: 1.1rem; margin:0; color:var(--accent);"></h1>
    </div>
</div>

<div id="sidebar">
    <div class="sidebar-header">📲 Scroll ⬆️⬇️</div>
    <div id="channel-list"></div>
</div>

            <script>
const video = document.getElementById('video-player');
const iframe = document.getElementById('iframe-player');
const loader = document.getElementById('loading');
const placeholder = document.getElementById('player-placeholder');
const displayName = document.getElementById('display-name');

let channels = [], hls = null, shakaPlayer = null;

async function stopAll() {
    loader.style.display = 'none';
    if(hls){ hls.destroy(); hls = null; }
    if(shakaPlayer){ await shakaPlayer.destroy(); shakaPlayer = null; }
    video.pause();
    video.src = "";
    video.load();
    iframe.src = 'about:blank';
    video.style.display = 'none';
    iframe.style.display = 'none';
}

async function playChannel(index) {
    const ch = channels[index];
    await stopAll();
    
    // Hide placeholder & show loader
    placeholder.style.display = 'none';
    loader.style.display = 'block';
    displayName.textContent = ch.name;

    const isHls = ch.url.includes('.m3u8') || ch.type === 'hls';
    const isDash = ch.url.includes('.mpd') || ch.type === 'dash';

    if (ch.type === 'iframe') {
        iframe.style.display = 'block';
        iframe.src = ch.url;
        iframe.onload = () => loader.style.display = 'none';
        return;
    }

    video.style.display = 'block';
    if (isHls) {
        // HLS.js logic (Fast Start)
        if (window.Hls && Hls.isSupported()) {
            hls = new Hls({ capLevelToPlayerSize: true, startLevel: 0, enableWorker: true });
            hls.loadSource(ch.url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
        } else { video.src = ch.url; video.play(); }
    } else if (isDash) {
        // SHAKA strictly for .mpd
        if (window.shaka && shaka.Player.isBrowserSupported()) {
            shaka.polyfill.installAll();
            shakaPlayer = new shaka.Player(video);
            shakaPlayer.configure({ streaming: { rebufferingGoal: 1, bufferingGoal: 4, lowLatencyMode: true } });
            try { await shakaPlayer.load(ch.url); video.play(); } catch(e) { console.error(e); }
        }
    }
}

// Hide loader when video actually starts playing
video.onplaying = () => loader.style.display = 'none';

function renderSidebar(data) {
    channels = data;
    const list = document.getElementById('channel-list');
    list.innerHTML = ''; // Clear to prevent duplicates on refresh
    data.forEach((ch, i) => {
        const card = document.createElement("div");
        card.className = "channel-card";
        // SPEED FIX: Use a default icon if logo is missing to prevent layout shift
        const logoSrc = ch.logo || 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=';
        card.innerHTML = `<img src="${logoSrc}" loading="lazy"><div class="name">${ch.name}</div>`;
        card.onclick = () => {
            // Smoothly jump back to player on mobile when a channel is picked
            window.scrollTo({top: 0, behavior: 'smooth'}); 
            document.querySelectorAll('.channel-card').forEach(c => c.classList.remove('active'));
            card.classList.add('active');
            playChannel(i);
        };
        list.appendChild(card);
    });

    // Append the SEO Footer AFTER the list is loaded
    const footer = document.createElement('footer');
    footer.style.cssText = "padding: 30px 15px; border-top: 1px solid #222; margin-top: 20px; color: #666; font-size: 0.85rem; text-align: center;";
    footer.innerHTML = `
        <p>© 2026 MSTV Network. Watch Indian, Punjabi & Religious TV Channels Live.</p>
        <p style="font-size:0.7rem; opacity:0.6;">All streams are hosted on third-party servers.</p>
    `;
    list.appendChild(footer);
}

// SPEED FIX: Error handling for fetch
fetch('./channels.json')
    .then(r => { if(!r.ok) throw new Error(); return r.json(); })
    .then(renderSidebar)
    .catch(() => { document.getElementById('channel-list').innerHTML = '<p style="text-align:center; padding:20px;">⚠️ Failed to load channels. Please refresh.</p>'; });
</script>
