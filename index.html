<!DOCTYPE html>
<html>
<head>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        
        .crop-container {
            width: 100%;
            height: 100%;
            position: relative;
            overflow: hidden;
        }

        iframe {
            border: none;
            position: absolute;
            
            /* 1. SCROLL UP: Increase this negative number to pull the video HIGHER.
               If -150px is too much, change it to -120px. */
            top: -10px; 

            /* 2. CENTER: Keeps the video aligned horizontally. */
            left: -15%; 

            /* 3. ZOOM: Keeps the video big (130% size). */
            width: 100%; 

            /* 4. PREVENT BOTTOM CUTOFF: 
               This MUST be much larger than the container so the video doesn't end early. */
            height: 500px; 
        }
    </style>
</head>
<body>
    <div class="crop-container">
        <iframe src="https://tplay.live" 
                sandbox="allow-forms allow-scripts allow-same-origin"
                allow="autoplay; encrypted-media; fullscreen"
                scrolling="no">
        </iframe>
    </div>
</body>
</html>
