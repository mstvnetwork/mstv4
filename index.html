<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Global Performance Player</title>

<!-- Preconnect for faster CDN handshake -->
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="dns-prefetch" href="https://cdn.jsdelivr.net">

<!-- Preload channels list -->
<link rel="preload" href="./channels.json" as="fetch" crossorigin="anonymous">

<!-- Player libraries -->
<script defer src="./shaka.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>

body{
margin:0;
background:#111;
color:white;
font-family:sans-serif;
display:flex;
flex-direction:column;
align-items:center;
}

.player-container{
position:relative;
width:100%;
max-width:800px;
aspect-ratio:16/9;
background:black;
margin-top:20px;
overflow:hidden;
}

video,iframe{
width:100%;
height:100%;
border:none;
display:none;
}

#loader-overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
display:none;
align-items:center;
justify-content:center;
background:black;
z-index:10;
}

.spinner{
width:45px;
height:45px;
border:3px solid rgba(255,255,255,0.1);
border-top:3px solid #00d2ff;
border-radius:50%;
animation:spin .6s linear infinite;
}

@keyframes spin{
to{transform:rotate(360deg);}
}

.controls{
margin:20px;
width:90%;
max-width:400px;
}

select{
width:100%;
padding:14px;
border-radius:8px;
font-size:16px;
cursor:pointer;
background:#222;
color:#fff;
border:1px solid #444;
}

#placeholder{
height:100%;
display:flex;
align-items:center;
justify-content:center;
color:#666;
}

</style>

</head>

<body>

<div class="player-container">

<div id="loader-overlay">
<div class="spinner"></div>
</div>

<iframe id="iframe-player"
sandbox="allow-scripts allow-same-origin allow-presentation"
allow="autoplay; encrypted-media; picture-in-picture">
</iframe>

<video id="video-player" playsinline controls></video>

<div id="placeholder">📺 Select a channel</div>

</div>

<div class="controls">

<select id="channel-select">
<option>Loading channels...</option>
</select>

</div>

<script>

const select=document.getElementById("channel-select")
const video=document.getElementById("video-player")
const iframe=document.getElementById("iframe-player")
const loader=document.getElementById("loader-overlay")
const placeholder=document.getElementById("placeholder")

const JSON_URL="./channels.json"

let channels=[]
let hls=null
let shakaPlayer=null



async function stopAll(){

loader.style.display="none"

if(hls){
hls.destroy()
hls=null
}

if(shakaPlayer){
await shakaPlayer.destroy()
shakaPlayer=null
}

video.pause()
video.removeAttribute("src")
video.load()

iframe.removeAttribute("src")
iframe.src="about:blank"

video.style.display="none"
iframe.style.display="none"

}



function renderDropdown(data){

channels=data

select.innerHTML='<option value="">👉 Select Channel</option>'

data.forEach((ch,i)=>{

const opt=document.createElement("option")
opt.value=i
opt.textContent=ch.name
select.appendChild(opt)

})

}



async function loadChannels(){

const cached=localStorage.getItem("channels_cache")

if(cached){
renderDropdown(JSON.parse(cached))
}

try{

const res=await fetch(JSON_URL,{cache:"force-cache"})

const data=await res.json()

localStorage.setItem("channels_cache",JSON.stringify(data))

renderDropdown(data)

}catch(e){

console.log("channel list load failed",e)

}

}



async function playChannel(index){

const channel=channels[index]

if(!channel) return

await stopAll()

loader.style.display="flex"
placeholder.style.display="none"



if(channel.type==="iframe"){

iframe.style.display="block"

iframe.src=channel.url

iframe.onload=()=>{

loader.style.display="none"

}

return

}



video.style.display="block"

const isHls=channel.type==="hls" || channel.url.includes(".m3u8")



if(isHls && window.Hls && Hls.isSupported()){

hls=new Hls({

startLevel:-1,
enableWorker:true,
lowLatencyMode:true,
backBufferLength:30

})

hls.loadSource(channel.url)

hls.attachMedia(video)

hls.on(Hls.Events.MANIFEST_PARSED,()=>{

video.play()

})

return

}



if(window.shaka && shaka.Player.isBrowserSupported()){

shaka.polyfill.installAll()

shakaPlayer=new shaka.Player(video)

shakaPlayer.configure({

streaming:{
bufferingGoal:10,
rebufferingGoal:0.5,
lowLatencyMode:true
}

})

try{

await shakaPlayer.load(channel.url)

video.play()

}catch(e){

console.log("shaka error",e)

loader.style.display="none"

}

}



}



video.onplaying=()=>{

loader.style.display="none"

}



select.onchange=()=>{

if(select.value!==""){

playChannel(select.value)

}

}



loadChannels()

</script>

</body>
</html>
