<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MSNET | Cinema Stream</title>

<style>
:root { 
    --accent-red: #d32f2f;
}

body {
    margin:0;
    font-family: Arial, sans-serif;
    background:#f4f4f2;
}

/* Player */
.player-wrapper {
    width:100%;
    aspect-ratio:16/9;
    background:#000;
    position:relative;
}

#videoPlayer {
    width:100%;
    height:100%;
    border:none;
}

/* Overlay lock */
#silentLockOverlay {
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:9999;
    pointer-events:none;
}

/* Browser message */
#browser-error {
    display:none;
    text-align:center;
    padding:50px;
    font-size:18px;
    color:red;
}
</style>
</head>

<body>

<div id="browser-error">
    ⚠️ This player works best on Google Chrome.<br><br>
    Please switch to Chrome if playback fails.
</div>

<div class="player-wrapper" id="playerWrapper">
    <iframe id="videoPlayer" sandbox="allow-scripts allow-same-origin allow-forms allow-presentation" playsinline></iframe>
    <div id="silentLockOverlay"></div>
</div>

<script>
// ---------------- CONFIG ----------------
const playlist = [
    { title: "Indian Idol", url: "https://vkprime.com/embed-k1ipwza01c0d.html" },
    { title: "Mtv", url: "https://vkprime.com/embed-e6r4icq8gcq1.html" }
];

const player = document.getElementById('videoPlayer');
const lockOverlay = document.getElementById('silentLockOverlay');
const browserError = document.getElementById('browser-error');

// ---------------- CHROME CHECK ----------------
function isChromeLike() {
    const ua = navigator.userAgent;
    return ua.includes("Chrome") && !ua.includes("Edg") && !ua.includes("OPR");
}

// ---------------- 40s LOCK ----------------
let lockTimer;

function startInteractionTimer() {
    clearTimeout(lockTimer);
    unlockOverlay();

    lockTimer = setTimeout(() => {
        lockOverlay.style.pointerEvents = "auto";
    }, 40000);
}

// ---------------- BEHAVIOUR SYSTEM ----------------
let suspiciousScore = 0;
let monitoringStarted = false;

// Start behaviour check after 2 min
function startMonitoringDelay() {
    monitoringStarted = false;
    setTimeout(() => {
        monitoringStarted = true;
    }, 120000);
}

// Track real interaction
["click","touchstart"].forEach(e => {
    document.addEventListener(e, () => {
        if (suspiciousScore > 0) suspiciousScore--;
        unlockOverlay();
    });
});

// Tab switching
document.addEventListener("visibilitychange", () => {
    if (monitoringStarted && document.hidden) {
        suspiciousScore += 1;
    }
});

// DevTools detection (soft)
setInterval(() => {
    if (!monitoringStarted) return;

    const devtools =
        window.outerWidth - window.innerWidth > 160 ||
        window.outerHeight - window.innerHeight > 160;

    if (devtools) suspiciousScore += 2;
}, 2000);

// Enforcement (soft lock)
setInterval(() => {
    if (!monitoringStarted) return;

    if (suspiciousScore >= 5) {
        lockOverlay.style.pointerEvents = "auto";
        suspiciousScore = 3; // allow recovery
    }
}, 5000);

// ---------------- HELPERS ----------------
function unlockOverlay() {
    lockOverlay.style.pointerEvents = "none";
}

function resetAllSecurity() {
    suspiciousScore = 0;
    unlockOverlay();
    startInteractionTimer();
    startMonitoringDelay();
}

// ---------------- VIDEO LOAD ----------------
function loadVideo(index = 0) {
    const stream = playlist[index];
    player.src = stream.url;

    resetAllSecurity();
}

// ---------------- INIT ----------------
window.onload = () => {

    // Soft Chrome restriction
    if (!isChromeLike()) {
        browserError.style.display = "block";
    }

    loadVideo(0);
};
</script>

</body>
</html>
