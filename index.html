<!DOCTYPE html>
<html>
<head>
    <style>
        /* 1. The Cropper: This is the visible window */
        .video-box {
            position: relative;
            width: 100%;
            max-width: 800px; /* Adjust as needed */
            margin: 0 auto;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            overflow: hidden; /* This hides the offset UI */
            background: #000;
        }

        /* 2. The Iframe: We make it taller/wider than the box */
        .video-box iframe {
            position: absolute;
            /* 115% height/width pushes the bars & logo outside the box */
            width: 115%; 
            height: 115%;
            /* Offset it to center the video content */
            top: -7.5%; 
            left: -7.5%;
            border: 0;
            
            /* Stops users from clicking the hidden progress bar */
            pointer-events: none; 
        }

        /* 3. The "Glass" Shield: Blocks all interaction */
        .shield {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 10;
            cursor: default;
        }
    </style>
</head>
<body>

    <div class="video-box">
        <!-- This invisible div sits on top to block scrubbing -->
        <div class="shield"></div>

        <!-- 
           &mute=1 is MANDATORY for autoplay. 
           If you remove mute=1, the browser will show a "solid" frozen button.
        -->
        <iframe 
            src="https://www.youtube.com/embed/KMWcefrAKLg?si=cbCLpqbCnossfPvi &mute=1controls=0" 
            allow="autoplay; encrypted-media">
        </iframe>
    </div>

    <p style="text-align:center; font-family:sans-serif;">
        <em>Note: Video is muted to allow Autoplay. Browsers block unmuted autoplay by default.</em>
    </p>

</body>
</html>









<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        /* 1. The Cropped Container */
        .video-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* Perfect 16:9 ratio */
            overflow: hidden;
            background: #000;
        }

        /* 2. The Cropped Iframe (Oversized to hide UI) */
        #player {
            position: absolute;
            width: 100%;
            height: 120%; /* Pushes top/bottom bars out of view */
            top: -10%; 
            left: 0;
            border: 0;
            pointer-events: none; /* Prevents scrubbing/jumping */
        }

        /* 3. The Custom Unmute Button */
        #unmute-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            z-index: 100;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.8);
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-family: Arial, sans-serif;
            font-weight: bold;
        }
        #unmute-btn:hover { background: #fff; }
    </style>
</head>
<body>

    <div class="video-wrapper">
        <div id="player"></div>
        <button id="unmute-btn">UNMUTE SOUND</button>
    </div>

    <!-- Load YouTube API -->
    <script src="https://www.youtube.com/embed/KMWcefrAKLg?si=cbCLpqbCnossfPvi"></script>

    <script>
        var player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                videoId: 'YOUR_VIDEO_ID', // Replace with your ID
                playerVars: {
                    'autoplay': 1,
                    'mute': 1,
                    'controls': 0,
                    'modestbranding': 1,
                    'rel': 0,
                    'disablekb': 1,
                    'loop': 1,
                    'playlist': 'YOUR_VIDEO_ID' // Required for loop
                },
                events: {
                    'onReady': onPlayerReady
                }
            });
        }

        function onPlayerReady(event) {
            var btn = document.getElementById('unmute-btn');
            btn.addEventListener('click', function() {
                if (player.isMuted()) {
                    player.unMute();
                    btn.innerText = "MUTE SOUND";
                } else {
                    player.mute();
                    btn.innerText = "UNMUTE SOUND";
                }
            });
        }
    </script>

</body>
</html>
