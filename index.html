<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apna Tv</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b0b0b;
    color: #fff;
    overflow: hidden;
}

/* HEADER */
.header {
    padding: 16px;
}

.header h1 {
    margin: 0;
    font-size: 22px;
}

.header p {
    margin: 4px 0 0;
    font-size: 13px;
    opacity: 0.7;
}

/* PLAYER FULLSCREEN */
.player-wrapper {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 56.25vw; /* 16:9 ratio */
    max-height: 100vh;
    background: black;
    z-index: 1;
}

#videoPlayer {
    width: 100%;
    height: 100%;
    border: none;
}

#silentLockOverlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 9999;
    pointer-events: auto;
    background: rgba(0,0,0,0);
}

/* EPG SECTION */
.epg {
    position: relative;
    max-width: 1000px;
    margin: 20px auto;
    padding: 0 12px;
    display: grid;
    gap: 12px;
    z-index: 2;
}

.card {
    background: #1a1a1a;
    padding: 12px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    gap: 10px;
}

.card img.logo {
    width: 40px;
    height: 40px;
    object-fit: contain;
    border-radius: 5px;
}

.card-info {
    flex: 1;
}

.card-title {
    font-size: 12px;
    opacity: 0.6;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 6px;
}

.red-dot {
    width: 8px;
    height: 8px;
    background: red;
    border-radius: 50%;
}

.card-main {
    font-size: 16px;
    font-weight: bold;
}

/* PROGRESS BAR */
.progress-container {
    margin-top: 8px;
    height: 4px;
    background: rgba(255,255,255,0.15);
    border-radius: 2px;
}

.progress-bar {
    height: 100%;
    width: 0%;
    background: #00ffcc;
}

/* FOOTER */
.footer {
    text-align: center;
    font-size: 12px;
    opacity: 0.5;
    padding: 20px 10px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <h1>Apna Tv</h1>
    <p>Watch serials, web series & movies</p>
</div>

<!-- PLAYER -->
<div class="player-wrapper">
    <iframe id="videoPlayer"></iframe>
    <div id="silentLockOverlay"></div>
</div>

<!-- EPG -->
<div class="epg" id="epgContainer">
    <!-- Cards will be injected here -->
</div>

<!-- FOOTER -->
<div class="footer">
    Apna TV 24/7 • Streaming everywhere
</div>

<script>
// Channel playlist with logo
const playlist = [
    { title: "Indian Idol", url: "https://vkprime.com/embed-k1ipwza01c0d.html", logo: "https://via.placeholder.com/40?text=ID" },
    { title: "Mtv", url: "https://vkprime.com/embed-e6r4icq8gcq1.html", logo: "https://via.placeholder.com/40?text=MTV" }
];

// EPG JSON URL
const BASE_JSON_URL = "https://mstvnetwork.github.io/mstv4/epg.json";

let progressTimer;

async function loadEPG() {
    try {
        const res = await fetch(BASE_JSON_URL + "?v=" + Date.now());
        const data = await res.json();
        const nowTime = Date.now();

        let current = null;
        let next = null;

        for (let i = 0; i < data.schedule.length; i++) {
            const start = new Date(data.schedule[i].start).getTime();
            const end = new Date(data.schedule[i].end).getTime();

            if (nowTime >= start && nowTime < end) {
                current = data.schedule[i];
                next = data.schedule[i + 1] || null;
                break;
            }
        }

        if (!current) return;

        updateUI(current, next);
        syncVideo(current.title);
        startProgress(current);

    } catch (e) {
        console.error("EPG error:", e);
    }
}

function updateUI(current, next) {
    const epgContainer = document.getElementById("epgContainer");
    epgContainer.innerHTML = "";

    const currentChannel = playlist.find(c => c.title === current.title) || {};

    // Live Now card
    const liveCard = document.createElement("div");
    liveCard.className = "card";

    const logoImg = document.createElement("img");
    logoImg.className = "logo";
    logoImg.src = currentChannel.logo || "https://via.placeholder.com/40?text=TV";
    liveCard.appendChild(logoImg);

    const info = document.createElement("div");
    info.className = "card-info";

    const titleDiv = document.createElement("div");
    titleDiv.className = "card-title";
    titleDiv.innerHTML = `<span class="red-dot"></span>${current.title}`;
    info.appendChild(titleDiv);

    const progressDiv = document.createElement("div");
    progressDiv.className = "progress-container";
    progressDiv.innerHTML = `<div class="progress-bar" id="progressBar"></div>`;
    info.appendChild(progressDiv);

    liveCard.appendChild(info);
    epgContainer.appendChild(liveCard);

    // Next program card
    if(next){
        const nextCard = document.createElement("div");
        nextCard.className = "card";

        const nextLogo = document.createElement("img");
        nextLogo.className = "logo";
        nextLogo.src = currentChannel.logo || "https://via.placeholder.com/40?text=TV";
        nextCard.appendChild(nextLogo);

        const nextInfo = document.createElement("div");
        nextInfo.className = "card-info";

        const nextTitleDiv = document.createElement("div");
        nextTitleDiv.className = "card-title";
        nextTitleDiv.textContent = next.title;
        nextInfo.appendChild(nextTitleDiv);

        nextCard.appendChild(nextInfo);
        epgContainer.appendChild(nextCard);
    }
}

function startProgress(program) {
    clearInterval(progressTimer);

    progressTimer = setInterval(() => {
        const now = Date.now();
        const start = new Date(program.start).getTime();
        const end = new Date(program.end).getTime();

        const percent = ((now - start) / (end - start)) * 100;
        document.getElementById("progressBar").style.width = percent + "%";

    }, 1000);
}

function syncVideo(title) {
    const player = document.getElementById("videoPlayer");
    const video = playlist.find(v => v.title === title);

    if (video && player.src !== video.url) {
        player.src = video.url;
    }
}

window.onload = () => {
    loadEPG();
    setInterval(loadEPG, 60000);
};
</script>

</body>
</html>
