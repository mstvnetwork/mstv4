<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MSTV Player</title>
    <!-- Reliable Cloudflare CDN for CSS -->
    
    <style>
        body { background: #000; color: #fff; text-align: center; margin: 0; padding: 20px; font-family: sans-serif; }
        .player-container { max-width: 850px; margin: auto; }
        #status { color: #888; margin-top: 10px; font-size: 14px; }
    </style>
</head>
<body>

  <div class="player-container">
    <h2>MSTV Network</h2>
    <video id="mstv-player" class="video-js vjs-big-play-centered vjs-default-skin" controls preload="auto" width="800" height="450"></video>
    <div id="status">Connecting to Proxy...</div>
  </div>

  <!-- Reliable Cloudflare CDN for JS -->
  <script src="https://cdnjs.cloudflare.com"></script>

  <script>
    // Wait for the library to be defined
    window.onload = function() {
        if (typeof videojs !== 'undefined') {
            const status = document.getElementById('status');
            const originalStream = "https://fucking-tv-ott.keralive.workers.dev/mumt01/FASTMIX/tracks-v2a1/mono.m3u8";
            const proxiedStream = "/live-stream?url=" + encodeURIComponent(originalStream);

            const player = videojs('mstv-player');
            
            player.ready(function() {
                player.src({
                    src: proxiedStream,
                    type: 'application/x-mpegURL'
                });
                status.innerText = "Proxy Active - Loading Stream";
            });

            player.on('error', function() {
                status.innerText = "Stream Offline or Proxy Blocked";
            });
        } else {
            document.getElementById('status').innerText = "CDN Error: Library failed to load.";
        }
    };
  </script>
</body>
</html>
