<!-- Performance -->
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="preconnect" href="https://gc.zgo.at">

<!-- Player Libraries -->
<script defer src="./shaka.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<!-- Favicon -->
<link rel="icon" href="https://mstvnet.netlify.app/mstv-thumbnail.png">
<link rel="apple-touch-icon" href="https://mstvnet.netlify.app/mstv-thumbnail.png">

<meta name="theme-color" content="#0f172a">

<style>
  :root { --accent: #00FFA3; --bg: #0F1115; --card: #1A1D22; }
  body { 
    margin: 0; background: var(--bg); color: #fff; font-family: system-ui, -apple-system, sans-serif;
    display: flex; flex-direction: column; height: 100vh; overflow: hidden;
  }

  /* Sticky Player Area */
  #main-view { 
    position: sticky; top: 0; z-index: 100; background: #000; 
    width: 100%; transform: translateZ(0); /* Hardware Acceleration */
  }
  .player-container { width: 100%; aspect-ratio: 16/9; position: relative; background: #000; }
  video, iframe { width: 100%; height: 100%; border: none; display: none; }
  
  /* Details & Header */
  .channel-details { padding: 12px 15px; background: #16191D; border-bottom: 1px solid #222; }
  #display-name { margin: 0; font-size: 1.1rem; color: var(--accent); font-weight: 600; }

  /* Scrollable Channel List (The "Footer") */
  #sidebar { 
    flex: 1; overflow-y: auto; padding: 10px; 
    overscroll-behavior: contain; -webkit-overflow-scrolling: touch;
  }
  .channel-card { 
    display: flex; align-items: center; padding: 10px; margin-bottom: 8px; 
    background: var(--card); border-radius: 10px; cursor: pointer;
  }
  .channel-card.active { outline: 2px solid var(--accent); background: #252A31; }
  .channel-card img { width: 44px; height: 44px; border-radius: 6px; margin-right: 12px; background: #000; }
  .name { font-size: 0.95rem; font-weight: 500; }

  /* Loader Overlay */
  #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: none; font-size: 0.8rem; color: var(--accent); }
</style>

<body>
<div id="main-view">
    <div class="player-container">
        <div id="loading">⚡ Loading...</div>
        <video id="video-player" autoplay playsinline controls poster="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"></video>
        <iframe id="iframe-player" allow="autoplay; encrypted-media"></iframe>
    </div>
    <div class="channel-details"><h1 id="display-name">MSTV Network</h1></div>
</div>

<div id="sidebar"><div id="channel-list"></div></div>

<script>
const video = document.getElementById('video-player');
const iframe = document.getElementById('iframe-player');
const loader = document.getElementById('loading');
const displayName = document.getElementById('display-name');

let channels = [], hls = null, shakaPlayer = null;

// SPEED FIX: Pre-connect to common CDNs
const link = document.createElement('link');
link.rel = 'preconnect';
link.href = 'https://cdn.jsdelivr.net';
document.head.appendChild(link);

async function stopAll() {
    loader.style.display = 'none';
    if(hls){ hls.destroy(); hls = null; }
    if(shakaPlayer){ await shakaPlayer.destroy(); shakaPlayer = null; }
    video.pause();
    video.src = "";
    video.load();
    iframe.src = 'about:blank';
    video.style.display = 'none';
    iframe.style.display = 'none';
}

async function playChannel(index) {
    const ch = channels[index];
    await stopAll();
    loader.style.display = 'block';
    displayName.textContent = ch.name;

    if(ch.type === 'iframe') {
        iframe.style.display = 'block';
        iframe.src = ch.url;
        iframe.onload = () => loader.style.display = 'none';
        return;
    }

    video.style.display = 'block';
    const isHls = ch.type === 'hls' || ch.url.includes('.m3u8');

    if(isHls) {
        if(window.Hls && Hls.isSupported()) {
            hls = new Hls({ 
                capLevelToPlayerSize: true, // SPEED: Don't load 4K on a small screen
                startLevel: 0,              // SPEED: Start with lowest bitrate for instant play
                enableWorker: true 
            });
            hls.loadSource(ch.url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
        } else { video.src = ch.url; video.play(); }
    } else {
        if(window.shaka && shaka.Player.isBrowserSupported()) {
            shaka.polyfill.installAll();
            shakaPlayer = new shaka.Player(video);
            // SPEED: Aggressive buffering for low-speed networks
            shakaPlayer.configure({
                streaming: {
                    rebufferingGoal: 1,      // Start play with only 1s of data
                    bufferingGoal: 5,        // Keep only 5s ahead to save bandwidth
                    lowLatencyMode: true
                }
            });
            try { await shakaPlayer.load(ch.url); video.play(); } catch(e) { console.error(e); }
        }
    }
}

// UI Rendering
function renderSidebar(data) {
    channels = data;
    const list = document.getElementById('channel-list');
    data.forEach((ch, i) => {
        const card = document.createElement("div");
        card.className = "channel-card";
        card.innerHTML = `<img src="${ch.logo || ''}" loading="lazy"> <div class="name">${ch.name}</div>`;
        card.onclick = () => {
            document.querySelectorAll('.channel-card').forEach(c => c.classList.remove('active'));
            card.classList.add('active');
            playChannel(i);
        };
        list.appendChild(card);
    });
}

video.onplaying = () => loader.style.display = 'none';
fetch('./channels.json').then(r => r.json()).then(renderSidebar);
</script>
</body>
</html>
