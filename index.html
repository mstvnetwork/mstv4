<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSTV Network | Premium Player</title>
    <script defer src="./shaka.js"></script>
    <script defer src="https://cdn.jsdelivr.net"></script>
    <style>
  :root { --accent: #90EE90; --bg: #0F1115; --card-bg: #1A1D22; }
  
  body { 
    margin: 0; padding: 0; background: var(--bg); color: #fff; 
    font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; height: 100vh; 
  }

  /* Player - STICKY TOP */
  #main-view { 
    position: sticky; top: 0; z-index: 100; background: #000; 
    width: 100%; box-shadow: 0 4px 20px rgba(0,0,0,0.8); 
  }
  .player-container { width: 100%; aspect-ratio: 16/9; position: relative; }
  video, iframe { width: 100%; height: 100%; border: none; display: none; }
  
  /* Details Section */
  .channel-details { padding: 15px; background: var(--bg); border-bottom: 1px solid #222; }
  .channel-details h1 { margin: 0; font-size: 1.2em; color: var(--accent); }

  /* Channel List - SCROLLABLE BOTTOM */
  #sidebar { 
    flex: 1; overflow-y: auto; padding: 10px; background: var(--bg); 
    -webkit-overflow-scrolling: touch; /* Smooth scroll for mobile */
  }
  .sidebar-header { padding: 10px 5px; font-size: 0.9em; color: #888; text-transform: uppercase; letter-spacing: 1px; }

  /* Channel Cards */
  .channel-card { 
    display: flex; align-items: center; padding: 12px; margin-bottom: 8px; 
    background: var(--card-bg); border-radius: 12px; cursor: pointer; border: 1px solid transparent;
  }
  .channel-card.active { border-color: var(--accent); background: #252A31; }
  .channel-card img { width: 50px; height: 50px; border-radius: 8px; margin-right: 15px; object-fit: cover; }
  .channel-info .name { font-weight: 600; font-size: 1em; }
  
  /* UI Overlay */
  #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: var(--accent); display: none; }
  #live-stamp { position: absolute; top: 10px; left: 10px; background: #E50914; padding: 3px 8px; border-radius: 4px; font-size: 0.65em; font-weight: bold; }
</style>

<body>

<div id="main-view">
    <div class="player-container">
        <div id="loading">🌀 Loading Stream...</div>
        <div id="live-stamp" style="display:none;">LIVE</div>
        <video id="video-player" autoplay playsinline controls></video>
        <iframe id="iframe-player" sandbox="allow-scripts allow-same-origin allow-presentation" allow="autoplay; encrypted-media"></iframe>
    </div>
    <div class="channel-details">
        <h1 id="display-name">Select a Channel</h1>
    </div>
</div>

<div id="sidebar">
    <div class="sidebar-header">Explore Channels</div>
    <div id="channel-list">
        <!-- Channel cards injected here -->
    </div>
</div>

</div>

<script>
// --- LOGIC REMAINS THE SAME AS YOURS ---
const video = document.getElementById('video-player');
const iframe = document.getElementById('iframe-player');
const loader = document.getElementById('loading');
const liveStamp = document.getElementById('live-stamp');
const displayName = document.getElementById('display-name');
const JSON_URL = './channels.json';

let channels = [];
let hls = null;
let shakaPlayer = null;

async function stopAll() {
    loader.style.display = 'none';
    liveStamp.style.display = 'none';
    if(hls){ hls.destroy(); hls = null; }
    if(shakaPlayer){ await shakaPlayer.destroy(); shakaPlayer = null; }
    video.pause();
    video.removeAttribute('src');
    video.load();
    iframe.removeAttribute('src');
    iframe.src = 'about:blank';
    video.style.display = 'none';
    iframe.style.display = 'none';
}

function renderSidebar(data) {
    channels = data;
    const list = document.getElementById('channel-list');
    list.innerHTML = ''; 
    data.forEach((ch, i) => {
        const card = document.createElement("div");
        card.className = "channel-card";
        card.innerHTML = `
            <img src="${ch.logo || 'https://via.placeholder.com'}" alt="">
            <div class="channel-info">
                <div class="name">${ch.name}</div>
            </div>
        `;
        card.onclick = () => {
            window.scrollTo({ top: 0, behavior: 'smooth' }); // Auto-scroll to player on click
            document.querySelectorAll('.channel-card').forEach(c => c.classList.remove('active'));
            card.classList.add('active');
            playChannel(i);
        };
        list.appendChild(card);
    });
}


async function loadChannels(){
    try {
        const res = await fetch(JSON_URL);
        const data = await res.json();
        renderSidebar(data);
    } catch(e){ console.error('Load failed', e); }
}

async function playChannel(index){
    const channel = channels[index];
    if(!channel) return;

    await stopAll();
    loader.style.display = 'block';
    displayName.textContent = channel.name;
    liveStamp.style.display = channel.isLive ? 'block' : 'none';

    if(channel.type === 'iframe'){
        iframe.style.display = 'block';
        iframe.src = channel.url;
        iframe.onload = () => { loader.style.display = 'none'; };
        return;
    }

    video.style.display = 'block';
    const isHls = channel.type === 'hls' || channel.url.includes('.m3u8');

    if(isHls){
        if(window.Hls && Hls.isSupported()){
            hls = new Hls({ enableWorker:true });
            hls.loadSource(channel.url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, ()=> video.play());
        } else {
            video.src = channel.url;
            video.play();
        }
    } else {
        // Shaka for DASH/Others
        if(window.shaka && shaka.Player.isBrowserSupported()){
            shaka.polyfill.installAll();
            shakaPlayer = new shaka.Player(video);
            try{
                await shakaPlayer.load(channel.url);
                video.play();
            } catch(e){ console.error(e); }
        }
    }
}

video.onplaying = () => { loader.style.display = 'none'; };
loadChannels();
</script>
</body>
</html>
