<style>

  .channel-select { margin-bottom:3vh; width:90%; max-width:400px; }
  select { width:100%; padding:0.8em; font-size:1em; border-radius:12px; border:none; background:#1A1D20; color:#90EE90; cursor:pointer; box-shadow:0 4px 10px rgba(0,255,160,0.2); transition: transform 0.2s ease; }
  select:hover { transform:translateY(-2px); box-shadow:0 6px 15px rgba(0,255,160,0.3); }
  .player-container { position:relative; width:90%; max-width:900px; aspect-ratio:16/9; background:#141618; display:flex; align-items:center; justify-content:center; border-radius:15px; overflow:hidden; margin-bottom:10px; }
  video, iframe { position:absolute; top:0; left:0; width:100%; height:100%; border:none; border-radius:15px; display:none; }
  #placeholder { width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-size:1.5em; color:#90EE90; text-shadow:0 0 15px rgba(144,238,144,0.6); }

</style>

<body>

<div class="title">MSTV NETWORK</div>
<div class="device-notice">Compatible with Android devices. For best experience use <strong>Chrome Browser</strong></div>

<div class="channel-select">
  <select id="channel-select" aria-label="Select TV Channel">
    <option value="">👉📺 Click & Select Channel</option>
  </select>
</div>

<div id="loading">🔄 Loading Stream...</div>

<div class="player-container">
  <div id="placeholder" aria-live="polite">⬆️ Select a Channel Above</div>
  <video id="video-player" autoplay playsinline controls></video>
  <iframe id="iframe-player" sandbox="allow-scripts allow-same-origin allow-presentation" allow="autoplay; encrypted-media; picture-in-picture"></iframe>
</div>

<footer class="site-footer">
  © 2026 MSTV Network • Free Online TV Hub
</footer>

<script defer>
const select = document.getElementById('channel-select');
const video = document.getElementById('video-player');
const iframe = document.getElementById('iframe-player');
const placeholder = document.getElementById('placeholder');
const loader = document.getElementById('loading');
const JSON_URL = './channels.json';

let channels = [];
let hls = null;
let shakaPlayer = null;

async function stopAll(){
  loader.style.display = 'none';
  if(hls){ hls.destroy(); hls=null; }
  if(shakaPlayer){ await shakaPlayer.destroy(); shakaPlayer=null; }
  video.pause(); video.removeAttribute('src'); video.load();
  iframe.removeAttribute('src'); iframe.src='about:blank';
  video.style.display='none'; iframe.style.display='none';
  placeholder.style.display='none';
}

function renderDropdown(data){
  channels = data;
  select.innerHTML = '<option value="">👉📺 Click & Select Channel</option>';
  data.forEach((ch,i)=>{
    const opt=document.createElement('option');
    opt.value=i;
    opt.textContent=ch.name;
    select.appendChild(opt);
  });
}

async function loadChannels(){
  const cached = localStorage.getItem('channels_cache');
  if(cached) renderDropdown(JSON.parse(cached));
  try{
    const res = await fetch(JSON_URL,{cache:'force-cache'});
    const data = await res.json();
    localStorage.setItem('channels_cache',JSON.stringify(data));
    renderDropdown(data);
  }catch(e){ console.error('Channels load failed', e); }
}

async function playChannel(index){
  const channel = channels[index]; if(!channel) return;
  await stopAll();
  loader.style.display='block'; placeholder.style.display='none';
  if(channel.type==='iframe'){
    iframe.style.display='block';
    iframe.src = channel.url;
    iframe.onload = ()=>{ loader.style.display='none'; };
    return;
  }

  video.style.display='block';
  const isHls = channel.type==='hls' || channel.url.includes('.m3u8');

  if(isHls){
    if(window.Hls && Hls.isSupported()){
      hls = new Hls({enableWorker:true, lowLatencyMode:true, startLevel:-1});
      hls.loadSource(channel.url);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, ()=>video.play());
    } else if(video.canPlayType('application/vnd.apple.mpegurl')){
      video.src = channel.url;
      video.play();
    }
    return;
  }

  if(window.shaka && shaka.Player.isBrowserSupported()){
    shaka.polyfill.installAll();
    shakaPlayer = new shaka.Player(video);
    shakaPlayer.configure({streaming:{bufferingGoal:10, rebufferingGoal:0.5, lowLatencyMode:true}});
    try{ await shakaPlayer.load(channel.url); video.play(); } catch(e){ console.error('Shaka error', e); loader.style.display='none'; }
  }
}

video.onplaying = ()=>{ loader.style.display='none'; };
select.onchange = ()=>{ if(select.value!=='') playChannel(select.value); };
loadChannels();
</script>

</body>
