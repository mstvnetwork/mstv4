<!-- cnn-player.html -->
<!DOCTYPE html>
<html>
<head>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background: #000; }
        .crop-container {
            width: 100vw; height: 100vh; 
            position: relative; overflow: hidden;
        }
         .crop-container {
            width: 100%;
            height: 100%;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        iframe {
            border: none;
            position: absolute;
            
            /* 1. RESET TOP: Start at 0 to see where it sits */
            top: 0px; 
            
            /* 2. THE ZOOM FIX: Use 100% width first to see the whole video */
            width: 100%;
            
            /* 3. THE HEIGHT FIX: Make this exactly match the 16:9 ratio */
            height: 100%;
            
            /* 4. THE MAGIC SCALE: If you need it bigger, use this instead of width */
            transform: scale(1.05); 
            transform-origin: top center;
        }
    
    </style>
</head>
<body>
    <div class="crop-container">
        <iframe src="https://tplay.live" 
                sandbox="allow-forms allow-scripts allow-same-origin"
                allow="autoplay; encrypted-media; fullscreen"></iframe>
    </div>
</body>
</html>
