<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSTV Network | Watch Live TV</title>
    <!-- Essential Libraries -->
    <script src="https://cdn.jsdelivr.net"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
    /* 1. Reset & General Layout */
    html, body { margin:0; padding:0; font-family:Arial,sans-serif; background:#0F1115; color:#E0E0E0; display:flex; flex-direction:column; align-items:center; }
    
    .title { font-size:2.2em; margin:20px 0 10px; font-weight:bold; background:linear-gradient(90deg,#90EE90,#00FFA3); -webkit-background-clip:text; color:transparent; }

    /* 2. Sticky Player Container */
    .player-container { 
        position: -webkit-sticky; 
        position: sticky; 
        top: 0; 
        z-index: 1000; /* Keeps it above the scrolling list */
        width: 100%; 
        max-width: 900px; 
        aspect-ratio: 16/9; 
        background: #000; 
        display: flex; 
        align-items: center; 
        justify-content: center; 
        box-shadow: 0 4px 20px rgba(0,0,0,0.5); 
    }

    video, iframe { position:absolute; width:100%; height:100%; border:none; display:none; }
    #loading { color:#90EE90; margin:10px; display:none; font-weight: bold; }

    /* 3. Scrollable Channel Grid */
    .channel-grid { 
        display: grid; 
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); 
        gap: 15px; 
        width: 90%; 
        max-width: 900px; 
        list-style: none; 
        padding: 20px 0 100px; /* Extra padding at bottom for easy scrolling */
        margin: 0;
    }

    .channel-grid li { 
        background: #1A1D20; 
        padding: 15px; 
        border-radius: 12px; 
        text-align: center; 
        font-size: 0.9em; 
        border: 1px solid #333; 
        cursor: pointer; 
        transition: transform 0.2s, background 0.3s; 
    }

    .channel-grid li:hover { 
        background: #25282c; 
        transform: translateY(-3px); 
        border-color: #90EE90; 
    }
</style>

<body>
    <div class="title">MSTV NETWORK</div>

    <!-- The Sticky Player -->
    <div class="player-container">
        <div id="placeholder" style="font-size:4em;">📺</div>
        <video id="video-player" autoplay playsinline controls></video>
        <iframe id="iframe-player"></iframe>
        <div id="loading" style="position:absolute;">🌀 Loading...</div>
    </div>

    <!-- The Scrollable List -->
    <ul id="channel-grid" class="channel-grid">
        <!-- Script will populate this -->
    </ul>
</body>

    <ul id="channel-grid" class="channel-grid"></ul>

    <script>
        const select = document.getElementById('channel-select');
        const grid = document.getElementById('channel-grid');
        const video = document.getElementById('video-player');
        const iframe = document.getElementById('iframe-player');
        const loader = document.getElementById('loading');
        const placeholder = document.getElementById('placeholder');

        let allChannels = [];
        let hls = null;
        let shakaPlayer = null;

        async function init() {
            try {
                const res = await fetch('./channels.json');
                allChannels = await res.json();
                renderUI(allChannels);
            } catch(e) {
                select.innerHTML = '<option>⚠️ Error loading JSON</option>';
            }
        }

        function renderUI(list) {
            select.innerHTML = '<option value="">📱 Select Channel</option>';
            if(grid) grid.innerHTML = '';
            list.forEach((ch) => {
                const opt = document.createElement("option");
                opt.value = JSON.stringify(ch);
                opt.textContent = ch.name;
                select.appendChild(opt);

                const li = document.createElement("li");
                li.textContent = ch.name;
                li.onclick = () => playChannel(ch);
                if(grid) grid.appendChild(li);
            });
        }

        function filterChannels(category, btn) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const filtered = (category === 'All') ? allChannels : allChannels.filter(c => c.category === category);
            renderUI(filtered);
        }

        async function playChannel(ch) {
            if(!ch) return;
            document.title = `Watching ${ch.name} | MSTV Network`;
            await stopAll();
            
            loader.style.display = 'block';
            placeholder.style.display = 'none';

            const isWebpage = ch.url.includes('#') || ch.url.includes('.html') || ch.type === 'iframe';

            if(isWebpage) {
                iframe.style.display = 'block';
                iframe.src = ch.url;
                iframe.onload = () => loader.style.display = 'none';
            } else {
                video.style.display = 'block';
                
                // --- HLS LOGIC (.m3u8) ---
                if (ch.url.toLowerCase().includes('.m3u8')) {
                    if (Hls.isSupported()) {
                        hls = new Hls();
                        hls.loadSource(ch.url);
                        hls.attachMedia(video);
                        hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
                    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                        video.src = ch.url;
                        video.play();
                    }
                } 
                // --- DASH LOGIC (.mpd or Shaka) ---
                else {
                    shaka.polyfill.installAll();
                    if (shaka.Player.isBrowserSupported()) {
                        shakaPlayer = new shaka.Player(video);
                        
                        // Apply ClearKeys if they exist in your JSON
                        if (ch.clearKeys) {
                            shakaPlayer.configure({ drm: { clearKeys: ch.clearKeys } });
                        }

                        try {
                            await shakaPlayer.load(ch.url);
                            video.play();
                        } catch(e) {
                            console.error("Shaka error", e);
                            loader.style.display = 'none';
                        }
                    }
                }
            }
        }

        async function stopAll() {
            loader.style.display = 'none';
            if(hls) { hls.destroy(); hls = null; }
            if(shakaPlayer) { await shakaPlayer.destroy(); shakaPlayer = null; }
            video.pause();
            video.removeAttribute('src');
            video.load();
            video.style.display = 'none';
            iframe.style.display = 'none';
            iframe.src = 'about:blank';
        }

        video.onplaying = () => loader.style.display = 'none';
        select.onchange = () => { if(select.value) playChannel(JSON.parse(select.value)); };
        init();
    </script>
</body>
</html>
