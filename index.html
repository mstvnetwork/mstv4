<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fast Global Player</title>
    
    <!-- 1. Libraries -->
    <script src="shaka.js"></script>
    <script src="https://cdn.jsdelivr.net"></script>

    <style>
        body { margin: 0; background: #111; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; }
        
        /* The Player Area */
        .player-container { 
            position: relative; 
            width: 100%; 
            max-width: 800px; 
            aspect-ratio: 16 / 9; 
            background: #000; 
            margin-top: 20px; 
            overflow: hidden; /* Keeps loader inside */
        }

        video, iframe { width: 100%; height: 100%; border: none; display: none; }

        /* Loader: Positioned ONLY over the video, not the whole screen */
        #loader-overlay { 
            position: absolute; 
            top: 0; left: 0; width: 100%; height: 100%; 
            display: none; align-items: center; justify-content: center; 
            background: rgba(0,0,0,0.7); 
            z-index: 5; /* Lower than dropdown area */
        }

        .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.2); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Dropdown Area: Higher Z-Index to ensure it's ALWAYS clickable */
        .controls { 
            margin: 20px; 
            width: 90%; 
            max-width: 400px; 
            position: relative; 
            z-index: 20; 
        }
        select { width: 100%; padding: 12px; border-radius: 8px; font-size: 16px; cursor: pointer; background: #222; color: #fff; border: 1px solid #444; }
    </style>
</head>
<body>

<div class="player-container">
    <div id="loader-overlay"><div class="spinner"></div></div>
    <iframe id="iframe-player" allow="autoplay; encrypted-media; fullscreen" allowfullscreen></iframe>
    <video id="video-player" playsinline controls></video>
    <div id="placeholder" style="height:100%; display:flex; align-items:center; justify-content:center;">Select a channel</div>
</div>

<div class="controls">
    <select id="channel-select"><option value="">⌛ Loading...</option></select>
</div>

<script>
    const select = document.getElementById('channel-select');
    const videoPlayer = document.getElementById('video-player');
    const iframePlayer = document.getElementById('iframe-player');
    const loader = document.getElementById('loader-overlay');
    
    const JSON_URL = "./channel.json"; 
    let hlsInstance = null;
    let shakaInstance = null;
    let channelsData = [];

    // --- High Performance Cleanup ---
    async function stopAllPlayback() {
        loader.style.display = 'none'; // Force hide loader so UI is never blocked
        
        if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
        if (shakaInstance) { await shakaInstance.destroy(); shakaInstance = null; }
        
        videoPlayer.pause();
        videoPlayer.removeAttribute('src'); 
        videoPlayer.load(); 
        
        videoPlayer.style.display = 'none';
        iframePlayer.src = "";
        iframePlayer.style.display = 'none';
        document.getElementById('placeholder').style.display = 'none';
    }

    function renderDropdown(data) {
        channelsData = data;
        select.innerHTML = '<option value="">👉📺 Select Channel</option>';
        data.forEach((ch, i) => {
            const opt = document.createElement('option');
            opt.value = i;
            opt.textContent = ch.name;
            select.appendChild(opt);
        });
    }

    async function loadChannels() {
        const cached = localStorage.getItem('channels_cache');
        if (cached) renderDropdown(JSON.parse(cached));
        try {
            const res = await fetch(JSON_URL);
            if (!res.ok) throw new Error("File not found");
            const data = await res.json();
            localStorage.setItem('channels_cache', JSON.stringify(data));
            renderDropdown(data);
        } catch (e) { console.error("JSON Error:", e.message); }
    }

    async function playChannel(index) {
        const channel = channelsData[index];
        if (!channel) return;
        
        await stopAllPlayback();
        loader.style.display = 'flex';

        if (channel.type === 'iframe') {
            iframePlayer.style.display = 'block';
            iframePlayer.src = channel.url;
            loader.style.display = 'none';
            return;
        }

        videoPlayer.style.display = 'block';
        const isHls = channel.type === 'hls' || channel.url.includes('.m3u8');

        if (isHls && typeof Hls !== 'undefined' && Hls.isSupported()) {
            hlsInstance = new Hls({ startLevel: 0, enableWorker: false });
            hlsInstance.loadSource(channel.url);
            hlsInstance.attachMedia(videoPlayer);
            hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => videoPlayer.play());
        } else if (shaka.Player.isBrowserSupported()) {
            shaka.polyfill.installAll();
            shakaInstance = new shaka.Player();
            await shakaInstance.attach(videoPlayer);
            shakaInstance.configure({ streaming: { rebufferingGoal: 1 } });
            try { await shakaInstance.load(channel.url); videoPlayer.play(); } catch (e) { console.error(e); loader.style.display = 'none'; }
        } else if (videoPlayer.canPlayType('application/vnd.apple.mpegurl')) {
            videoPlayer.src = channel.url;
            videoPlayer.play();
        }
    }

    select.onchange = () => { if(select.value !== "") playChannel(select.value); };
    
    // Auto-hide loader when video actually plays
    videoPlayer.onplaying = () => { loader.style.display = 'none'; };
    videoPlayer.onerror = () => { loader.style.display = 'none'; };

    loadChannels();
</script>
</body>
</html>
