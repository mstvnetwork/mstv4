<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSTV Network | Watch Indian TV & Live Cricket</title>
    <meta name="description" content="Stream Indian, Punjabi and religious TV channels live. MSTV Network offers free HD streaming.">
    
    <!-- SEO & Performance -->
    <link rel="canonical" href="https://mstvnet.netlify.app">
    <script defer src="./shaka.js"></script>
    <script defer src="https://cdn.jsdelivr.net"></script>

    <style>
        html, body { margin:0; padding:0; font-family:Arial,sans-serif; background:#0F1115; color:#E0E0E0; display:flex; flex-direction:column; align-items:center; }
        .title { font-size:2.2em; margin:50px 0 10px; font-weight:bold; background:linear-gradient(90deg,#90EE90,#00FFA3); -webkit-background-clip:text; color:transparent; }
        .channel-select { margin-bottom:20px; width:90%; max-width:400px; }
        select { width:100%; padding:12px; border-radius:12px; border:none; background:#1A1D20; color:#90EE90; cursor:pointer; }
        .player-container { position:relative; width:90%; max-width:900px; aspect-ratio:16/9; background:#141618; border-radius:15px; display:flex; align-items:center; justify-content:center; overflow:hidden; }
        video, iframe { position:absolute; width:100%; height:100%; border:none; display:none; }
        #loading { color: #90EE90; margin: 10px 0; display: none; }
        
        /* Category Button Styles */
        .category-nav { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin: 20px 0; }
        .cat-btn { background: #1A1D20; color: #90EE90; border: 1px solid #333; padding: 8px 16px; border-radius: 20px; cursor: pointer; transition: 0.3s; }
        .cat-btn:hover, .cat-btn.active { background: #90EE90; color: #000; }

        .site-footer { width:100%; max-width:900px; margin-top:40px; padding:20px; text-align:center; border-top:1px solid #222; color:#777; }
    </style>
</head>

<body>
    <div class="title">MSTV NETWORK</div>
    <h1>Watch Live TV Channels</h1>

    <!-- Category Filter (SEO & UX) -->
    <nav class="category-nav">
        <button class="cat-btn active" onclick="filterChannels('All', this)">All</button>
        <button class="cat-btn" onclick="filterChannels('Punjabi', this)">Punjabi</button>
        <button class="cat-btn" onclick="filterChannels('Hindi', this)">Hindi</button>
        <button class="cat-btn" onclick="filterChannels('Religious', this)">Religious</button>
        <button class="cat-btn" onclick="filterChannels('Cricket', this)">Cricket</button>
    </nav>

    <div class="channel-select">
        <select id="channel-select" aria-label="Select TV Channel">
            <option value="">📱 Loading...</option>
        </select>
    </div>

    <div id="loading">🌀 Buffering...</div>

    <div class="player-container">
        <div id="placeholder" style="font-size:5em;">📺</div>
        <video id="video-player" autoplay playsinline controls></video>
        <iframe id="iframe-player" loading="lazy"></iframe>
    </div>

    <footer class="site-footer">
        <p>© 2026 MSTV Network. Use the category buttons above to find your favourite live streams instantly.</p>
    </footer>

       <script>
    const select = document.getElementById('channel-select');
    const grid = document.getElementById('channel-grid');
    const video = document.getElementById('video-player');
    const iframe = document.getElementById('iframe-player');
    const placeholder = document.getElementById('placeholder');
    const loader = document.getElementById('loading');
    const liveStamp = document.getElementById('live-stamp');
    const JSON_URL = './channels.json';

    let allChannels = [];
    let hls = null;
    let shakaPlayer = null;

    // --- 1. INITIALISATION ---
    async function init() {
        // Install Shaka polyfills for cross-browser support
        if (window.shaka) {
            shaka.polyfill.installAll();
            if (shaka.Player.isBrowserSupported()) {
                shakaPlayer = new shaka.Player(video);
                shakaPlayer.addEventListener('error', (e) => console.error('Shaka Error:', e));
            }
        }

        try {
            const res = await fetch(JSON_URL);
            allChannels = await res.json();
            populateUI(allChannels);
        } catch(e) {
            select.innerHTML = '<option>⚠️ Error Loading Channels</option>';
        }
    }

    function populateUI(list) {
        select.innerHTML = '<option value="">📱 Select Channel (' + list.length + ')</option>';
        grid.innerHTML = '';
        list.forEach((ch) => {
            const opt = document.createElement("option");
            opt.value = JSON.stringify(ch); 
            opt.textContent = ch.name;
            select.appendChild(opt);

            const li = document.createElement("li");
            li.textContent = ch.name;
            li.onclick = () => playChannel(JSON.stringify(ch));
            grid.appendChild(li);
        });
    }

    // --- 2. FILTERING ---
    function filterChannels(category, btn) {
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const filtered = (category === 'All') ? allChannels : allChannels.filter(ch => ch.category === category);
        populateUI(filtered);
    }

    // --- 3. PLAYBACK ENGINE ---
    async function playChannel(dataStr) {
        if(!dataStr) return;
        const ch = JSON.parse(dataStr);
        
        document.title = `Watching ${ch.name} | MSTV Network`;
        await stopAll();
        
        loader.style.display = 'block';
        placeholder.style.display = 'none';
        liveStamp.style.display = ch.isLive ? 'block' : 'none';

        if(ch.type === 'iframe') {
            iframe.style.display = 'block';
            iframe.src = ch.url;
            iframe.onload = () => loader.style.display = 'none';
        } else {
            video.style.display = 'block';
            
            // Handle Shaka (DASH/HLS)
            if(ch.type === 'shaka' && shakaPlayer) {
                try {
                    await shakaPlayer.load(ch.url);
                    video.play();
                } catch(e) {
                    console.error('Shaka Load Fail:', e);
                    loader.style.display = 'none';
                }
            } 
            // Handle Standard HLS (hls.js)
            else if(ch.type === 'hls' && window.Hls && Hls.isSupported()) {
                hls = new Hls();
                hls.loadSource(ch.url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
            } 
            // Fallback for native HLS (Safari)
            else {
                video.src = ch.url;
                video.play();
            }
        }
    }

    async function stopAll() {
        loader.style.display = 'none';
        if(hls) { hls.destroy(); hls = null; }
        if(shakaPlayer) { await shakaPlayer.unload(); } // Clear current shaka stream
        video.pause();
        video.removeAttribute('src');
        video.load();
        video.style.display = 'none';
        iframe.style.display = 'none';
        iframe.src = 'about:blank';
    }

    video.onplaying = () => loader.style.display = 'none';
    select.onchange = () => playChannel(select.value);
    
    init();
</script>
</body>
</html>
