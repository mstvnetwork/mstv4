<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #111; color: #fff; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        #player-container { width: 90%; max-width: 900px; margin: 20px auto; aspect-ratio: 16/9; background: #000; }
        iframe { width: 100%; height: 100%; border: none; }
        .epg-bar { background: #222; padding: 15px; width: 90%; max-width: 900px; margin: 0 auto; border-radius: 8px; }
        .live { color: #ff4545; font-weight: bold; }
    </style>
</head>
<body>

    <div id="player-container">
        <iframe id="main-player" src="" allow="autoplay; fullscreen" allowfullscreen></iframe>
    </div>

    <div class="epg-bar">
        <div id="now-playing"><span class="live">STATUS:</span> Loading...</div>
        <div id="next-up" style="color: #888; font-size: 0.9em; margin-top: 5px;"></div>
    </div>

    <script>
        const BASE_JSON_URL = "https://mstvnetwork.github.io/mstv4/epg.json";
        let currentUrl = "";

        async function loadEPG() {
            // 1. Correct cache-busting syntax
            const freshUrl = BASE_JSON_URL + "?v=" + Date.now();
            
            try {
                const res = await fetch(freshUrl);
                if (!res.ok) throw new Error("Network response was not ok");
                
                const data = await res.json();
                const now = new Date();
                
                // 2. Find the current show (Works for both [ ] and { schedule: [ ] } formats)
                const programs = Array.isArray(data) ? data : data.schedule;
                let currentIndex = programs.findIndex(item => {
                    const start = new Date(item.start);
                    const end = new Date(item.end);
                    return now >= start && now < end;
                });

                if (currentIndex !== -1) {
                    const currentShow = programs[currentIndex];
                    const nextShow = programs[currentIndex + 1];

                    // 3. Sync Video (only if URL changed)
                    const player = document.getElementById('main-player');
                    if (currentUrl !== currentShow.url) {
                        player.src = currentShow.url;
                        currentUrl = currentShow.url;
                    }

                    // 4. Update UI
                    document.getElementById('now-playing').innerHTML = `<span class="live">● LIVE:</span> ${currentShow.title}`;
                    document.getElementById('next-up').innerText = nextShow ? `NEXT: ${nextShow.title}` : "NEXT: End of Schedule";
                } else {
                    document.getElementById('now-playing').innerText = "OFF AIR";
                    document.getElementById('main-player').src = "";
                    currentUrl = "";
                }

            } catch(e) {
                console.error("Fetch error:", e);
                document.getElementById('now-playing').innerText = "Error Loading EPG";
            }
        }

        // Run every 10 seconds
        loadEPG();
        setInterval(loadEPG, 10000);
    </script>
</body>
</html>
