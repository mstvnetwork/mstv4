<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body { background: #111; color: #fff; font-family: sans-serif; text-align: center; }
        #player-container { width: 80%; margin: 20px auto; aspect-ratio: 16/9; background: #000; }
        iframe { width: 100%; height: 100%; border: none; }
        .epg-bar { background: #222; padding: 15px; width: 80%; margin: 0 auto; border-radius: 8px; }
        .live { color: #ff4545; font-weight: bold; }
        .next { color: #aaa; font-size: 0.9em; }
    </style>
</head>
<body>

    <div id="player-container">
        <iframe id="main-player" src="" allowfullscreen></iframe>
    </div>

    <div class="epg-bar">
        <div id="now-playing"><span class="live">LIVE:</span> Loading...</div>
        <div id="next-up" class="next">UP NEXT: Loading...</div>
    </div>

    <script>
 to give us the LATEST version
const jsonUrl = 'https://raw.githubusercontent.com' + new Date().getTime();

async function updatePlayer() {
    try {
        const response = await fetch(jsonUrl);
        const schedule = await response.json();
        
        // This 'now' uses your computer's exact clock
        const now = new Date();
        
        let currentIndex = schedule.findIndex(item => {
            // Fix: Ensure we parse the JSON string correctly as local time
            const startTime = new Date(item.start);
            const endTime = new Date(item.end);
            return now >= startTime && now < endTime;
        });

        if (currentIndex !== -1) {
            const currentShow = schedule[currentIndex];
            const nextShow = schedule[currentIndex + 1] || { title: "End of Stream" };

            // Update Iframe only if the URL is different to prevent refreshing the video
            const player = document.getElementById('main-player');
            if (player.src !== currentShow.url) {
                player.src = currentShow.url;
            }

            document.getElementById('now-playing').innerHTML = `<span class="live">NOW:</span> ${currentShow.title}`;
            document.getElementById('next-up').innerHTML = `UP NEXT: ${nextShow.title}`;
        } else {
            // If we are between 22:25 and 22:28, this shouldn't happen anymore
            document.getElementById('now-playing').innerText = "Off Air - No show scheduled for " + now.toLocaleTimeString();
        }
    } catch (err) {
        console.error("Error:", err);
        document.getElementById('now-playing').innerText = "Error loading schedule.";
    }
}

// Refresh every 10 seconds
setInterval(updatePlayer, 10000);
updatePlayer();

    </script>
</body>
</html>
