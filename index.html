<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        .crop-window {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            overflow: hidden;
            background: #000;
        }

        .crop-window iframe {
            position: absolute;
            width: 100%;
            height: 120%; /* Vertical crop to hide logo/bars */
            top: -10%; 
            left: 0;
            border: 0;
            /* Prevents clicking/scrubbing */
            pointer-events: none; 
        }

        /* The Shield ensures no touch/click reaches the iframe */
        .shield {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="crop-window">
        <div class="shield"></div>
        <iframe 
            src="https://www.youtube.com/embed/KMWcefrAKLg?si=cbCLpqbCnossfPvi" 
            allow="autoplay; encrypted-media">
        </iframe>
    </div>

</body>
</html>
