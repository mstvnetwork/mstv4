<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apna TV 24/7 - Cinema Mode</title>
    <style>
        /* Base Styling & Theme Colors */
        :root {
            --bg-color: #0d0d0c;
            --card-bg: #1a1a1a;
            --accent-color: #ff3b30;
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }

        /* Responsive Layout Grid */
        .cinema-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 24px;
            max-width: 1400px;
            margin: 0 auto;
        }

        @media (min-width: 992px) {
            .cinema-container {
                grid-template-columns: 3fr 1fr;
            }
        }

        /* Player Styling */
        .player-section {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        .video-wrapper video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* Status & Info Bars */
        .live-status-bar {
            background: var(--card-bg);
            padding: 16px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .badge {
            background: var(--accent-color);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        /* Sidebar & EPG Panels */
        .sidebar-section {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .epg-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid var(--accent-color);
        }

        .epg-title {
            font-size: 0.9rem;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .program-name {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 4px;
        }

        .program-time {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        /* Footer & Disclaimers */
        footer {
            margin-top: 40px;
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-muted);
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <div class="cinema-container">
        
        <!-- Left Side: Main Video Stream -->
        <main class="player-section">
            <div class="video-wrapper">
                <!-- Replace with your actual video element referenced in player.js -->
                <video id="videoPlayer" controls autoplay></video>
            </div>
            
            <div class="live-status-bar">
                <div>
                    <span class="badge">Live Now</span>
                    <span id="currentProgramTitle" style="margin-left: 10px; font-weight: bold;">Loading…</span>
                </div>
                <div class="program-time">Finishing At: <span id="currentProgramEnd">--:--</span></div>
            </div>
        </main>

        <!-- Right Side: Sidebar Program Guide (EPG) -->
        <aside class="sidebar-section">
            <div class="epg-card">
                <div class="epg-title">Coming Up Next</div>
                <div id="nextProgramTitle" class="program-name">Loading…</div>
                <div class="program-time">Starts At: <span id="nextProgramStart">--:--</span></div>
            </div>
            
            <!-- Channel / Playlist Selection placeholder -->
            <div class="epg-card" style="border-left-color: #444;">
                <div class="epg-title">Available Channels</div>
                <div id="channelListContainer">
                    <!-- Dynamic playlist.js items inject here -->
                </div>
            </div>
        </aside>

    </div>

    <footer>
        <p><strong>Disclaimer & Copyright:</strong> This app does not host or store media files. We provide a directory of publicly available streams.</p>
        <p>&copy; 2026 Your App Network. All Rights Reserved.</p>
    </footer>

    <!-- Hooks for your JavaScript logic -->
    <script src="playlist.json"></script>
    <script src="player.js"></script>
</body>
</html>
