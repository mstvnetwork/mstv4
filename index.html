<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MS-TV Player</title>
    <style>
        :root {
            --primary-red: #ff0000;
            --bg-dark: #121212;
            --card-bg: #1e1e1e;
            --text-main: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Player Container */
        .player-wrapper {
            position: relative;
            width: 100%;
            max-width: 800px;
            aspect-ratio: 16 / 9;
            margin-top: 20px;
            background: #000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Lockscreen Overlay */
        #lockscreen {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0); /* Transparent but blocks clicks */
            z-index: 10;
            cursor: not-allowed;
        }

        /* EPG Section */
        .epg-container {
            width: 100%;
            max-width: 800px;
            padding: 20px;
            box-sizing: border-box;
        }

        .epg-card {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-left: 4px solid transparent;
        }

        .epg-card.active {
            border-left: 4px solid var(--primary-red);
        }

        .dot {
            height: 10px;
            width: 10px;
            background-color: var(--primary-red);
            border-radius: 50%;
            display: inline-block;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.7; }
            70% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.7; }
        }

        .progress-bar {
            flex-grow: 1;
            height: 5px;
            background: #444;
            border-radius: 5px;
            overflow: hidden;
            margin-top: 8px;
        }

        #progress-fill {
            height: 100%;
            background: var(--primary-red);
            width: 0%;
        }

        footer {
            margin-top: auto;
            padding: 20px;
            font-size: 0.8rem;
            color: #777;
        }
    </style>
</head>
<body>

    <div class="player-wrapper">
        <div id="lockscreen"></div>
        <iframe id="main-player" src="" allowfullscreen></iframe>
    </div>

    <div class="epg-container">
        <div class="epg-card active">
            <div class="logo"><img src="https://via.placeholder.com/40" id="current-logo" alt="logo"></div>
            <div style="flex-grow:1">
                <div><span class="dot"></span> <strong>Now Playing</strong>: <span id="current-time-range">--:--</span></div>
                <div class="progress-bar"><div id="progress-fill"></div></div>
            </div>
        </div>

        <div class="epg-card">
            <div style="color: #aaa;">Next: Starts at <span id="next-start">--:--</span></div>
        </div>
    </div>

    <footer>
        &copy; 2026 MSTV4 Project. All rights reserved.
    </footer>

    <script>
        // Configuration
        const GITHUB_JSON_URL = 'https://raw.githubusercontent.com/mstvnetwork/mstv4/main/schedule.json';
        let schedule = [];
        
        async function init() {
            try {
                // 1. Fetch Schedule
                // const response = await fetch(GITHUB_JSON_URL);
                // schedule = await response.json();
                
                // Mock data for demonstration
                schedule = [
                    { title: "Stream 1", url: "https://www.youtube.com/embed/jfKfPfyJRdk", start: "00:00", end: "12:00" },
                    { title: "Stream 2", url: "https://www.youtube.com/embed/CHFif_y2TyM", start: "12:00", end: "23:59" }
                ];

                updatePlayer();
                setInterval(updatePlayer, 10000); // Check every 10s for schedule changes
                
                // 2. Lockscreen Timer (40 Seconds)
                setTimeout(() => {
                    document.getElementById('lockscreen').style.display = 'block';
                    console.log("Player locked.");
                }, 40000);

            } catch (err) {
                console.error("Failed to load schedule", err);
            }
        }

        function updatePlayer() {
            const now = new Date();
            const currentTime = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
            
            const currentItem = schedule.find(item => currentTime >= item.start && currentTime < item.end);
            const player = document.getElementById('main-player');
            
            if (currentItem && player.src !== currentItem.url) {
                player.src = currentItem.url;
                document.getElementById('current-time-range').innerText = `${currentItem.start} - ${currentItem.end}`;
                
                // Set Next Start
                const currentIndex = schedule.indexOf(currentItem);
                const nextItem = schedule[currentIndex + 1] || schedule;
                document.getElementById('next-start').innerText = nextItem.start;
            }

            // Update Progress Bar (dummy calculation for demo)
            const progress = (now.getMinutes() / 60) * 100;
            document.getElementById('progress-fill').style.width = progress + "%";
        }

        init();
    </script>
</body>
</html>
