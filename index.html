<!DOCTYPE html>

<head>

    <title>Channel Card Test</title>
    <style>
        body { background: #0b0b0b; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; }
        
        .channel-card {
            width: 320px;
            background: #181818;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            transition: transform 0.3s ease;
            text-decoration: none;
            color: #fff;
            border: 1px solid #2a2a2a;
            display: block;
        }

        .channel-card:hover { transform: translateY(-10px); border-color: #e50914; }
        .thumb { height: 180px; background: #222; display: flex; align-items: center; justify-content: center; font-size: 50px; }
        .info { padding: 25px; text-align: center; }
        .info h3 { margin: 0; font-size: 22px; letter-spacing: 1px; }
        .info p { color: #999; margin-top: 10px; font-size: 14px; }
        .btn { display: inline-block; margin-top: 15px; padding: 10px 25px; background: #e50914; border-radius: 5px; font-weight: bold; text-transform: uppercase; font-size: 12px; }
    </style>
</head>
