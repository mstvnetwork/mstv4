<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSTV Network | Live Streaming</title>
    
    <!-- Player Libraries -->
    <script defer src="./shaka.js"></script>
    <script defer src="https://cdn.jsdelivr.net"></script>

    <style>
        :root {
            --bg-dark: #0F1115;
            --accent: #90EE90;
            --header-h: 70px;
            --player-y: 70px; /* Header Height */
        }

        html { 
            /* Fixes anchor links/scroll position from being hidden */
            scroll-padding-top: 350px; 
            scroll-behavior: smooth;
        }

        body { 
            margin: 0; padding: 0; 
            font-family: Arial, sans-serif; 
            background: var(--bg-dark); 
            color: #E0E0E0; 
        }

        /* 1. STICKY HEADER */
        header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(15, 17, 21, 0.98);
            backdrop-filter: blur(10px);
            height: var(--header-h);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 5%;
            border-bottom: 1px solid #222;
        }

        .logo-section { display: flex; flex-direction: column; }
        .brand-name {
            font-size: 1.4rem;
            font-weight: bold;
            background: linear-gradient(90deg, #90EE90, #00FFA3);
            -webkit-background-clip: text;
            color: transparent;
            line-height: 1;
        }
        .slogan { font-size: 0.7rem; color: #777; margin-top: 4px; }

        .search-container { flex-grow: 0.4; max-width: 350px; }
        .search-container input {
            width: 100%;
            padding: 10px 15px;
            border-radius: 25px;
            border: 1px solid #333;
            background: #1A1D20;
            color: white;
            outline: none;
        }

        /* 2. STICKY PLAYER */
        .sticky-player-wrapper {
            position: sticky;
            top: var(--player-y);
            z-index: 900;
            background: var(--bg-dark);
            padding: 15px 0;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            border-bottom: 1px solid #222;
        }

        .player-container {
            width: 95%;
            max-width: 600px;
            aspect-ratio: 16/9;
            background: #000;
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        video, iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; display: none; }
        #placeholder { height: 100%; display: flex; align-items: center; justify-content: center; font-size: 5rem; color: var(--accent); }
        #loading { color: var(--accent); font-weight: bold; margin-top: 10px; display: none; }
        #live-stamp { position: absolute; top: 10px; left: 10px; background: #E50914; color: white; padding: 5px 12px; border-radius: 5px; font-size: 0.75rem; font-weight: bold; z-index: 50; display: none; }

/* 1. Ultra-compact grid columns */
.channel-grid {
    display: grid;
    /* Reduced from 110px to 80px */
    grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); 
    gap: 8px; 
    margin-bottom: 30px;
}

.channel-card {
    background: var(--bg-card);
    border-radius: 8px;
    padding: 4px; /* Reduced from 8px to pull text closer to edges */
    text-align: center;
    cursor: pointer;
    border: 1px solid #1E232B;
    transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}

.card-logo {
    aspect-ratio: 1/1;
    background: #0B0D11;
    border-radius: 6px;
    margin-bottom: 2px; /* Tightened from 6px to bring text right under logo */
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
}

.channel-name {
    font-size: 0.62rem; /* Slightly smaller for the tighter layout */
    font-weight: 600;
    color: var(--text-dim);
    display: block;
    line-height: 1.1; /* Tighter line height */
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    padding-bottom: 2px; /* Small buffer at the bottom */
}


/* 4. Desktop Hover - subtle zoom */
.channel-card:hover {
    transform: scale(1.05);
    border-color: var(--accent);
    background: #1A1D20;
}

/* 5. Mobile (Very small screens) */
@media (max-width: 600px) {
    .channel-grid { 
        grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); 
        gap: 6px;
    }
}

        /* Footer */
        .site-footer { padding: 40px 5%; text-align: center; font-size: 0.9rem; color: #777; border-top: 1px solid #222; }

        @media (max-width: 600px) {
            .search-container { display: none; }
            .channel-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); }
        }
    </style>
</head>
<body>

<header id="site-header">
    <div class="logo-section">
        <div class="brand-name">MSTV NETWORK</div>
        <div class="slogan">LIVE INDIAN & PUNJABI TV</div>
    </div>
    <div class="search-container">
        <input type="text" id="channel-search" placeholder="Search for channels...">
    </div>
</header>

<div class="sticky-player-wrapper" id="player-wrapper">
    <div class="player-container">
        <div id="live-stamp">LIVE</div>
        <div id="placeholder">📺</div>
        <video id="video-player" autoplay playsinline controls></video>
        <iframe id="iframe-player" sandbox="allow-scripts allow-same-origin allow-presentation" allow="autoplay; encrypted-media"></iframe>
    </div>
    <div id="loading">🌀 Buffering... Please Wait</div>
</div>

<main>
    <select id="channel-select" style="display:none;"></select>
    <h2 class="grid-header">Available Channels</h2>
    <div class="channel-grid" id="channel-list-container"></div>
</main>

<footer class="site-footer">
    <p>© 2026 MSTV Network. All Rights Reserved.</p>
</footer>

<script>
const select = document.getElementById('channel-select');
const video = document.getElementById('video-player');
const iframe = document.getElementById('iframe-player');
const placeholder = document.getElementById('placeholder');
const loader = document.getElementById('loading');
const liveStamp = document.getElementById('live-stamp');
const gridContainer = document.getElementById('channel-list-container');
const searchInput = document.getElementById('channel-search');
const JSON_URL = './channels.json';

let channels = [];
let hls = null;
let shakaPlayer = null;

// Playback Logic (Intact)
async function stopAll() {
  if(loader) loader.style.display = 'none';
  liveStamp.style.display = 'none';
  if(hls){ hls.destroy(); hls = null; }
  if(shakaPlayer){ await shakaPlayer.destroy(); shakaPlayer = null; }
  video.pause(); video.removeAttribute('src'); video.load();
  iframe.removeAttribute('src'); iframe.src = 'about:blank';
  video.style.display = 'none'; iframe.style.display = 'none';
  placeholder.style.display = 'flex';
}

function renderUI(data){
  channels = data;
  select.innerHTML = '<option value="">📱Click & Select Channel</option>';
  gridContainer.innerHTML = ''; 
  data.forEach((ch, i) => {
    const opt = document.createElement("option");
    opt.value = i; opt.textContent = ch.name; select.appendChild(opt);
    const card = document.createElement('div');
    card.className = 'channel-card';
    card.setAttribute('data-name', ch.name.toLowerCase());
    card.innerHTML = `
      <div class="card-logo">${ch.logo ? `<img src="${ch.logo}" alt="${ch.name}" loading="lazy">` : `<span style="font-size:2rem;">📺</span>`}</div>
      <div class="channel-name">${ch.name}</div>
    `;
    card.onclick = () => { playChannel(i); window.scrollTo({top: 0, behavior: 'smooth'}); };
    gridContainer.appendChild(card);
  });
}

if(searchInput) {
    searchInput.oninput = (e) => {
        const term = e.target.value.toLowerCase();
        document.querySelectorAll('.channel-card').forEach(card => {
            card.style.display = card.getAttribute('data-name').includes(term) ? 'block' : 'none';
        });
    };
}

async function loadChannels(){
  const cached = localStorage.getItem("channels_cache");
  if(cached) renderUI(JSON.parse(cached));
  try {
    const res = await fetch(JSON_URL, { cache: 'force-cache' });
    const data = await res.json();
    localStorage.setItem('channels_cache', JSON.stringify(data));
    renderUI(data);
  } catch(e){ console.error('Channels load failed', e); }
}

async function playChannel(index){
  const channel = channels[index];
  if(!channel) return;
  await stopAll();
  if(loader) loader.style.display = 'block';
  placeholder.style.display = 'none';
  liveStamp.style.display = channel.isLive ? 'block' : 'none';
  if(channel.type === 'iframe'){
    iframe.style.display = 'block'; iframe.src = channel.url;
    iframe.onload = () => { if(loader) loader.style.display = 'none'; };
    return;
  }
  video.style.display = 'block';
  const isHls = channel.type === 'hls' || channel.url.includes('.m3u8');
  if(isHls){
    if(window.Hls && Hls.isSupported()){
      hls = new Hls({ enableWorker:true, lowLatencyMode:true });
      hls.loadSource(channel.url); hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, ()=> video.play());
    } else if(video.canPlayType('application/vnd.apple.mpegurl')){
      video.src = channel.url; video.play();
    }
    return;
  }
  if(window.shaka && shaka.Player.isBrowserSupported()){
    shaka.polyfill.installAll();
    shakaPlayer = new shaka.Player(video);
    try{ await shakaPlayer.load(channel.url); video.play(); } catch(e){ console.error(e); }
  }
}

video.onplaying = () => { if(loader) loader.style.display = 'none'; };
loadChannels();
</script>

</body>
</html>
