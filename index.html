<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>MSTV Network | Live Indian TV</title>
<style>
/* BODY STABILITY */
html, body {
  overflow-x: hidden; 
  scroll-behavior: smooth;
  touch-action: pan-x pan-y;
  overscroll-behavior: none;
  margin: 0;
  padding: 0;
  font-family: Arial, sans-serif;
  background: #0b0f14;
  color: #e6edf3;
}

/* HEADER */
.topbar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 100;
  background: #0b0f14;
  border-bottom: 1px solid #1f2937;
  display: flex;
  justify-content: center;
  height: 48px;
}

.topbar-inner {
  width: 95%;
  max-width: 1200px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 0;
  box-sizing: border-box;
}

/* BRAND */
.brand {
  display: flex;
  align-items: center;
  gap: 8px;
}

.logo-img {
  width: 36px;
  height: 36px;
}

.brand-text {
  display: flex;
  flex-direction: column;
  line-height: 1;
}

.brand-name {
  font-weight: 600;
  font-size: 14px;
  color: #00ffa3;
}

.brand-slogan {
  font-size: 10px;
  opacity: 0.7;
}

/* SEARCH */
#search {
  width: 180px;
  padding: 6px 10px;
  border-radius: 6px;
  border: 1px solid #1f2937;
  background: #121820;
  color: white;
  font-size: 13px;
}

/* STICKY PLAYER */
.player-sticky {
  position: fixed;
  top: 48px; /* below header */
  left: 50%;
  transform: translateX(-50%);
  z-index: 90;
  width: 95%;
  max-width: 1000px;
  display: flex;
  justify-content: center;
  padding: 6px 0;
  background: #0b0f14;
  border-bottom: 1px solid #1f2937;
}

.player-container {
  position: relative;
  width: 100%;
  aspect-ratio: 16/9;
  background: #000;
  border-radius: 12px;
  overflow: hidden;
}

/* CHANNEL GRID */
.channels {
  margin-top: calc(48px + 16px + (1000px * 9 / 16 / 1)); /* header + player height */
  width: 95%;
  max-width: 1200px;
  padding: 20px 16px;
  margin-left: auto;
  margin-right: auto;
  box-sizing: border-box;
}

#channel-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 16px;
}

/* CHANNEL CARD */
.channel-card {
  background: #121820;
  border-radius: 10px;
  padding: 10px;
  text-align: center;
  cursor: pointer;
  border: 1px solid #1f2937;
  transition: 0.2s;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.channel-card img {
  width: 100%;
  height: 80px;
  object-fit: contain;
}

.channel-card span {
  font-size: 13px;
  margin-top: 4px;
  text-align: center;
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <img src="https://mstvnet.netlify.app/mstv-thumbnail.png" class="logo-img">
      <div class="brand-text">
        <div class="brand-name">MSTV Network</div>
        <div class="brand-slogan">Watch Indian TV Channels Live</div>
      </div>
    </div>
    <input id="search" placeholder="Search channel">
  </div>
</header>

<!-- PLAYER -->
<div class="player-sticky">
  <div class="player-container">
    <div id="placeholder">📺</div>
    <video id="video-player" autoplay playsinline controls></video>
    <iframe id="iframe-player" sandbox="allow-scripts allow-same-origin allow-presentation" allow="autoplay; encrypted-media; picture-in-picture"></iframe>
    <div id="live-stamp">LIVE</div>
  </div>
</div>

<!-- CHANNEL GRID -->
<div class="channels">
  <div id="channel-grid"></div>
</div>

<!-- Add your existing JS here for lazy loading, search, and playback -->
<script src="./your-lazy-loading-script.js"></script>

</body>
</html>
