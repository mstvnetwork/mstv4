<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Player</title>

<style>
:root { 
    --bg-black: #0a0a0a; 
    --accent: #e50914; /* Netflix Red style */
    --glass: rgba(255, 255, 255, 0.1);
}

* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; }
html, body { height: 100%; width: 100%; background-color: var(--bg-black); color: white; overflow: hidden; }

/* Fixed Fullscreen Player Container */
.player-wrapper {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    z-index: 1;
}

#videoPlayer {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border: none;
}

/* UI Overlay Container */
.ui-layer {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    z-index: 10;
    background: linear-gradient(transparent, rgba(0,0,0,0.9));
    padding: 40px 20px 20px;
    pointer-events: none;
}

/* EPG Cards */
.epg-container {
    display: flex;
    gap: 20px;
    margin-bottom: 20px;
    pointer-events: auto;
}

.epg-card {
    background: var(--glass);
    backdrop-filter: blur(10px);
    padding: 15px;
    border-radius: 8px;
    min-width: 280px;
    border-left: 4px solid var(--accent);
}

.epg-card.next {
    border-left-color: #666;
    opacity: 0.8;
}

.label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: #aaa; margin-bottom: 5px; }
.title { font-size: 1.1rem; font-weight: bold; margin-bottom: 5px; }
.time { font-size: 0.85rem; color: #eee; }

/* Progress Bar */
.progress-container {
    width: 100%;
    height: 6px;
    background: rgba(255,255,255,0.2);
    border-radius: 3px;
    margin: 15px 0;
    overflow: hidden;
}

#progressBar {
    height: 100%;
    width: 0%;
    background: var(--accent);
    transition: width 1s linear;
}

/* Footer */
.footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.8rem;
    color: #888;
}

#silentLockOverlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 9999; 
    pointer-events: none; 
}

#browser-error { display: none; background: #000; height: 100vh; display: flex; align-items: center; justify-content: center; }
</style>
</head>
<body>

<div id="browser-error">
    <h2 style="color: white;">Chrome Browser Required for Cinema Mode</h2>
</div>

<div id="chrome-only-content" style="display:none;">
    <div class="player-wrapper">
        <iframe id="videoPlayer" sandbox="allow-scripts allow-same-origin allow-forms allow-presentation" playsinline></iframe>
        <div id="silentLockOverlay"></div>
        
        <div class="ui-layer">
            <div class="epg-container">
                <div class="epg-card">
                    <div class="label">Now Playing</div>
                    <div id="currentTitle" class="title">Loading...</div>
                    <div id="currentTimeRange" class="time">--:-- until --:--</div>
                </div>
                <div class="epg-card next">
                    <div class="label">Up Next</div>
                    <div id="nextTitle" class="title">Scanning...</div>
                    <div id="nextStartTime" class="time">Starts at --:--</div>
                </div>
            </div>

            <div class="progress-container">
                <div id="progressBar"></div>
            </div>

            <div class="footer">
                <div>&copy; 2026 MSNET IPTV • Cinema Mode Active</div>
                <div id="liveClock">00:00:00</div>
            </div>
        </div>
    </div>
</div>

<script>
const BASE_JSON_URL = "https://raw.githubusercontent.com/mstvnetwork/mstv4/main/schedule.json"; // Update with your actual URL

const playlist = [
    { title: "Indian Idol", url: "https://vkprime.com/embed-k1ipwza01c0d.html" },
    { title: "Mtv", url: "https://vkprime.com/embed-e6r4icq8gcq1.html" }
];

let silentLockTimer;
const lockOverlay = document.getElementById('silentLockOverlay');

function isStrictChrome() {
    const ua = navigator.userAgent;
    return (ua.indexOf("Chrome") > -1 || ua.indexOf("CriOS") > -1) && 
           !(ua.indexOf("Edg") > -1 || ua.indexOf("SamsungBrowser") > -1 || ua.indexOf("OPR") > -1);
}

function formatTime(dateString) {
    if(!dateString) return "--:--";
    const d = new Date(dateString);
    return d.getHours().toString().padStart(2, '0') + ":" + d.getMinutes().toString().padStart(2, '0');
}

function updateClock() {
    const now = new Date();
    document.getElementById('liveClock').innerText = now.toLocaleTimeString();
}

async function loadEPG() {
    const freshUrl = BASE_JSON_URL + "?v=" + Date.now();
    
    try {
        const res = await fetch(freshUrl);
        if (!res.ok) throw new Error("Fetch failed");
        
        const data = await res.json();
        const now = new Date();
        let currentProg = null;
        let nextProg = null;

        for (let i = 0; i < data.schedule.length; i++) {
            const start = new Date(data.schedule[i].start);
            const end = new Date(data.schedule[i].end);
            
            if (now >= start && now < end) {
                currentProg = data.schedule[i];
                nextProg = data.schedule[i + 1] || null;
                
                // Calculate Progress
                const total = end - start;
                const elapsed = now - start;
                const percent = (elapsed / total) * 100;
                document.getElementById('progressBar').style.width = percent + "%";
                break;
            }
        }

        if(currentProg) {
            updateUI(currentProg, nextProg);
            syncVideo(currentProg.title);
        } else {
            rotateLocal();
        }

    } catch(e) {
        rotateLocal();
    }
}

function updateUI(current, next) {
    document.getElementById('currentTitle').innerText = current.title;
    document.title = "Player | " + current.title;
    document.getElementById('currentTimeRange').innerText = `${formatTime(current.start)} until ${formatTime(current.end)}`;
    
    if(next) {
        document.getElementById('nextTitle').innerText = next.title;
        document.getElementById('nextStartTime').innerText = `Starts at ${formatTime(next.start)}`;
    } else {
        document.getElementById('nextTitle').innerText = "TBA";
        document.getElementById('nextStartTime').innerText = "Check back later";
    }
}

function rotateLocal() {
    const player = document.getElementById('videoPlayer');
    const currentIndex = playlist.findIndex(v => v.url === player.src);
    const nextIndex = (currentIndex + 1) % playlist.length;
    document.getElementById('currentTitle').innerText = playlist[nextIndex].title;
    syncVideo(playlist[nextIndex].title);
}

function syncVideo(liveTitle){
    const player = document.getElementById('videoPlayer');
    let liveVideo = playlist.find(v => v.title === liveTitle);

    if(liveVideo && player.src !== liveVideo.url){
        player.src = liveVideo.url;
        
        clearTimeout(silentLockTimer);
        lockOverlay.style.pointerEvents = 'none'; 
        silentLockTimer = setTimeout(() => {
            lockOverlay.style.pointerEvents = 'auto';
        }, 40000); 
    }
}

window.onload = function(){
    if(isStrictChrome()){
        document.getElementById('chrome-only-content').style.display='block';
        document.getElementById('browser-error').style.display='none';
        loadEPG();
        setInterval(loadEPG, 30000); // More frequent updates for the progress bar
        setInterval(updateClock, 1000);
    } else {
        document.getElementById('browser-error').style.display='flex';
    }
};
</script>
</body>
</html>
