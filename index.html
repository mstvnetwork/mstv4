<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Linear TV</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --bg:#080808; --surface:#111111; --border:#222222;
    --accent:#e8ff00; --accent2:#ff4444;
    --text:#f0f0f0; --muted:#666666;
    --scanline:rgba(255,255,255,0.015);
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;height:100%;overflow:hidden}
  body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;background:repeating-linear-gradient(0deg,transparent,transparent 2px,var(--scanline) 2px,var(--scanline) 4px)}
  body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9998;background:radial-gradient(ellipse at center,transparent 60%,rgba(0,0,0,0.7) 100%)}

  .shell{display:flex;flex-direction:column;height:100vh;max-width:1400px;margin:0 auto}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--bg)}
  .logo{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px;color:var(--accent);text-shadow:0 0 20px rgba(232,255,0,0.4);line-height:1}
  .logo span{color:var(--text);display:block;margin-top:-4px;opacity:0.5;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:6px}
  .clock-block{font-family:'DM Mono',monospace;text-align:right;line-height:1.3}
  .clock-time{font-size:22px;font-weight:500;color:var(--text);letter-spacing:2px}
  .clock-date{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase}
  .live-badge{display:flex;align-items:center;gap:7px;font-family:'DM Mono',monospace;font-size:11px;font-weight:500;letter-spacing:2px;color:var(--accent2);border:1px solid var(--accent2);padding:5px 12px;text-transform:uppercase}
  .live-dot{width:7px;height:7px;border-radius:50%;background:var(--accent2);animation:blink 1.2s ease-in-out infinite}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
  @keyframes spin{to{transform:rotate(360deg)}}

  .main{display:flex;flex:1;overflow:hidden}
  .video-col{flex:1;display:flex;flex-direction:column;overflow:hidden}
  .video-wrap{position:relative;flex:1;background:#000;overflow:hidden}

  video,#mainIframe{width:100%;height:100%;display:block}
  video{object-fit:contain}
  #mainIframe{border:none;position:absolute;inset:0}

  .controls{position:absolute;bottom:0;left:0;right:0;padding:20px 24px 16px;background:linear-gradient(transparent,rgba(0,0,0,0.85));display:flex;align-items:center;gap:16px;opacity:0;transition:opacity 0.3s;z-index:10}
  .video-wrap:hover .controls{opacity:1}
  .btn-play{width:38px;height:38px;border:1px solid rgba(255,255,255,0.3);background:rgba(255,255,255,0.1);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background 0.2s;font-size:14px}
  .btn-play:hover{background:rgba(255,255,255,0.25)}
  .vol-wrap{display:flex;align-items:center;gap:8px;color:rgba(255,255,255,0.7);font-size:13px;transition:opacity 0.3s}
  input[type=range].vol{-webkit-appearance:none;appearance:none;width:80px;height:3px;background:rgba(255,255,255,0.25);outline:none;cursor:pointer}
  input[type=range].vol::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;background:var(--accent);cursor:pointer}

  /* Vol note shown when iframe is active (can't control cross-origin audio) */
  .vol-iframe-note{display:none;align-items:center;gap:6px;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1px;color:rgba(255,255,255,0.35);text-transform:uppercase}

  .now-playing-overlay{position:absolute;top:16px;left:20px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,0.5);pointer-events:none;z-index:10}
  .now-playing-overlay strong{display:block;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;color:rgba(255,255,255,0.9);letter-spacing:0;margin-top:3px;text-transform:none}

  .loader{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg);gap:14px;transition:opacity 0.4s;z-index:20}
  .loader.hidden{opacity:0;pointer-events:none}
  .loader-ring{width:40px;height:40px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.9s linear infinite}
  .loader-text{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--muted);text-transform:uppercase}

  .error-msg{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--accent2);font-family:'DM Mono',monospace;font-size:11px;letter-spacing:1px;z-index:20}
  .error-msg.show{display:flex}

  .progress-track{height:2px;background:var(--border);overflow:hidden;flex-shrink:0}
  .progress-fill{height:100%;background:var(--accent);width:0%;transition:width 1s linear;box-shadow:0 0 8px rgba(232,255,0,0.6)}

  .sidebar{width:280px;flex-shrink:0;border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;background:var(--surface)}
  .sidebar-header{padding:14px 16px;border-bottom:1px solid var(--border);font-family:'DM Mono',monospace;font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);flex-shrink:0}
  .schedule-list{overflow-y:auto;flex:1;scrollbar-width:none}
  .schedule-list::-webkit-scrollbar{display:none}
  .schedule-item{padding:12px 16px;border-bottom:1px solid var(--border)}
  .schedule-item.active{background:rgba(232,255,0,0.04);border-left:2px solid var(--accent);padding-left:14px}
  .schedule-item.past{opacity:0.35}
  .s-time{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1px;color:var(--muted);margin-bottom:4px;text-transform:uppercase}
  .s-title{font-size:12px;font-weight:500;color:var(--text);line-height:1.3}
  .s-duration{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);margin-top:3px}
  .s-active-tag{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:1.5px;color:var(--accent);text-transform:uppercase;margin-top:4px}

  .statusbar{border-top:1px solid var(--border);padding:6px 20px;display:flex;align-items:center;justify-content:space-between;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;flex-shrink:0;background:var(--bg)}
  .status-viewers{display:flex;align-items:center;gap:6px}
  .status-dot{width:5px;height:5px;border-radius:50%;background:var(--accent);animation:blink 2s ease-in-out infinite}

  .sync-toast{position:fixed;top:70px;right:20px;background:rgba(232,255,0,0.1);border:1px solid var(--accent);color:var(--accent);font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1.5px;padding:8px 14px;text-transform:uppercase;opacity:0;transition:opacity 0.4s;pointer-events:none;z-index:1000}
  .sync-toast.show{opacity:1}
  .update-toast{position:fixed;top:110px;right:20px;background:rgba(0,200,100,0.1);border:1px solid #00c864;color:#00c864;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1.5px;padding:8px 14px;text-transform:uppercase;opacity:0;transition:opacity 0.4s;pointer-events:none;z-index:1000}
  .update-toast.show{opacity:1}

  @media(max-width:700px){.sidebar{display:none}.logo span{display:none}}
  @media(max-width:480px){.clock-date{display:none}.live-badge{padding:4px 8px;font-size:9px}}
</style>
</head>
<body>
<div class="shell">
  <header class="topbar">
    <div class="logo">LINEAR<span>BROADCAST NETWORK</span></div>
    <div class="live-badge"><div class="live-dot"></div>Live</div>
    <div class="clock-block">
      <div class="clock-time" id="clock">--:--:--</div>
      <div class="clock-date" id="clock-date">---</div>
    </div>
  </header>

  <div class="main">
    <div class="video-col">
      <div class="video-wrap" id="videoWrap">
        <div class="loader" id="loader"><div class="loader-ring"></div><div class="loader-text">Tuning in...</div></div>
        <div class="error-msg" id="errorMsg"><div style="font-size:32px">📡</div><div>Signal lost — retrying</div></div>
        <video id="vid" playsinline></video>
        <iframe id="mainIframe" allowfullscreen allow="autoplay; fullscreen" style="display:none"></iframe>
        <div class="now-playing-overlay">Now playing<strong id="nowPlayingTitle">—</strong></div>
        <div class="controls">
          <button class="btn-play" id="btnPlay">▶</button>
          <div class="vol-wrap" id="volWrap">
            <span>🔊</span>
            <input type="range" class="vol" id="volSlider" min="0" max="1" step="0.05" value="0.8">
          </div>
          <div class="vol-iframe-note" id="volOverlay">🔊 Use player controls for volume</div>
        </div>
      </div>
      <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    </div>

    <aside class="sidebar">
      <div class="sidebar-header">Schedule</div>
      <div class="schedule-list" id="scheduleList"></div>
    </aside>
  </div>

  <footer class="statusbar">
    <div class="status-viewers"><div class="status-dot"></div><span id="statusText">Syncing...</span></div>
    <div id="statusOffset">OFFSET —</div>
    <div>No DVR · No rewind · Live only</div>
  </footer>
</div>

<div class="sync-toast" id="syncToast">⟳ Resynced to live</div>
<div class="update-toast" id="updateToast">↻ Playlist updated</div>

<script src="./player.js"></script>
<script>
initPlayer({
  videoId:'vid', iframeId:'mainIframe',
  loaderId:'loader', errorId:'errorMsg',
  btnPlayId:'btnPlay', volSliderId:'volSlider',
  progressFillId:'progressFill', scheduleListId:'scheduleList',
  syncToastId:'syncToast', updateToastId:'updateToast',
  statusTextId:'statusText', statusOffsetId:'statusOffset',
  nowTitleId:'nowPlayingTitle', volOverlayId:'volOverlay',
  clockId:'clock', clockDateId:'clock-date',
  showClock:true, showSchedule:true, showStatusBar:true
});
</script>
</body>
</html>
