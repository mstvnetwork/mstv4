<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF‑8">
<meta name="viewport" content="width=device‑width, initial‑scale=1, maximum‑scale=1, user‑scalable=no">
<title>MSTV Network | Live TV</title>

<style>

/* Prevent sideways overflow */
html, body {
  margin: 0;
  padding: 0;
  overflow: hidden; /* BODY does not scroll */
  font-family: Arial, sans-serif;
  background: #0b0f14;
  color: #e6edf3;
}

/* HEADER */
.topbar {
  position: fixed;
  top: 0;
  left: 0; right: 0;
  z-index: 100;
  height: 48px;
  background: #0b0f14;
  border-bottom: 1px solid #1f2937;
  display: flex;
  justify-content: center;
  align-items: center;
}

.topbar-inner {
  width: 95%;
  max-width: 1200px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.brand {
  display: flex;
  align-items: center;
  gap: 8px;
}
.logo-img {
  width: 36px;
  height: 36px;
}
.brand-name {
  font-weight: 600;
  font-size: 14px;
  color: #00ffa3;
}
.brand-slogan {
  font-size: 10px;
  opacity: 0.7;
}
#search {
  width: 180px;
  padding: 6px 10px;
  border-radius: 6px;
  border: 1px solid #1f2937;
  background: #121820;
  color: #fff;
  font-size: 13px;
}

/* FIXED PLAYER */
.player-container {
  position: fixed;
  top: 48px;  /* header height */
  left: 50%;
  transform: translateX(-50%);
  z-index: 90;
  width: 95%;
  max-width: 1000px;
  aspect-ratio: 16/9;
  background: #000;
  border-radius: 12px;
  overflow: hidden;
  border-bottom: 1px solid #1f2937;
}

/* SCROLLABLE CHANNEL LIST */
.channels-scroll {
  position: absolute;
  top: calc(48px + 16px + (1000px * 9 / 16));  /* header + player height */
  bottom: 0;
  left: 0; right: 0;
  overflow-y: auto;
  padding: 20px;
  box-sizing: border-box;
}

/* GRID */
#channel-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 16px;
}

.channel-card {
  background: #121820;
  border-radius: 10px;
  padding: 10px;
  text-align: center;
  cursor: pointer;
  border: 1px solid #1f2937;
  transition: 0.2s;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.channel-card img {
  width: 100%;
  height: 80px;
  object-fit: contain;
}
.channel-card span {
  font-size: 13px;
  margin-top: 4px;
}

#loading {
  text-align: center;
  color: #90EE90;
  padding: 12px;
  font-weight: bold;
}

#live-stamp {
  position: absolute;
  top: 6px;
  left: 6px;
  background: #E50914;
  color: #fff;
  padding: 4px 8px;
  font-size: 11px;
  border-radius: 4px;
  display: none;
  z-index: 50;
}

</style>
</head>

<body>

<!-- FIXED HEADER -->
<header class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <img src="https://mstvnet.netlify.app/mstv-thumbnail.png" class="logo-img">
      <div>
        <div class="brand-name">MSTV Network</div>
        <div class="brand-slogan">Watch Indian TV Live</div>
      </div>
    </div>
    <input id="search" placeholder="Search channel">
  </div>
</header>

<!-- FIXED PLAYER -->
<div class="player-container">
  <div id="placeholder">📺</div>
  <video id="video-player" autoplay playsinline controls></video>
  <iframe id="iframe-player" sandbox="allow-scripts allow-same-origin allow-presentation" allow="autoplay; encrypted-media; picture-in-picture"></iframe>
  <div id="live-stamp">LIVE</div>
</div>

<!-- SCROLLABLE CHANNEL LIST -->
<div class="channels-scroll">
  <div id="loading">🌀 Wait Loading...</div>
  <div id="channel-grid"></div>
</div>

<!-- JS code inserted here -->
<script>
//… same playback + lazy loading + search logic you already have …
</script>

</body>
</html>
