<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>MSTV Network</title>
<link rel="icon" href="https://mstvnet.netlify.app/mstv-thumbnail.png">

<script defer src="./shaka.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
/* PAGE BASE */
html, body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #ffffff;
    color: #0F1115;
    line-height: 1.5;
}

/* HEADER */
.sticky-header {
    position: sticky;
    top: 0;
    z-index: 1000;
    height: 65px; /* header height */
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 15px;
    background: #ffffff;
    box-shadow: 0 3px 10px rgba(0,0,0,.2);
    flex-wrap: wrap;
}
.brand {
    display: flex;
    align-items: center;
    gap: 10px;
}
.logo {
    width: 38px;
    height: 38px;
    border-radius: 8px;
}
.site-name {
    font-weight: 700;
    font-size: 18px;
}
.tagline {
    font-size: 11px;
    color: #555;
}
#search {
    padding: 8px 12px;
    border-radius: 20px;
    border: none;
    background: #e0e0e0;
    color: #0F1115;
    width: 160px;
}

/* PLAYER */
.player-sticky {
    position: sticky;
    top: 65px; /* below header */
    z-index: 950;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 10px;
}
.player-container {
    width: 95%;
    max-width: 900px;
    aspect-ratio: 16/9; /* maintain 16:9 */
    background: #ffffff;
    border-radius: 12px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
}
video, iframe {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
    z-index: 5;
    display: none;
}
#placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 60px;
    color: #0F1115;
    background: #ffffff;
    z-index: 1;
}
#loading {
    display: none;
    margin: 10px;
}
#live-stamp {
    position: absolute;
    top: 8px;
    left: 8px;
    background: #E50914;
    color: #fff;
    font-size: 11px;
    padding: 4px 8px;
    border-radius: 5px;
    display: none;
    z-index: 10;
}

/* CHANNEL GRID */
.channels-section {
    max-width: 900px;
    margin: auto;
    margin-top: 20px;
    padding: 10px;
}
.channels-title {
    font-size: 16px;
    margin-bottom: 10px;
}
.channel-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill,minmax(120px,1fr));
    gap: 12px;
    max-height: 420px;
    overflow-y: auto;
}
.channel-grid::-webkit-scrollbar {
    width: 6px;
}
.channel-grid::-webkit-scrollbar-thumb {
    background: #ccc;
    border-radius: 5px;
}
.channel-card {
    height: 95px;
    background: #f0f0f0;
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    cursor: pointer;
    transition: .2s;
    color: #0F1115;
    text-align: center;
    padding: 5px;
}
.channel-card:hover {
    transform: scale(1.05);
    box-shadow: 0 4px 12px rgba(0,0,0,.3);
}
.channel-card img {
    width: 48px;
    height: 48px;
    object-fit: contain;
}

/* MOBILE GRID */
@media (max-width: 600px) {
    .channel-grid {
        grid-template-columns: repeat(3,1fr);
    }
    .channel-card {
        height: 85px;
    }
}

/* hidden dropdown */
#channel-select {
    display: none;
}
</style>
</head>

<body>

<header class="sticky-header">
    <div class="brand">
        <img src="https://mstvnet.netlify.app/mstv-thumbnail.png" class="logo">
        <div>
            <div class="site-name">MSTV NETWORK</div>
            <div class="tagline">Indian TV • Punjabi • Cricket</div>
        </div>
    </div>
    <input id="search" placeholder="Search channel">
</header>

<section class="player-sticky">
    <div id="loading">Loading...</div>
    <div class="player-container">
        <div id="placeholder">📺</div>
        <video id="video-player" autoplay playsinline controls></video>
        <iframe id="iframe-player" sandbox="allow-scripts allow-same-origin allow-presentation"
            allow="autoplay; encrypted-media; picture-in-picture"></iframe>
        <div id="live-stamp">LIVE</div>
    </div>
</section>

<section class="channels-section">
    <h2 class="channels-title">Channels</h2>
    <div id="channel-row" class="channel-grid"></div>
</section>

<select id="channel-select"></select>

<script>
const select = document.getElementById("channel-select");
const video = document.getElementById("video-player");
const iframe = document.getElementById("iframe-player");
const placeholder = document.getElementById("placeholder");
const loader = document.getElementById("loading");
const liveStamp = document.getElementById("live-stamp");
const row = document.getElementById("channel-row");
const search = document.getElementById("search");
const JSON_URL = "./channels.json";

let channels = [];
let hls = null;
let shakaPlayer = null;

async function stopAll() {
    loader.style.display = "none";
    liveStamp.style.display = "none";
    if (hls) { hls.destroy(); hls = null; }
    if (shakaPlayer) { await shakaPlayer.destroy(); shakaPlayer = null; }
    video.pause();
    video.removeAttribute("src");
    video.load();
    iframe.removeAttribute("src");
    iframe.src = "about:blank";
    video.style.display = "none";
    iframe.style.display = "none";
    placeholder.style.display = "flex";
}

function renderDropdown(data) {
    channels = data;
    select.innerHTML = "";
    row.innerHTML = "";
    data.forEach((ch, i) => {
        const opt = document.createElement("option");
        opt.value = i;
        opt.textContent = ch.name;
        select.appendChild(opt);

        const card = document.createElement("div");
        card.className = "channel-card";
        card.innerHTML = `
            <img src="${ch.logo || ''}" loading="lazy">
            <div style="font-size:12px">${ch.name}</div>
        `;
        card.onclick = () => {
            select.value = i;
            playChannel(i);
        };
        row.appendChild(card);
    });
}

async function loadChannels() {
    try {
        const res = await fetch(JSON_URL, { cache: "force-cache" });
        const data = await res.json();
        renderDropdown(data);

        const lastIndex = localStorage.getItem("last_channel_index");
        if (lastIndex !== null && channels[lastIndex]) {
            select.value = lastIndex;
            playChannel(lastIndex);
        }
    } catch (e) {
        console.error("Channel load error", e);
    }
}

async function playChannel(index) {
    const channel = channels[index];
    if (!channel) return;
    await stopAll();
    loader.style.display = "block";
    placeholder.style.display = "none";
    liveStamp.style.display = channel.isLive ? "block" : "none";
    localStorage.setItem("last_channel_index", index);

    if (channel.type === "iframe") {
        iframe.style.display = "block";
        iframe.src = channel.url;
        iframe.onload = () => loader.style.display = "none";
        return;
    }

    video.style.display = "block";
    placeholder.style.display = "none";

    const isHls = channel.type === "hls" || channel.url.includes(".m3u8");

    if (isHls) {
        if (window.Hls && Hls.isSupported()) {
            hls = new Hls({ enableWorker: true, lowLatencyMode: true });
            hls.loadSource(channel.url);
            hls.attachMedia(video);
            video.muted = true;
            video.play().catch(() => {});
            hls.on(Hls.Events.MANIFEST_PARSED, () => {
                video.muted = false;
                video.play();
            });
        } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
            video.src = channel.url;
            video.muted = true;
            video.play().catch(() => {});
        }
        return;
    }

    if (window.shaka && shaka.Player.isBrowserSupported()) {
        shaka.polyfill.installAll();
        shakaPlayer = new shaka.Player(video);
        try {
            await shakaPlayer.load(channel.url);
            video.play();
        } catch (e) {
            console.error(e);
        }
    }
}

video.onplaying = () => {
    loader.style.display = "none";
    placeholder.style.display = "none";
    video.style.display = "block";
};

select.onchange = () => {
    if (select.value !== '') playChannel(select.value);
};

search.addEventListener("input", () => {
    const term = search.value.toLowerCase();
    document.querySelectorAll(".channel-card").forEach(card => {
        card.style.display = card.innerText.toLowerCase().includes(term) ? "flex" : "none";
    });
});

loadChannels();
</script>

</body>
</html>
