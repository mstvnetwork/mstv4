/* text block */

<body>


<header class="topbar">

<div class="topbar-inner">

<div class="brand">

<img src="https://mstvnet.netlify.app/mstv-thumbnail.png" class="logo-img">

<div class="brand-text">
<div class="brand-name">MSTV Network</div>
<div class="brand-slogan">Watch Indian TV Channels Live</div>
</div>

</div>

<input id="search" placeholder="Search channel">

</div>

</header>


<div id="loading">Loading stream...</div>

<div class="player-sticky">

<div class="player-container">

<div id="placeholder">📺</div>

<video id="video-player" autoplay playsinline controls></video>

<iframe id="iframe-player"
sandbox="allow-scripts allow-same-origin allow-presentation"
allow="autoplay; encrypted-media; picture-in-picture"></iframe>

<div id="live-stamp">LIVE</div>

</div>

</div>
<section class="channels">

<h2>Available Channels</h2>

<div id="channel-grid"></div>

</section>

<script>

const video=document.getElementById('video-player');
const iframe=document.getElementById('iframe-player');
const placeholder=document.getElementById('placeholder');
const loader=document.getElementById('loading');
const liveStamp=document.getElementById('live-stamp');
const JSON_URL='./channels.json';

let channels=[];        // filtered list
let allChannels=[];     // master list

let rendered=0;
const batchSize=24;

let hls=null;
let shakaPlayer=null;

/* STOP PLAYBACK */

async function stopAll(){

loader.style.display='none';
liveStamp.style.display='none';

if(hls){
hls.destroy();
hls=null;
}

if(shakaPlayer){
await shakaPlayer.destroy();
shakaPlayer=null;
}

video.pause();
video.removeAttribute('src');
video.load();

iframe.removeAttribute('src');
iframe.src='about:blank';

video.style.display='none';
iframe.style.display='none';
placeholder.style.display='flex';

}

/* PLAY CHANNEL */

async function playChannel(index){

const channel=channels[index];
if(!channel) return;

await stopAll();

loader.style.display='block';
document.querySelector(".player-container")
.scrollIntoView({behavior:"smooth",block:"start"});

/* iframe streams */

if(channel.type==='iframe'){

iframe.style.display='block';
iframe.src=channel.url;

iframe.onload=()=>{
loader.style.display='none';
};

return;
}

/* video streams */

video.style.display='block';

const isHls=channel.type==='hls'||channel.url.includes('.m3u8');

if(isHls){

if(window.Hls && Hls.isSupported()){

hls=new Hls({
enableWorker:true,
lowLatencyMode:true
});

hls.loadSource(channel.url);
hls.attachMedia(video);

hls.on(Hls.Events.MANIFEST_PARSED,()=>{
video.play();
});

}else if(video.canPlayType('application/vnd.apple.mpegurl')){

video.src=channel.url;
video.play();

}

return;
}

/* shaka streams */

if(window.shaka && shaka.Player.isBrowserSupported()){

shaka.polyfill.installAll();

shakaPlayer=new shaka.Player(video);

try{

await shakaPlayer.load(channel.url);
video.play();

}catch(e){

console.error(e);

loader.style.display='none';
placeholder.style.display='flex';
liveStamp.style.display='none';

}

}

}

video.onplaying=()=>{
loader.style.display='none';
};

/* AUTO LOGO */

function getLogo(name){

return `https://logo.clearbit.com/${name.replace(/\s/g,'').toLowerCase()}.com`;

}

/* RENDER CHANNELS */

function renderMore(){

const grid=document.getElementById("channel-grid");

const next=channels.slice(rendered,rendered+batchSize);

next.forEach((ch,i)=>{

const index=rendered+i;

const card=document.createElement("div");
card.className="channel-card";

const logo=ch.logo || getLogo(ch.name);

card.innerHTML=`
<img loading="lazy" src="${logo}">
<span>${ch.name}</span>
`;

card.onclick=()=>playChannel(index);

grid.appendChild(card);

});

rendered+=batchSize;

}

/* RESET GRID */

function resetGrid(){

document.getElementById("channel-grid").innerHTML="";
rendered=0;
renderMore();

}

/* LAZY LOAD ON SCROLL */

window.addEventListener("scroll",()=>{

if(window.innerHeight + window.scrollY >= document.body.offsetHeight-300){

if(rendered < channels.length){
renderMore();
}

}

});

/* LOAD CHANNEL LIST */

async function loadChannels(){

try{

const res=await fetch(JSON_URL,{cache:"force-cache"});
const data=await res.json();

allChannels=data;
channels=[...allChannels];

resetGrid();

}catch(e){

console.error("Channels load failed",e);

}

}

/* FAST SEARCH */

const search=document.getElementById("search");

search.addEventListener("input",function(){

const q=this.value.trim().toLowerCase();

/* reset if empty */

if(q===""){

channels=[...allChannels];
resetGrid();
return;

}

/* filter master list */

channels=allChannels.filter(ch =>
ch.name.toLowerCase().includes(q)
);

resetGrid();

});

/* INITIALIZE */

loadChannels();

</script>
