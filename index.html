<!DOCTYPE html>
<html>
<head>
    <style>
        /* Container that crops the YouTube interface */
        .player-window {
            position: relative;
            width: 100%;
            max-width: 800px;
            aspect-ratio: 16 / 9;
            overflow: hidden;
            background: #000;
        }

        /* Scale and shift the iframe to hide Title (top) and Logo (bottom) */
        .player-window iframe {
            position: absolute;
            top: -12%;      /* Shifts the top branding out of view */
            left: -5%;      /* Centers the scaled video */
            width: 110%;    /* Scales up to fill the gaps */
            height: 124%;   /* Scales up to fill the gaps */
            border: 0;
            pointer-events: none; /* Optional: prevents hover effects */
        }
    </style>
</head>
<body>

<div class="player-window">
    <iframe 
        src="https://www.youtube.com/embed/KMWcefrAKLg?si=zTCOpmIeQOL_mc3q autoplay=1&mute=1" 
        allow="autoplay; encrypted-media" 
        frameborder="0">
    </iframe>
</div>

</body>
</html>
