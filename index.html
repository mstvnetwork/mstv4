<!DOCTYPE html>
<html>
<head>
    <title>MSTV Live Stream</title>
    <script src="https://cdn.jsdelivr.net"></script>
    <style>
        body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        video { width: 100%; max-width: 900px; border: 2px solid #333; }
    </style>
</head>
<body>
    <video id="video" controls autoplay></video>
    <script>
        var video = document.getElementById('video');
        // Pointing to your Netlify Edge Function
        var videoSrc = '/live-stream';

        if (Hls.isSupported()) {
            var hls = new Hls();
            hls.loadSource(videoSrc);
            hls.attachMedia(video);
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = videoSrc;
        }
    </script>
</body>
</html>
