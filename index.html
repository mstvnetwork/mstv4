<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apna TV 24/7 - Cinema Mode</title>
    <style>
        /* Base Styling & Theme Colors */
        :root {
            --bg-color: #0d0d0c;
            --card-bg: #1a1a1a;
            --btn-bg: #2a2a2a;
            --btn-hover: #3a3a3a;
            --accent-color: #ff3b30;
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }

        /* Responsive Layout Grid */
        .cinema-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 24px;
            max-width: 1400px;
            margin: 0 auto;
        }

        @media (min-width: 992px) {
            .cinema-container {
                grid-template-columns: 3fr 1fr;
            }
        }

        /* Player Styling */
        .player-section {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 Widescreen Ratio */
            height: 0;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        .video-wrapper video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* Status Bar */
        .live-status-bar {
            background: var(--card-bg);
            padding: 16px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .badge {
            background: var(--accent-color);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        /* Sidebar Panels */
        .sidebar-section {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .epg-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid var(--accent-color);
        }

        .epg-title {
            font-size: 0.9rem;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        /* Sidebar Interactive Channel Buttons */
        .channel-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 450px;
            overflow-y: auto;
            padding-right: 4px;
        }

        /* Custom Scrollbar for channel panel */
        .channel-list::-webkit-scrollbar {
            width: 6px;
        }
        .channel-list::-webkit-scrollbar-thumb {
            background: var(--btn-hover);
            border-radius: 4px;
        }

        .channel-btn {
            width: 100%;
            background: var(--btn-bg);
            border: 1px solid transparent;
            color: var(--text-main);
            padding: 12px 16px;
            text-align: left;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.2s ease;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .channel-btn:hover {
            background: var(--btn-hover);
        }

        .channel-btn.active {
            background: var(--card-bg);
            border-color: var(--accent-color);
            font-weight: bold;
        }

        /* Footer */
        footer {
            margin-top: 40px;
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-muted);
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <div class="cinema-container">
        
        <!-- Left Side: Widescreen Stream Window -->
        <main class="player-section">
            <div class="video-wrapper">
                <video id="videoPlayer" controls autoplay playsinline></video>
            </div>
            
            <div class="live-status-bar">
                <div>
                    <span class="badge">Live Now</span>
                    <span id="currentProgramTitle" style="margin-left: 10px; font-weight: bold;">Loading Stream…</span>
                </div>
            </div>
        </main>

        <!-- Right Side: Sidebar Interactive Menu -->
        <aside class="sidebar-section">
            <div class="epg-card" style="border-left-color: #34c759;">
                <div class="epg-title">Available Stations</div>
                <div id="channelListContainer" class="channel-list">
                    <div style="color: var(--text-muted); padding: 10px;">Reading channel guide...</div>
                </div>
            </div>
        </aside>

    </div>

    <footer>
        <p><strong>Disclaimer & Copyright:</strong> This index application does not host, mirror, or store media packages locally. All feeds point directly to open directory endpoints.</p>
        <p>&copy; 2026 TV Hub Network. All Rights Reserved.</p>
    </footer>

    <!-- Single Javascript Controller Engine -->
    <script src="player.js"></script>
</body>
</html>
