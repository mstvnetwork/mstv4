<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Cropped YouTube Embed</title>
    <style>
        /* 1. The Container: The actual visible window on your site */
        .crop-window {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* Maintains 16:9 aspect ratio */
            overflow: hidden; /* This acts as the "cropper" */
            background: #000;
        }

        /* 2. The Iframe: Pushed outside the bounds of the container */
        .crop-window iframe {
            position: absolute;
            /* Scale it up to push controls off-edge */
            width: 100%;
            height: 120%; 
            /* Offset it vertically to hide top/bottom bars */
            top: -10%; 
            left: 0;
            border: 0;
            pointer-events: none; /* Block interaction */
        }

        /* 3. The Shield: Total lockout of mouse/touch events */
        .shield {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="crop-window">
        <div class="shield"></div>
        <iframe 
            src="https://www.youtube.com/embed/KMWcefrAKLg?si=cbCLpqbCnossfPvi" 
            allow="autoplay; encrypted-media">
        </iframe>
    </div>

</body>
</html>
