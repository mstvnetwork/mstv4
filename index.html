<!DOCTYPE html>
<html>
<head>
    <style>
        :root { --primary: #00ffA0; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; }

        .viewport {
            width: 100vw; max-width: 1000px; aspect-ratio: 16 / 9; 
            overflow: hidden; position: relative;
            border: 4px solid var(--primary); border-radius: 12px;
            background: #000;
        }

        #captureFrame {
            position: absolute;
            width: 100%; height: 170%; 
            top: -57px; left: -10%; 
            border: none;
            pointer-events: auto; 
            z-index: 1;
        }

        #lockLayer {
    display: none;
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 9999;
    background: rgba(0,0,0,0.01);
    pointer-events: none;
    cursor: pointer;
}

/* Show overlay for desktop, laptop, tablets (exclude small mobile screens) */
@media (min-width: 768px) {
    #lockLayer {
        display: block;
    }
}

#lockLayer.active {
    pointer-events: auto;
    cursor: default;
}

        .click-hint {
            position: absolute; bottom: 10px; right: 15px;
            color: var(--primary); font-family: sans-serif; font-size: 12px;
            z-index: 10000; pointer-events: none; opacity: 0.7;
        }
    </style>
</head>
<body>

    <div class="viewport" id="playerWrapper">
        <div id="lockLayer"></div>
        <div id="status" class="click-hint">▶️ Click on screen to play</div>

        <iframe id="captureFrame" 
                src="https://tulnit.com/live/sony-tv-hd/" 
                scrolling="no" 
                sandbox="allow-forms allow-scripts allow-same-origin">
        </iframe>
    </div>

    <script>
        let clickCount = 0;
        const maxClicks = 4;
        const shield = document.getElementById('lockLayer');
        const wrapper = document.getElementById('playerWrapper');
        const status = document.getElementById('status');

        // Only count clicks if the overlay exists (desktop/tablet)
        if (window.matchMedia("(pointer: fine)").matches) {
            wrapper.addEventListener('click', function() {
                clickCount++;
                
                let remaining = maxClicks - clickCount;
                if (remaining > 0) {
                    status.innerText = `Setup Mode: ${remaining} clicks left`;
                }

                if (clickCount >= maxClicks) {
                    lockPlayer();
                }
            });

            // Safety lock after 15 seconds even if not enough clicks
            setTimeout(lockPlayer, 15000);
        }

        function lockPlayer() {
            if (shield) {
                shield.classList.add('active');
                status.innerText = "CONTROLS LOCKED";
                setTimeout(() => { status.style.opacity = "0"; }, 3000);
                console.log("Maximum clicks reached. Shield Activated.");
            }
        }
    </script>

</body>
</html>
