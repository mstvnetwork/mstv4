<!-- cnn-player.html -->
<!DOCTYPE html>
<html>
<head>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background: #000; }
        .crop-container {
            width: 100vw; height: 100vh; 
            position: relative; overflow: hidden;
        }
        iframe {
            border: none;
            position: absolute;
            /* ADJUSTED FOR 16:9 CONTAINERS */
            top: 20px;    /* Pulls the T-Play header out of view */
            left: -5%;     /* Centers the player horizontally */
            width: 110%;   /* Slight zoom to hide sidebars without distortion */
            height: 150%;  /* Ensures the video fills the vertical space */
        }
    </style>
</head>
<body>
    <div class="crop-container">
        <iframe src="https://tplay.live" 
                sandbox="allow-forms allow-scripts allow-same-origin"
                allow="autoplay; encrypted-media; fullscreen"></iframe>
    </div>
</body>
</html>
