<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Fast Player</title>
    
    <script src="shaka.js"></script>
    <script src="https://cdn.jsdelivr.net"></script>

    <style>
        body { margin: 0; background: #111; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; }
        
        .player-container { 
            position: relative; 
            width: 100%; 
            max-width: 800px; 
            aspect-ratio: 16 / 9; 
            background: #000; 
            margin-top: 20px; 
            overflow: hidden;
        }

        video, iframe { width: 100%; height: 100%; border: none; display: none; }

        /* --- MODERN UNIVERSAL SPINNER --- */
        #loader-overlay { 
            position: absolute; 
            top: 0; left: 0; width: 100%; height: 100%; 
            display: none; align-items: center; justify-content: center; 
            background: #000; /* Solid black hides any ugly background loading */
            z-index: 10; 
        }

        .spinner { 
            width: 50px; height: 50px; 
            border: 3px solid rgba(255,255,255,0.1); 
            border-top: 3px solid #00d2ff; /* Modern cyan color */
            border-radius: 50%; 
            animation: spin 0.6s linear infinite; 
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .controls { margin: 20px; width: 90%; max-width: 400px; position: relative; z-index: 20; }
        select { width: 100%; padding: 14px; border-radius: 8px; font-size: 16px; cursor: pointer; background: #222; color: #fff; border: 1px solid #444; }
    </style>
</head>
<body>

<div class="player-container">
    <!-- This overlay handles all formats -->
    <div id="loader-overlay"><div class="spinner"></div></div>
    
    <iframe id="iframe-player" allow="autoplay; encrypted-media; fullscreen" allowfullscreen></iframe>
    <video id="video-player" playsinline controls></video>
    
    <div id="placeholder" style="height:100%; display:flex; align-items:center; justify-content:center; color:#555;">
        📺 Choose a channel to begin
    </div>
</div>

<div class="controls">
    <select id="channel-select"><option value="">⌛ Initializing...</option></select>
</div>

<script>
    const select = document.getElementById('channel-select');
    const videoPlayer = document.getElementById('video-player');
    const iframePlayer = document.getElementById('iframe-player');
    const loader = document.getElementById('loader-overlay');
    const placeholder = document.getElementById('placeholder');
    
    const JSON_URL = "./channel.json"; 
    let hlsInstance = null;
    let shakaInstance = null;
    let channelsData = [];

    function showLoader(show) { loader.style.display = show ? 'flex' : 'none'; }

    async function stopAll() {
        showLoader(false);
        if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
        if (shakaInstance) { await shakaInstance.destroy(); shakaInstance = null; }
        videoPlayer.pause();
        videoPlayer.removeAttribute('src'); 
        videoPlayer.load(); 
        videoPlayer.style.display = 'none';
        iframePlayer.src = "";
        iframePlayer.style.display = 'none';
        placeholder.style.display = 'none';
    }

    // --- Iframe format specifically needs this to hide spinner ---
    iframePlayer.onload = () => { showLoader(false); };

    // --- Video formats (HLS/Shaka) need these ---
    videoPlayer.onplaying = () => { showLoader(false); };
    videoPlayer.onwaiting = () => { showLoader(true); }; // Re-show if buffering on 3G

    async function playChannel(index) {
        const channel = channelsData[index];
        if (!channel) return;
        
        await stopAll();
        showLoader(true); // Appear immediately for any format

        if (channel.type === 'iframe') {
            iframePlayer.style.display = 'block';
            iframePlayer.src = channel.url;
            // Spinner hides via iframePlayer.onload
        } else {
            videoPlayer.style.display = 'block';
            const isHls = channel.type === 'hls' || channel.url.includes('.m3u8');

            if (isHls && typeof Hls !== 'undefined' && Hls.isSupported()) {
                hlsInstance = new Hls({ startLevel: 0, enableWorker: false });
                hlsInstance.loadSource(channel.url);
                hlsInstance.attachMedia(videoPlayer);
                hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => videoPlayer.play());
            } else if (shaka.Player.isBrowserSupported()) {
                shaka.polyfill.installAll();
                shakaInstance = new shaka.Player();
                await shakaInstance.attach(videoPlayer);
                shakaInstance.configure({ streaming: { rebufferingGoal: 1 } });
                try { await shakaInstance.load(channel.url); videoPlayer.play(); } 
                catch (e) { showLoader(false); }
            }
        }
    }

    // --- UI/JSON Logic ---
    function renderDropdown(data) {
        channelsData = data;
        select.innerHTML = '<option value="">👉📺 Click & Select Channel</option>';
        data.forEach((ch, i) => {
            const opt = document.createElement('option');
            opt.value = i;
            opt.textContent = ch.name;
            select.appendChild(opt);
        });
    }

    async function loadChannels() {
    // 1. Check Cache first (Instant display)
    const cached = localStorage.getItem('channels_cache');
    if (cached) renderDropdown(JSON.parse(cached));

    try {
        // 2. Use a relative path that works on Netlify
        const res = await fetch('./channel.json'); 
        
        // 3. Verify it's actually JSON before parsing
        if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
        const contentType = res.headers.get("content-type");
        if (!contentType || !contentType.includes("application/json")) {
            throw new TypeError("Oops, we didn't get JSON!");
        }

        const data = await res.json();
        localStorage.setItem('channels_cache', JSON.stringify(data));
        renderDropdown(data);
    } catch (e) { 
        console.error("JSON Error:", e.message);
        // If it's a 404, Chrome will show 'Initializing' forever
        if (e.message.includes('404')) {
            select.innerHTML = '<option value="">⚠️ Channel File Missing</option>';
        }
    }
}

</script>
</body>
</html>
