<!DOCTYPE html>
<html>
<head>
    <style>
        :root { --primary: #00ffA0; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; }

        .viewport {
            width: 90vw; max-width: 1000px; aspect-ratio: 16 / 9; 
            overflow: hidden; position: relative;
            border: 4px solid var(--primary); border-radius: 12px;
            background: #000;
        }

        #captureFrame {
            position: absolute;
            width: 130%; height: 150%; 
            top: -30px; left: -15%; 
            border: none;
            /* Allow clicks initially so you can select the device */
            pointer-events: auto; 
            z-index: 1;
        }

        /* THE SMART SHIELD */
        #lockLayer {
            position: absolute;
            top: 0; left: 0; 
            width: 100%; height: 100%;
            z-index: 9999; 
            /* Starts transparent so clicks hit the iframe */
            background: rgba(0,0,0,0.01); 
            /* 'none' allows the first 4 clicks to pass through to the video */
            pointer-events: none; 
            cursor: pointer;
        }

        /* The 'Locked' state that blocks everything */
        #lockLayer.active {
            pointer-events: all !important;
            cursor: default;
        }

        .click-hint {
            position: absolute; bottom: 10px; right: 15px;
            color: var(--primary); font-family: sans-serif; font-size: 12px;
            z-index: 10000; pointer-events: none; opacity: 0.7;
        }
    </style>
</head>
<body>

    <div class="viewport" id="playerWrapper">
        <div id="lockLayer"></div>
        <div id="status" class="click-hint">▶️ Click on screen to play</div>

        <iframe id="captureFrame" 
                src="https://tplay.live" 
                scrolling="no" 
                sandbox="allow-forms allow-scripts allow-same-origin">
        </iframe>
    </div>

    <script>
        let clickCount = 0;
        const maxClicks = 4;
        const shield = document.getElementById('lockLayer');
        const wrapper = document.getElementById('playerWrapper');
        const status = document.getElementById('status');

        // We listen to the wrapper to count clicks hitting the iframe
        wrapper.addEventListener('click', function() {
            clickCount++;
            
            let remaining = maxClicks - clickCount;
            if (remaining > 0) {
                status.innerText = `Setup Mode: ${remaining} clicks left`;
            }

            // Once the limit is reached, activate the permanent shield
            if (clickCount >= maxClicks) {
                lockPlayer();
            }
        });

        function lockPlayer() {
            shield.classList.add('active');
            status.innerText = "CONTROLS LOCKED";
            setTimeout(() => { status.style.opacity = "0"; }, 3000); // Fade out hint
            console.log("Maximum clicks reached. Shield Activated.");
        }
        
        // Safety Lock: If they don't click 4 times but the video is playing, 
        // lock it anyway after 15 seconds to prevent tampering.
        setTimeout(lockPlayer, 15000);
    </script>

</body>
</html>
