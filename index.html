<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Linear TV</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
html,
body{
    margin:0;
    padding:0;
    background:#000;
    width:100%;
    height:100%;
    overflow:hidden;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
}

.player-wrap{
    width:100vw;
    max-width:100vw;
    padding:0;
    margin:0;
}

.video-container{
    position:relative;
    width:100%;
    aspect-ratio:16/9;
    background:#000;
    overflow:hidden;
}

video,
iframe{
    width:100%;
    height:100%;
    border:0;
    display:block;
}

/* Keep loader visible */
.loader{
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    background:rgba(0,0,0,.6);
    z-index:10;
}

.loader.hidden{
    display:none;
}

.vol-overlay{
    display:none;
    position:absolute;
    bottom:10px;
    left:10px;
    padding:6px 10px;
    background:rgba(0,0,0,.7);
    border-radius:4px;
    font-size:12px;
    z-index:100;
}

/* Hide everything except player */
#nowTitle,
#clock,
#clockDate,
#errorMsg,
.controls,
.progress,
#statusText,
#statusOffset,
h3,
#scheduleList,
#syncToast,
#updateToast{
    display:none !important;
}

.error{
    display:none;
}

.toast{
    display:none;
}
</style>
</head>
<body>

<div class="player-wrap">

    <!-- Hidden but retained for JS -->
    <h2 id="nowTitle" style="display:none;">Loading...</h2>

    <div id="clock" style="display:none;"></div>
    <div id="clockDate" style="display:none;"></div>

    <div class="video-container">

        <video
            id="videoPlayer"
            playsinline
            controlslist="nodownload">
        </video>

        <iframe
            id="iframePlayer"
            style="display:none;"
            allowfullscreen>
        </iframe>

        <div id="loader" class="loader">
            Loading...
        </div>

        <div id="volOverlay" class="vol-overlay">
            Volume controlled by embedded player
        </div>

    </div>

    <!-- Hidden but retained for JS -->
    <div id="errorMsg" class="error"></div>

    <div class="controls" style="display:none;">
        <button id="btnPlay">⏸</button>

        <input
            id="volSlider"
            type="range"
            min="0"
            max="1"
            step="0.01"
            value="0.8">
    </div>

    <div class="progress" style="display:none;">
        <div id="progressFill" class="progress-fill"></div>
    </div>

    <div id="statusText" style="display:none;"></div>
    <div id="statusOffset" style="display:none;"></div>

    <h3 style="display:none;">Schedule</h3>
    <div id="scheduleList" class="schedule" style="display:none;"></div>

</div>

<div id="syncToast" class="toast" style="display:none;">
    Synced to live position
</div>

<div id="updateToast" class="toast" style="display:none;">
    Playlist updated
</div>

<script src="./player.js"></script>

<script>
initPlayer({
    videoId: 'videoPlayer',
    iframeId: 'iframePlayer',

    loaderId: 'loader',
    errorId: 'errorMsg',

    btnPlayId: 'btnPlay',
    volSliderId: 'volSlider',

    progressFillId: 'progressFill',
    scheduleListId: 'scheduleList',

    syncToastId: 'syncToast',
    updateToastId: 'updateToast',

    statusTextId: 'statusText',
    statusOffsetId: 'statusOffset',

    nowTitleId: 'nowTitle',

    volOverlayId: 'volOverlay',

    showClock: false,
    clockId: 'clock',
    clockDateId: 'clockDate'
});
</script>

</body>
</html>
