<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MSNET IPTV Cinema Mode</title>

<style>
:root { --bg-black: #000000; --accent: #ff0000; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background-color: var(--bg-black); color: white; font-family: sans-serif; overflow: hidden; }

/* Player Container */
.player-wrapper {
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    z-index: 1;
}
iframe { width: 100%; height: 100%; border: none; }

/* EPG Cards Overlay */
#epg-container {
    position: absolute;
    bottom: 20px;
    left: 20px;
    right: 20px;
    display: flex;
    gap: 15px;
    z-index: 10000; /* Above the lock overlay */
}

.card {
    background: rgba(40, 40, 40, 0.8);
    padding: 15px;
    border-radius: 8px;
    min-width: 150px;
    border: 2px solid transparent;
    transition: 0.3s;
}

.card.active {
    border-color: var(--accent);
    background: rgba(255, 0, 0, 0.2);
    transform: scale(1.05);
}

.card h4 { margin-bottom: 5px; font-size: 14px; }
.card p { font-size: 12px; opacity: 0.7; }

#silentLockOverlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    z-index: 9999; pointer-events: none;
}
</style>
</head>
<body>

<div id="chrome-only-content">
    <div class="player-wrapper">
        <iframe id="videoPlayer" sandbox="allow-scripts allow-same-origin allow-forms allow-presentation" playsinline></iframe>
        <div id="silentLockOverlay"></div>
    </div>
    
    <div id="epg-container"></div>
</div>

<script>
const BASE_JSON_URL = "YOUR_RAW_GITHUB_URL_HERE";

const playlist = [
    { title: "Indian Idol", url: "https://vkprime.com/embed-k1ipwza01c0d.html" },
    { title: "Mtv", url: "https://vkprime.com/embed-e6r4icq8gcq1.html" }
];

async function loadEPG() {
    const freshUrl = BASE_JSON_URL + "?v=" + Date.now();
    try {
        const res = await fetch(freshUrl);
        const data = await res.json();
        const now = new Date();
        const today = now.toISOString().split('T'); // Get 2026-03-29
        
        let currentProgramTitle = null;

        // Render Cards while checking for current show
        const container = document.getElementById('epg-container');
        container.innerHTML = ''; // Clear old cards

        data.schedule.forEach(item => {
            const start = new Date(`${today}T${item.start}:00`);
            const end = new Date(`${today}T${item.end}:00`);
            
            const isActive = (now >= start && now < end);
            if (isActive) currentProgramTitle = item.title;

            // Create HTML for the card
            const card = document.createElement('div');
            card.className = `card ${isActive ? 'active' : ''}`;
            card.innerHTML = `<h4>${item.title}</h4><p>${item.start} - ${item.end}</p>`;
            container.appendChild(card);
        });

        if(!currentProgramTitle) rotateLocal();
        else syncVideo(currentProgramTitle);

    } catch(e) {
        console.error("Fetch error:", e);
        rotateLocal();
    }
}

function syncVideo(liveTitle){
    const player = document.getElementById('videoPlayer');
    let liveVideo = playlist.find(v => v.title === liveTitle);
    if(liveVideo && player.src !== liveVideo.url){
        player.src = liveVideo.url;
    }
}

function rotateLocal() {
    const player = document.getElementById('videoPlayer');
    const currentIndex = playlist.findIndex(v => v.url === player.src);
    const nextIndex = (currentIndex + 1) % playlist.length;
    syncVideo(playlist[nextIndex].title);
}

window.onload = () => {
    loadEPG();
    setInterval(loadEPG, 60000); 
};
</script>
</body>
</html>
