<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSTV Network | Premium Player</title>
    <script defer src="./shaka.js"></script>
    <script defer src="https://cdn.jsdelivr.net"></script>
    <style>
        :root { --accent: #90EE90; --bg: #0F1115; --sidebar-bg: #16191D; --card-bg: #21252B; }
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: #fff; display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar Styling */
        #sidebar { width: 320px; background: var(--sidebar-bg); border-right: 1px solid #222; display: flex; flex-direction: column; }
        .sidebar-header { padding: 25px 20px; font-size: 1.4em; font-weight: 800; background: linear-gradient(90deg, #90EE90, #00FFA3); -webkit-background-clip: text; color: transparent; border-bottom: 1px solid #222; }
        #channel-list { flex-grow: 1; overflow-y: auto; padding: 15px; }

        /* TPlay Channel Card */
        .channel-card { 
            display: flex; align-items: center; padding: 12px; margin-bottom: 10px; 
            background: var(--card-bg); border-radius: 12px; cursor: pointer; 
            transition: all 0.2s ease; border: 1px solid transparent;
        }
        .channel-card:hover { transform: translateX(5px); background: #2A2F37; border-color: #333; }
        .channel-card.active { border-color: var(--accent); background: #2A2F37; box-shadow: 0 0 15px rgba(144, 238, 144, 0.1); }
        .channel-card img { width: 45px; height: 45px; border-radius: 8px; margin-right: 15px; object-fit: cover; background: #000; }
        .channel-info .name { font-weight: 600; font-size: 0.95em; }
        .channel-info .status { font-size: 0.75em; color: #888; }

        /* Main Content area */
        #main-view { flex-grow: 1; display: flex; flex-direction: column; position: relative; }
        .player-container { width: 100%; aspect-ratio: 16/9; background: #000; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        video, iframe { width: 100%; height: 100%; border: none; display: none; }
        
        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: var(--accent); z-index: 10; display: none; font-weight: bold; }
        #live-stamp { position: absolute; top: 15px; left: 15px; background: #E50914; color: #fff; font-size: 0.7em; font-weight: bold; padding: 4px 10px; border-radius: 4px; z-index: 5; }
        
        .channel-details { padding: 25px; }
        .channel-details h1 { margin: 0; font-size: 1.8em; color: var(--accent); }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="sidebar-header">MSTV NETWORK</div>
    <div id="channel-list">
        <!-- JS will inject channel cards here -->
    </div>
</div>

<div id="main-view">
    <div class="player-container">
        <div id="loading">🌀 Initializing Stream...</div>
        <div id="live-stamp" style="display:none;">LIVE</div>
        <video id="video-player" autoplay playsinline controls></video>
        <iframe id="iframe-player" sandbox="allow-scripts allow-same-origin allow-presentation" allow="autoplay; encrypted-media"></iframe>
    </div>
    
    <div class="channel-details">
        <h1 id="display-name">Select a Channel</h1>
        <p style="color:#888;">High Definition Live Broadcast</p>
    </div>
</div>

<script>
// --- LOGIC REMAINS THE SAME AS YOURS ---
const video = document.getElementById('video-player');
const iframe = document.getElementById('iframe-player');
const loader = document.getElementById('loading');
const liveStamp = document.getElementById('live-stamp');
const displayName = document.getElementById('display-name');
const JSON_URL = './channels.json';

let channels = [];
let hls = null;
let shakaPlayer = null;

async function stopAll() {
    loader.style.display = 'none';
    liveStamp.style.display = 'none';
    if(hls){ hls.destroy(); hls = null; }
    if(shakaPlayer){ await shakaPlayer.destroy(); shakaPlayer = null; }
    video.pause();
    video.removeAttribute('src');
    video.load();
    iframe.removeAttribute('src');
    iframe.src = 'about:blank';
    video.style.display = 'none';
    iframe.style.display = 'none';
}

function renderSidebar(data) {
    channels = data;
    const list = document.getElementById('channel-list');
    list.innerHTML = ''; 
    data.forEach((ch, i) => {
        const card = document.createElement("div");
        card.className = "channel-card";
        card.innerHTML = `
            <img src="${ch.logo || 'https://via.placeholder.com'}" alt="">
            <div class="channel-info">
                <div class="name">${ch.name}</div>
                <div class="status">${ch.type.toUpperCase()} Stream</div>
            </div>
        `;
        card.onclick = () => {
            document.querySelectorAll('.channel-card').forEach(c => c.classList.remove('active'));
            card.classList.add('active');
            playChannel(i);
        };
        list.appendChild(card);
    });
}

async function loadChannels(){
    try {
        const res = await fetch(JSON_URL);
        const data = await res.json();
        renderSidebar(data);
    } catch(e){ console.error('Load failed', e); }
}

async function playChannel(index){
    const channel = channels[index];
    if(!channel) return;

    await stopAll();
    loader.style.display = 'block';
    displayName.textContent = channel.name;
    liveStamp.style.display = channel.isLive ? 'block' : 'none';

    if(channel.type === 'iframe'){
        iframe.style.display = 'block';
        iframe.src = channel.url;
        iframe.onload = () => { loader.style.display = 'none'; };
        return;
    }

    video.style.display = 'block';
    const isHls = channel.type === 'hls' || channel.url.includes('.m3u8');

    if(isHls){
        if(window.Hls && Hls.isSupported()){
            hls = new Hls({ enableWorker:true });
            hls.loadSource(channel.url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, ()=> video.play());
        } else {
            video.src = channel.url;
            video.play();
        }
    } else {
        // Shaka for DASH/Others
        if(window.shaka && shaka.Player.isBrowserSupported()){
            shaka.polyfill.installAll();
            shakaPlayer = new shaka.Player(video);
            try{
                await shakaPlayer.load(channel.url);
                video.play();
            } catch(e){ console.error(e); }
        }
    }
}

video.onplaying = () => { loader.style.display = 'none'; };
loadChannels();
</script>
</body>
</html>
