<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Stream Player</title>
    <!-- Link to your local shaka library -->
    <script src="shaka.js"></script>
    <style>
        body { margin: 0; background: #0f0f0f; color: white; font-family: sans-serif; display: flex; height: 100vh; }
        #sidebar { width: 300px; background: #1a1a1a; overflow-y: auto; border-right: 1px solid #333; }
        .channel-item { padding: 15px; cursor: pointer; border-bottom: 1px solid #222; display: flex; align-items: center; }
        .channel-item:hover { background: #333; }
        .channel-item img { width: 40px; margin-right: 10px; border-radius: 4px; }
        
        #player-container { flex-grow: 1; position: relative; background: #000; }
        video, iframe { width: 100%; height: 100%; border: none; position: absolute; top: 0; left: 0; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="sidebar">
    <h3 style="padding: 20px;">Channels</h3>
    <div id="channel-list"></div>
</div>

<div id="player-container">
    <video id="video" controls autoplay class="hidden"></video>
    <iframe id="iframe-player" class="hidden" allowfullscreen></iframe>
</div>

<script>
    let player;
    const videoEl = document.getElementById('video');
    const iframeEl = document.getElementById('iframe-player');

    async function initApp() {
        // Initialize Shaka
        shaka.polyfill.installAll();
        if (shaka.Player.isBrowserSupported()) {
            player = new shaka.Player(videoEl);
            player.addEventListener('error', (e) => console.error('Shaka Error:', e));
        }

        // Fetch channels from JSON
        const response = await fetch('channels.json');
        const channels = await response.json();
        renderChannels(channels);
    }

    function renderChannels(channels) {
        const list = document.getElementById('channel-list');
        channels.forEach(ch => {
            const div = document.createElement('div');
            div.className = 'channel-item';
            div.innerHTML = `<img src="${ch.logo}"> <span>${ch.name}</span>`;
            div.onclick = () => playChannel(ch);
            list.appendChild(div);
        });
    }

    async function playChannel(channel) {
        // Stop current Shaka playback if active
        await player.unload();
        
        if (channel.type === 'shaka') {
            iframeEl.classList.add('hidden');
            iframeEl.src = "";
            videoEl.classList.remove('hidden');
            try {
                await player.load(channel.url);
            } catch (e) {
                console.error("Load failed", e);
            }
        } else if (channel.type === 'iframe') {
            videoEl.classList.add('hidden');
            iframeEl.classList.remove('hidden');
            iframeEl.src = channel.url;
        }
    }

    document.addEventListener('DOMContentLoaded', initApp);
</script>
</body>
</html>
