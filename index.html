<!DOCTYPE html>
<html>
<head>
    <style>
        .video-wrapper {
            position: relative;
            width: 640px;
            height: 320px;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
        }

        /* The Shield: Blocks all clicks by default */
        #click-shield {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 999;
            cursor: pointer;
            background: rgba(0,0,0,0); /* Fully transparent */
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s;
        }

        /* Visual indicator when unlocked */
        #status-bar {
            position: absolute;
            bottom: 0; left: 0;
            height: 4px; width: 0%;
            background: #ff0000;
            z-index: 1000;
            transition: width 5s linear;
        }

        iframe { border: none; width: 100%; height: 100%; }
    </style>
</head>
<body>

<div class="video-wrapper">
    <!-- Click Shield & Progress Bar -->
    <div id="click-shield" title="Click to Unlock Controls (5s)"></div>
    <div id="status-bar"></div>

    <!-- Your GDPlayer Iframe -->
    <iframe id="player-frame" 
            src="https://gdplayer.to/x/?aTVSb2t2Qi96d25Gc3hyK0RlbTNMbTFNcllLcEk3bFI0amZRYVI0UnlJSU1xemM5YVp0K1huNDJYbDI2aTRURGVMcmZ6dXVaSnBnSlpiQXZrblpJaVZBcUhiSHc4RldtbmRMM3VDZEhtaE50Rlh3NmFqNlNxaWNuM2xpYXRBdzN1MVpxU1crbG02eE1wOFRRdGdVRHJWd3BYcjdCWlNERUx5OGVqVVgzdEhFPQ,," 
            allowfullscreen>
    </iframe>
</div>

<script>
    const shield = document.getElementById('click-shield');
    const bar = document.getElementById('status-bar');
    let lockActive = true;

    // 1. The Safety Net: Requires user confirmation to redirect the page
    // This is the most critical part for public users
    window.onbeforeunload = function() {
        if (lockActive) {
            return "A redirect attempt was blocked. Do you want to stay on this page?";
        }
    };

    // 2. The Shield Logic
    shield.addEventListener('click', () => {
        // Unlock: Disable the shield so user can click Play/Volume
        shield.style.pointerEvents = 'none';
        bar.style.width = '100%';
        console.log("Controls Unlocked for 5 seconds...");

        // Re-lock: Enable the shield again after 5 seconds
        setTimeout(() => {
            shield.style.pointerEvents = 'auto';
            bar.style.width = '0%';
            bar.style.transition = 'none'; // Reset bar instantly
            console.log("Controls Re-locked. Redirects blocked.");
            
            // Allow the bar to transition again next time
            setTimeout(() => { bar.style.transition = 'width 5s linear'; }, 50);
        }, 5000);
    });
</script>

</body>
</html>
