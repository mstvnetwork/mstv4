<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Apna Tv</title>

<style>
html, body {
    margin: 0;
    height: 100%;
    background: #000;
    overflow: hidden;
    font-family: Arial, sans-serif;
}

/* FULLSCREEN PLAYER (your original) */
.player-wrapper {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background: #000;
    z-index: 1;
}

#videoPlayer {
    position: absolute;
    width: 100%;
    height: 100%;
    border: none;
}

/* LOCK */
#silentLockOverlay {
    position: absolute;
    width: 100%;
    height: 100%;
    z-index: 9999;
    pointer-events: none;
}

/* HEADER OVERLAY */
.header {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    padding: 12px;
    z-index: 10;
    background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
}

.header h1 {
    margin: 0;
    font-size: 18px;
}

.header p {
    margin: 2px 0 0;
    font-size: 12px;
    opacity: 0.7;
}

/* EPG OVERLAY */
.epg {
    position: absolute;
    bottom: 40px;
    left: 0;
    width: 100%;
    padding: 10px;
    display: flex;
    gap: 10px;
    z-index: 10;
}

.card {
    flex: 1;
    background: rgba(0,0,0,0.7);
    padding: 10px;
    border-radius: 8px;
}

.card-title {
    font-size: 11px;
    opacity: 0.6;
}

.card-main {
    font-size: 14px;
    font-weight: bold;
}

/* PROGRESS */
.progress-container {
    margin-top: 6px;
    height: 4px;
    background: rgba(255,255,255,0.2);
}

.progress-bar {
    height: 100%;
    width: 0%;
    background: #00ffcc;
}

/* FOOTER */
.footer {
    position: absolute;
    bottom: 5px;
    width: 100%;
    text-align: center;
    font-size: 10px;
    opacity: 0.5;
    z-index: 10;
}
</style>
</head>

<body>

<div class="player-wrapper">
    <iframe id="videoPlayer"></iframe>
    <div id="silentLockOverlay"></div>

    <!-- HEADER -->
    <div class="header">
        <h1>Apna Tv</h1>
        <p>Watch serials, web series & movies</p>
    </div>

    <!-- EPG -->
    <div class="epg">
        <div class="card">
            <div class="card-title">Live Now</div>
            <div class="card-main" id="nowTitle">Loading...</div>
            <div class="progress-container">
                <div class="progress-bar" id="progressBar"></div>
            </div>
        </div>

        <div class="card">
            <div class="card-title">Next</div>
            <div class="card-main" id="nextTitle"></div>
        </div>
    </div>

    <!-- FOOTER -->
    <div class="footer">
        Apna TV 24/7
    </div>
</div>

<script>
const BASE_JSON_URL = "https://mstvnetwork.github.io/mstv4/epg.json";

const playlist = [
    { title: "Indian Idol", url: "https://vkprime.com/embed-k1ipwza01c0d.html" },
    { title: "Mtv", url: "https://vkprime.com/embed-e6r4icq8gcq1.html" }
];

let progressTimer;

async function loadEPG() {
    try {
        const res = await fetch(BASE_JSON_URL + "?v=" + Date.now());
        const data = await res.json();

        const nowTime = Date.now();

        let current = null;
        let next = null;

        for (let i = 0; i < data.schedule.length; i++) {
            const start = new Date(data.schedule[i].start).getTime();
            const end = new Date(data.schedule[i].end).getTime();

            if (nowTime >= start && nowTime < end) {
                current = data.schedule[i];
                next = data.schedule[i + 1] || null;
                break;
            }
        }

        if (!current) return;

        document.getElementById("nowTitle").textContent = current.title;
        document.getElementById("nextTitle").textContent = next ? next.title : "";

        syncVideo(current.title);
        startProgress(current);

    } catch (e) {
        console.error("EPG error:", e);
    }
}

function startProgress(program) {
    clearInterval(progressTimer);

    progressTimer = setInterval(() => {
        const now = Date.now();
        const start = new Date(program.start).getTime();
        const end = new Date(program.end).getTime();

        const percent = ((now - start) / (end - start)) * 100;
        document.getElementById("progressBar").style.width = percent + "%";

    }, 1000);
}

function syncVideo(title) {
    const player = document.getElementById("videoPlayer");
    const video = playlist.find(v => v.title === title);

    if (video && player.src !== video.url) {
        player.src = video.url;
    }
}

window.onload = () => {
    loadEPG();
    setInterval(loadEPG, 60000);
};
</script>

</body>
</html>
