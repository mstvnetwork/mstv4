<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>MSTV Network | Live Star Sports Hindi, Zee TV & Punjabi Channels</title>

<meta name="description" content="Stream Star Sports Hindi live cricket, Zee TV shows, TV9 Hindi news and Punjabi channels online free.">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://mstvnet.netlify.app">

<meta name="theme-color" content="#0f172a">

<link rel="icon" href="https://mstvnet.netlify.app/mstv-thumbnail.png">

<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="dns-prefetch" href="https://cdn.jsdelivr.net">

<link rel="preload" href="./channels.json" as="fetch" crossorigin="anonymous">

<script defer src="./shaka.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>

html,body{
margin:0;
padding:0;
font-family:Arial,sans-serif;
background:#0F1115;
color:#E0E0E0;
display:flex;
flex-direction:column;
align-items:center;
}

.title{
font-size:2.2em;
margin:50px 0 10px;
font-weight:bold;
text-align:center;
background:linear-gradient(90deg,#90EE90,#00FFA3);
-webkit-background-clip:text;
color:transparent;
}

.device-notice{
font-size:.9em;
color:grey;
text-align:center;
margin-bottom:25px;
max-width:80%;
opacity:.8;
}

.channel-select{
margin-bottom:3vh;
width:90%;
max-width:400px;
}

select{
width:100%;
padding:.8em;
font-size:1.1em;
border-radius:12px;
border:none;
background:#1A1D20;
color:#90EE90;
cursor:pointer;
}

.player-container{
position:relative;
width:90%;
max-width:900px;
aspect-ratio:16/9;
background:#141618;
display:flex;
align-items:center;
justify-content:center;
border-radius:15px;
overflow:hidden;
margin-bottom:10px;
}

video,iframe{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
border:none;
display:none;
}

#loading{
position:absolute;
top:10px;
left:10px;
background:#000;
color:#90EE90;
padding:6px 10px;
font-size:.8em;
border-radius:6px;
display:none;
z-index:20;
}

#placeholder{
display:flex;
align-items:center;
justify-content:center;
width:100%;
height:100%;
font-size:1.4em;
color:#90EE90;
}

#live-stamp{
position:absolute;
top:5px;
left:5px;
background:#E50914;
color:#fff;
font-size:.7rem;
padding:6px 10px;
border-radius:6px;
z-index:25;
display:none;
}

footer{
text-align:center;
padding:20px;
font-size:.85rem;
opacity:.7;
}

</style>
</head>

<body>

<div class="title">MSTV NETWORK</div>

<div class="device-notice">
Best experience on Chrome Browser
</div>

<div class="channel-select">
<select id="channel-select">
<option value="">👉 Select Channel</option>
</select>
</div>

<div class="player-container">

<div id="placeholder">⬆️ Select Channel</div>

<div id="loading">Loading...</div>

<video id="video-player" autoplay playsinline controls></video>

<iframe id="iframe-player"
sandbox="allow-scripts allow-same-origin allow-presentation"
allow="autoplay; encrypted-media; picture-in-picture">
</iframe>

<div id="live-stamp">LIVE</div>

</div>

<footer>
© 2026 MSTV Network
</footer>

<script>

const select=document.getElementById("channel-select")
const video=document.getElementById("video-player")
const iframe=document.getElementById("iframe-player")
const loader=document.getElementById("loading")
const placeholder=document.getElementById("placeholder")
const live=document.getElementById("live-stamp")

const JSON_URL="./channels.json"

let channels=[]
let hls=null
let shakaPlayer=null



async function stopAll(){

loader.style.display="none"
live.style.display="none"

if(hls){
hls.destroy()
hls=null
}

if(shakaPlayer){
await shakaPlayer.destroy()
shakaPlayer=null
}

video.pause()
video.removeAttribute("src")
video.load()

iframe.removeAttribute("src")

video.style.display="none"
iframe.style.display="none"

placeholder.style.display="flex"

}



function renderDropdown(data){

channels=data

select.innerHTML='<option value="">👉 Select Channel</option>'

data.forEach((ch,i)=>{

const opt=document.createElement("option")
opt.value=i
opt.textContent=ch.name
select.appendChild(opt)

})

}



async function loadChannels(){

const cached=localStorage.getItem("channels_cache")

if(cached){
renderDropdown(JSON.parse(cached))
}

try{

const res=await fetch(JSON_URL,{cache:"force-cache"})

const data=await res.json()

localStorage.setItem("channels_cache",JSON.stringify(data))

renderDropdown(data)

}catch(e){
console.log("channels failed",e)
}

}



async function playChannel(index){

const channel=channels[index]

if(!channel) return

await stopAll()

loader.style.display="block"
placeholder.style.display="none"
live.style.display="block"



if(channel.type==="iframe"){

iframe.style.display="block"
iframe.src=channel.url

iframe.onload=()=>{
loader.style.display="none"
}

return
}



video.style.display="block"

const isHls=channel.type==="hls" || channel.url.includes(".m3u8")



if(isHls && window.Hls && Hls.isSupported()){

hls=new Hls({
enableWorker:true,
lowLatencyMode:true,
startLevel:-1
})

hls.loadSource(channel.url)
hls.attachMedia(video)

hls.on(Hls.Events.MANIFEST_PARSED,()=>{
video.play()
})

return

}



if(window.shaka && shaka.Player.isBrowserSupported()){

shaka.polyfill.installAll()

shakaPlayer=new shaka.Player(video)

shakaPlayer.configure({
streaming:{
bufferingGoal:8,
rebufferingGoal:.5
}
})

try{
await shakaPlayer.load(channel.url)
video.play()
}catch(e){
console.log("dash error",e)
loader.style.display="none"
}

}



}



video.onplaying=()=>{
loader.style.display="none"
}



select.onchange=()=>{

if(select.value!==""){
playChannel(select.value)
}

}



loadChannels()

</script>

</body>
</html>
