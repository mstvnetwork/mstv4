<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MSTV Player</title>
    <script src="https://cdn.jsdelivr.net"></script>
    <style>
        body { background: #000; color: #fff; text-align: center; margin: 0; padding: 20px; }
        .player-wrapper { max-width: 800px; margin: auto; }
        video { width: 100%; border: 1px solid #333; }
    </style>
</head>
<body>
    <div class="player-wrapper">
        <h2>MSTV Network</h2>
        <video id="video" controls autoplay></video>
        <p id="status">Loading stream...</p>
    </div>

    <script>
        const video = document.getElementById('video');
        const status = document.getElementById('status');
        
        // YOUR SOURCE URL
        const streamUrl = "https://fucking-tv-ott.keralive.workers.dev/mumt01/FASTMIX/tracks-v2a1/mono.m3u8";
        // PROXY PATH
        const proxyUrl = "/live-stream?url=" + encodeURIComponent(streamUrl);

        if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(proxyUrl);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => {
                status.innerText = "Playing via Netlify Proxy";
                video.play();
            });
            hls.on(Hls.Events.ERROR, (event, data) => {
                if (data.fatal) status.innerText = "Error: " + data.type;
            });
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = proxyUrl;
        }
    </script>
</body>
</html>
