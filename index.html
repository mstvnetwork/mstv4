<!DOCTYPE html>
<html>
<head>
    <style>
        /* This container acts as a 'window' that crops the edges */
        .video-wrapper {
            position: relative;
            width: 100%;
            max-width: 800px; /* Adjust as needed */
            aspect-ratio: 16 / 9;
            overflow: hidden;
            background: #000;
        }

        /* Scale and shift the iframe to hide Title (top) and Logo (bottom/corners) */
        .video-wrapper iframe {
            position: absolute;
            top: -15%;       /* Pushes title & share out of view */
            left: -10%;      /* Pushes side-anchored logos out */
            width: 120%;     /* Scales up to fill gap */
            height: 130%;    /* Scales up to fill gap */
            border: 0;
            pointer-events: none; /* Prevents hovering from showing UI */
        }

        /* Overlay for a custom play button (since video is muted) */
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.2);
            cursor: pointer;
            z-index: 10;
        }

        .play-btn {
            font-size: 50px;
            color: white;
            background: rgba(0,0,0,0.6);
            border-radius: 50%;
            padding: 20px;
        }
    </style>
</head>
<body>

<div class="video-wrapper">
    <!-- Overlay to simulate a play interaction -->
    <div class="overlay" onclick="this.style.display='none'">
        <div class="play-btn">▶</div>
    </div>
    
    <!-- Video with specific parameters -->
    <iframe 
        src="https://www.youtube.com/watch?v=KMWcefrAKLg" 
        allow="autoplay"
        frameborder="0">
    </iframe>
</div>

</body>
</html>
