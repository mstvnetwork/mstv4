<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>MSNET Cinema Mode</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { 
            height: 100%; width: 100%; 
            background-color: #000; 
            overflow: hidden; 
            cursor: none; /* Hides cursor on desktop */
        }

        /* Fullscreen Player Container */
        .player-wrapper {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: #000;
            z-index: 1;
        }

        #videoPlayer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border: none;
            display: block;
        }

        /* The Invisible Shield */
        #silentLockOverlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 9999; 
            pointer-events: none; /* Initially allows interaction */
            background: rgba(0, 0, 0, 0);
        }

        #browser-error { 
            display: none; 
            color: white; 
            height: 100vh; 
            justify-content: center; 
            align-items: center; 
            font-family: sans-serif;
        }
    </style>
</head>
<body>

<div id="browser-error"><h2>Google Chrome Required</h2></div>

<div id="chrome-only-content">
    <div class="player-wrapper">
        <iframe id="videoPlayer" sandbox="allow-scripts allow-same-origin allow-forms allow-presentation" allow="autoplay; fullscreen" playsinline></iframe>
        <div id="silentLockOverlay"></div>
    </div>
</div>

<script>
    // Configuration
    const JSON_URL = "https://raw.githubusercontent.com/mstvnetwork/mstv4/main/schedule.json";
    const playlist = [
        { title: "Indian Idol", url: "https://vkprime.com/embed-k1ipwza01c0d.html" },
        { title: "Mtv", url: "https://vkprime.com/embed-e6r4icq8gcq1.html" }
    ];

    let silentLockTimer;
    const lockOverlay = document.getElementById('silentLockOverlay');

    function isStrictChrome() {
        const ua = navigator.userAgent;
        const isChrome = (ua.indexOf("Chrome") > -1 || ua.indexOf("CriOS") > -1);
        const isOther = (ua.indexOf("Edg") > -1 || ua.indexOf("SamsungBrowser") > -1 || ua.indexOf("OPR") > -1);
        return isChrome && !isOther;
    }

    async function loadEPG() {
        try {
            const res = await fetch(JSON_URL + "?v=" + Date.now());
            if (!res.ok) throw new Error("404");
            
            const data = await res.json();
            const now = new Date();
            let currentTitle = null;

            // Search JSON for current time match
            const schedule = Array.isArray(data) ? data : data.schedule;
            for (let item of schedule) {
                // Assuming JSON format is "YYYY-MM-DDTHH:MM:SS"
                const start = new Date(item.start);
                const end = new Date(item.end);
                if (now >= start && now < end) {
                    currentTitle = item.title;
                    break;
                }
            }

            if(!currentTitle) rotateLocal();
            else syncVideo(currentTitle);

        } catch(e) {
            rotateLocal(); // Backup if JSON fails
        }
    }

    function rotateLocal() {
        const player = document.getElementById('videoPlayer');
        // Find index of current playing URL
        let idx = playlist.findIndex(v => v.url === player.src);
        // Move to next one (or first one)
        let nextIdx = (idx + 1) % playlist.length;
        syncVideo(playlist[nextIdx].title);
    }

    function syncVideo(title) {
        const player = document.getElementById('videoPlayer');
        const video = playlist.find(v => v.title === title);

        if(video && player.src !== video.url) {
            player.src = video.url;

            // RESET LOCK: Controls available for 40s
            clearTimeout(silentLockTimer);
            lockOverlay.style.pointerEvents = 'none'; 
            console.log("New video: Controls Unlocked");

            // LOCK: Shield active after 40s
            silentLockTimer = setTimeout(() => {
                lockOverlay.style.pointerEvents = 'auto';
                console.log("Shield Active: Controls Hidden");
            }, 40000); 
        }
    }

    window.onload = function() {
        if(isStrictChrome()){
            document.getElementById('chrome-only-content').style.display = 'block';
            loadEPG();
            setInterval(loadEPG, 60000); // Check for updates every minute
        } else {
            document.getElementById('browser-error').style.display = 'flex';
        }
    };
</script>
</body>
</html>
