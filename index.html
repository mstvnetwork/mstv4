<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MS-TV Pro</title>
    <style>
        :root { --red: #ff0000; --bg: #000000; --card: #141414; --text: #ffffff; }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--bg); color: var(--text); font-family: sans-serif;
            overflow-x: hidden;
        }

        /* Restriction Overlay */
        #chrome-only {
            display: none; position: fixed; top:0; left:0; width:100%; height:100%;
            background: #000; z-index: 9999; justify-content: center; align-items: center;
            text-align: center; padding: 20px;
        }

        /* Player Styling */
        .player-container { 
            position: relative; width: 100%; background: #000; 
            aspect-ratio: 16/9;
        }

        iframe { width: 100%; height: 100%; border: none; pointer-events: auto; }

        /* Lockscreen Layer: Transparent but blocks all interaction */
        #lockscreen { 
            display: none; position: absolute; top: 0; left: 0; 
            width: 100%; height: 100%; z-index: 999;
            background: rgba(0,0,0,0); /* Completely invisible */
            cursor: none; /* Hides cursor on desktop */
        }

        /* UI Styling */
        .ui-content { padding: 15px; max-width: 900px; margin: auto; }
        .card { 
            background: var(--card); border-radius: 12px; padding: 15px; 
            display: flex; align-items: center; gap: 15px; margin-bottom: 10px;
        }
        .dot { height: 10px; width: 10px; background: var(--red); border-radius: 50%; display: inline-block; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        .progress-bg { width: 100%; height: 6px; background: #333; border-radius: 3px; margin-top: 10px; overflow: hidden; }
        #progress-fill { height: 100%; background: var(--red); width: 0%; transition: width 1s linear; }

        /* Landscape Mode Adjustments */
        @media (orientation: landscape) and (max-height: 500px) {
            .player-container { height: 100vh; width: 100vw; aspect-ratio: auto; }
            .ui-content { display: none; } /* Hide EPG in full landscape for "TV" feel */
        }

        footer { text-align: center; padding: 20px; color: #444; font-size: 0.7rem; }
    </style>
</head>
<body>

    <div id="chrome-only">
        <h1>Access Restricted</h1>
        <p>This playback system is optimized exclusively for <strong>Google Chrome</strong>.</p>
    </div>

    <div id="app-content">
        <div class="player-container">
            <div id="lockscreen"></div>
            <iframe id="main-player" allow="autoplay; fullscreen"></iframe>
        </div>

        <div class="ui-content">
            <div class="card" style="border-bottom: 3px solid var(--red);">
                <div style="flex: 1;">
                    <div style="font-weight: bold; font-size: 1.2rem;"><span class="dot"></span> <span id="title">LIVE</span></div>
                    <div id="timing" style="color: #888; margin: 5px 0;">--:-- to --:--</div>
                    <div class="progress-bg"><div id="progress-fill"></div></div>
                </div>
            </div>
            
            <div class="card" style="opacity: 0.6; font-size: 0.9rem;">
                <div>UP NEXT: <span id="next-start">--:--</span></div>
            </div>
        </div>

        <footer>&copy; 2026 MSTV4 • Proprietary System</footer>
    </div>

    <script>
        // 1. CHROME ONLY LOGIC
        const isChrome = /Chrome/.test(navigator.userAgent) && /Google Inc/.test(navigator.vendor);
        if (!isChrome) {
            document.getElementById('chrome-only').style.display = 'flex';
            document.getElementById('app-content').style.display = 'none';
        }

        const JSON_URL = 'https://raw.githubusercontent.com/YOUR_USER/mstv4/main/schedule.json';
        let schedule = [];

        async function init() {
            try {
                const res = await fetch(JSON_URL);
                schedule = await res.json();
                
                update();
                setInterval(update, 5000);

                // 2. LOCKSCREEN LOGIC (40 Seconds)
                setTimeout(() => {
                    document.getElementById('lockscreen').style.display = 'block';
                    console.log("Controls locked.");
                }, 40000);

            } catch (e) { console.error("Load failed", e); }
        }

        function update() {
            if (!schedule.length) return;
            const now = new Date();
            const timeStr = now.getHours().toString().padStart(2, '0') + ":" + 
                            now.getMinutes().toString().padStart(2, '0');

            let current = schedule.find(i => timeStr >= i.start && timeStr < i.end);
            if (!current) current = schedule;

            // Player Sync
            const p = document.getElementById('main-player');
            if (p.src !== current.url) p.src = current.url;

            // UI Sync
            document.getElementById('title').innerText = current.title;
            document.getElementById('timing').innerText = `${current.start} - ${current.end}`;

            // Progress Bar
            const [sh, sm] = current.start.split(':').map(Number);
            const [eh, em] = current.end.split(':').map(Number);
            const startM = sh * 60 + sm;
            let endM = eh * 60 + em;
            if (endM < startM) endM += 1440;
            const nowM = now.getHours() * 60 + now.getMinutes();
            const pct = ((nowM - startM) / (endM - startM)) * 100;
            document.getElementById('progress-fill').style.width = Math.min(100, Math.max(0, pct)) + "%";

            // Next Logic
            const nextIdx = (schedule.indexOf(current) + 1) % schedule.length;
            document.getElementById('next-start').innerText = schedule[nextIdx].start;
        }

        init();
    </script>
</body>
</html>
