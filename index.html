<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSTV Network | Watch Indian TV & Live Cricket</title>
    <meta name="description" content="Stream Indian, Punjabi and religious TV channels live. MSTV Network offers free HD streaming.">
    
    <!-- SEO & Performance -->
    <link rel="canonical" href="https://mstvnet.netlify.app">
    <script defer src="./shaka.js"></script>
    <script defer src="https://cdn.jsdelivr.net"></script>

    <style>
        html, body { margin:0; padding:0; font-family:Arial,sans-serif; background:#0F1115; color:#E0E0E0; display:flex; flex-direction:column; align-items:center; }
        .title { font-size:2.2em; margin:50px 0 10px; font-weight:bold; background:linear-gradient(90deg,#90EE90,#00FFA3); -webkit-background-clip:text; color:transparent; }
        .channel-select { margin-bottom:20px; width:90%; max-width:400px; }
        select { width:100%; padding:12px; border-radius:12px; border:none; background:#1A1D20; color:#90EE90; cursor:pointer; }
        .player-container { position:relative; width:90%; max-width:900px; aspect-ratio:16/9; background:#141618; border-radius:15px; display:flex; align-items:center; justify-content:center; overflow:hidden; }
        video, iframe { position:absolute; width:100%; height:100%; border:none; display:none; }
        #loading { color: #90EE90; margin: 10px 0; display: none; }
        
        /* Category Button Styles */
        .category-nav { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin: 20px 0; }
        .cat-btn { background: #1A1D20; color: #90EE90; border: 1px solid #333; padding: 8px 16px; border-radius: 20px; cursor: pointer; transition: 0.3s; }
        .cat-btn:hover, .cat-btn.active { background: #90EE90; color: #000; }

        .site-footer { width:100%; max-width:900px; margin-top:40px; padding:20px; text-align:center; border-top:1px solid #222; color:#777; }
    </style>
</head>
<body>
    <div class="title">MSTV NETWORK</div>
    <h1>Watch Live TV Channels</h1>

    <!-- Category Filter -->
    <nav class="category-nav" style="display:flex; gap:10px; justify-content:center; margin-bottom:20px;">
        <button class="cat-btn active" onclick="filterChannels('All', this)" style="padding:10px; cursor:pointer;">All</button>
        <button class="cat-btn" onclick="filterChannels('Punjabi', this)" style="padding:10px; cursor:pointer;">Punjabi</button>
        <button class="cat-btn" onclick="filterChannels('Hindi', this)" style="padding:10px; cursor:pointer;">Hindi</button>
        <button class="cat-btn" onclick="filterChannels('Religious', this)" style="padding:10px; cursor:pointer;">Religious</button>
    </nav>

    <div class="channel-select">
        <select id="channel-select" aria-label="Select TV Channel">
            <option value="">📱 Loading Channels...</option>
        </select>
    </div>

    <div id="loading" style="display:none; color:#90EE90;">🌀 Buffering...</div>

    <div class="player-container" style="position:relative; width:90%; max-width:900px; aspect-ratio:16/9; background:#000; display:flex; align-items:center; justify-content:center;">
        <div id="placeholder" style="font-size:5rem;">📺</div>
        <video id="video-player" autoplay playsinline controls style="width:100%; height:100%; display:none;"></video>
        <iframe id="iframe-player" style="width:100%; height:100%; border:none; display:none;"></iframe>
    </div>

    <script>
        const select = document.getElementById('channel-select');
        const video = document.getElementById('video-player');
        const iframe = document.getElementById('iframe-player');
        const placeholder = document.getElementById('placeholder');
        const loader = document.getElementById('loading');
        
        let allChannels = [];
        let shakaPlayer = null;
        let hls = null;

        // 1. Initialise and Load Data
        async function init() {
            // Setup Shaka Polyfills
            if (window.shaka) {
                shaka.polyfill.installAll();
                if (shaka.Player.isBrowserSupported()) {
                    shakaPlayer = new shaka.Player(video);
                }
            }

            try {
                // Try to fetch the JSON
                const res = await fetch('./channels.json');
                if (!res.ok) throw new Error(`HTTP Error! Status: ${res.status}`);
                
                allChannels = await res.json();
                console.log("Channels loaded successfully:", allChannels);
                
                populateDropdown(allChannels);
            } catch(e) {
                console.error("Critical Load Error:", e.message);
                select.innerHTML = `<option value="">⚠️ Error: ${e.message}</option>`;
            }
        }

        // 2. Populate UI
        function populateDropdown(list) {
            select.innerHTML = `<option value="">📱 Select Channel (${list.length})</option>`;
            list.forEach((ch) => {
                const opt = document.createElement("option");
                opt.value = JSON.stringify(ch); 
                opt.textContent = ch.name;
                select.appendChild(opt);
            });
        }

        // 3. Category Filter
        function filterChannels(category, btn) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            const filtered = (category === 'All') 
                ? allChannels 
                : allChannels.filter(ch => ch.category === category);
            
            populateDropdown(filtered);
        }

        // 4. Playback Logic
        async function playChannel(dataStr) {
            if(!dataStr) return;
            const ch = JSON.parse(dataStr);
            
            // SEO Title Update
            document.title = `Watching ${ch.name} | MSTV Network`;
            
            // Clean current player
            await stopAll();
            
            loader.style.display = 'block';
            placeholder.style.display = 'none';

            if(ch.type === 'iframe') {
                iframe.style.display = 'block';
                iframe.src = ch.url;
                iframe.onload = () => loader.style.display = 'none';
            } else {
                video.style.display = 'block';
                
                if (ch.type === 'shaka' && shakaPlayer) {
                    try {
                        await shakaPlayer.load(ch.url);
                        video.play();
                    } catch(e) { console.error("Shaka error", e); }
                } else if (window.Hls && Hls.isSupported()) {
                    hls = new Hls();
                    hls.loadSource(ch.url);
                    hls.attachMedia(video);
                    hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
                } else {
                    video.src = ch.url;
                    video.play();
                }
            }
        }

        async function stopAll() {
            loader.style.display = 'none';
            if(hls) { hls.destroy(); hls = null; }
            if(shakaPlayer) await shakaPlayer.unload();
            video.pause();
            video.removeAttribute('src');
            video.load();
            video.style.display = 'none';
            iframe.style.display = 'none';
            iframe.src = 'about:blank';
        }

        video.onplaying = () => loader.style.display = 'none';
        select.onchange = () => playChannel(select.value);

        init();
    </script>
</body>
</html>
