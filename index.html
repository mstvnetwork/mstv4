<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Linear TV Test</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body{
    margin:0;
    background:#111;
    color:#fff;
    font-family:Arial,sans-serif;
}

.player-wrap{
    max-width:1200px;
    margin:auto;
    padding:20px;
}

.video-container{
    position:relative;
    width:100%;
    aspect-ratio:16/9;
    background:#000;
    overflow:hidden;
}

video,
iframe{
    width:100%;
    height:100%;
    border:0;
}

.loader{
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    background:rgba(0,0,0,.6);
}

.loader.hidden{
    display:none;
}

.error{
    display:none;
    padding:10px;
    background:#900;
    margin-top:10px;
}

.error.show{
    display:block;
}

.controls{
    display:flex;
    gap:12px;
    align-items:center;
    padding:12px 0;
}

button{
    cursor:pointer;
    padding:8px 14px;
}

.progress{
    height:6px;
    background:#333;
    margin:10px 0;
}

.progress-fill{
    height:100%;
    width:0%;
    background:#0f0;
}

.schedule{
    margin-top:20px;
    max-height:300px;
    overflow:auto;
    border:1px solid #333;
}

.schedule-item{
    padding:10px;
    border-bottom:1px solid #222;
}

.schedule-item.active{
    background:#222;
}

.toast{
    position:fixed;
    right:20px;
    bottom:20px;
    background:#222;
    padding:10px 15px;
    border-radius:6px;
    opacity:0;
    transition:.3s;
}

.toast.show{
    opacity:1;
}

.vol-overlay{
    display:none;
    position:absolute;
    bottom:10px;
    left:10px;
    padding:6px 10px;
    background:rgba(0,0,0,.7);
    border-radius:4px;
    font-size:12px;
    z-index:100;
    pointer-events:none;
}
</style>
</head>
<body>

<div class="player-wrap">

    <h2 id="nowTitle">Loading...</h2>

    <div id="clock"></div>
    <div id="clockDate"></div>

    <div class="video-container">

        <video
            id="videoPlayer"
            playsinline
            controlslist="nodownload">
        </video>

        <iframe
            id="iframePlayer"
            style="display:none;"
            allowfullscreen>
        </iframe>

        <div id="loader" class="loader">
            Loading...
        </div>

        <div id="volOverlay" class="vol-overlay">
            Volume controlled by embedded player
        </div>

    </div>

    <div id="errorMsg" class="error">
        Playback error. Retrying...
    </div>

    <div class="controls">

        <button id="btnPlay">⏸</button>

        <input
            id="volSlider"
            type="range"
            min="0"
            max="1"
            step="0.01"
            value="0.8">

    </div>

    <div class="progress">
        <div id="progressFill" class="progress-fill"></div>
    </div>

    <div id="statusText"></div>
    <div id="statusOffset"></div>

    <h3>Schedule</h3>
    <div id="scheduleList" class="schedule"></div>

</div>

<div id="syncToast" class="toast">
    Synced to live position
</div>

<div id="updateToast" class="toast">
    Playlist updated
</div>

<script src="./player.js"></script>

<script>

initPlayer({

    videoId: 'videoPlayer',
    iframeId: 'iframePlayer',

    loaderId: 'loader',
    errorId: 'errorMsg',

    btnPlayId: 'btnPlay',
    volSliderId: 'volSlider',

    progressFillId: 'progressFill',
    scheduleListId: 'scheduleList',

    syncToastId: 'syncToast',
    updateToastId: 'updateToast',

    statusTextId: 'statusText',
    statusOffsetId: 'statusOffset',

    nowTitleId: 'nowTitle',

    volOverlayId: 'volOverlay',

    showClock: true,
    clockId: 'clock',
    clockDateId: 'clockDate'

});

</script>

</body>
</html>
