<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Apna Tv</title>

<style>
html, body {
    height: 100%;
    margin: 0;
    overflow: hidden; /* 🔥 removes scrollbar */
    font-family: Arial, sans-serif;
    background: #0b0b0b;
    color: #fff;
}

/* MAIN LAYOUT */
.app {
    display: flex;
    flex-direction: column;
    height: 100vh;
}

/* HEADER */
.header {
    padding: 10px 14px;
    flex-shrink: 0;
}

.header h1 {
    margin: 0;
    font-size: 18px;
}

.header p {
    margin: 2px 0 0;
    font-size: 12px;
    opacity: 0.7;
}

/* PLAYER AREA */
.player-wrapper {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* 16:9 BOX */
.player-container {
    width: 100%;
    max-width: 1000px;
    aspect-ratio: 16 / 9;
    background: black;
}

#videoPlayer {
    width: 100%;
    height: 100%;
    border: none;
}

/* EPG */
.epg {
    padding: 10px;
    display: flex;
    gap: 10px;
    flex-shrink: 0;
}

.card {
    flex: 1;
    background: #1a1a1a;
    padding: 10px;
    border-radius: 8px;
}

.card-title {
    font-size: 11px;
    opacity: 0.6;
}

.card-main {
    font-size: 14px;
    font-weight: bold;
}

/* Progress */
.progress-container {
    margin-top: 6px;
    height: 4px;
    background: rgba(255,255,255,0.2);
}

.progress-bar {
    height: 100%;
    width: 0%;
    background: #00ffcc;
}

/* FOOTER */
.footer {
    text-align: center;
    font-size: 11px;
    opacity: 0.5;
    padding: 6px;
    flex-shrink: 0;
}

</style>
</head>

<body>

<div class="app">

    <div class="header">
        <h1>Apna Tv</h1>
        <p>Watch serials, web series & movies</p>
    </div>

    <div class="player-wrapper">
        <div class="player-container">
            <iframe id="videoPlayer"></iframe>
        </div>
    </div>

    <div class="epg">
        <div class="card">
            <div class="card-title">Live Now</div>
            <div class="card-main" id="nowTitle"></div>
            <div class="progress-container">
                <div class="progress-bar" id="progressBar"></div>
            </div>
        </div>

        <div class="card">
            <div class="card-title">Next</div>
            <div class="card-main" id="nextTitle"></div>
        </div>
    </div>

    <div class="footer">
        Apna TV 24/7
    </div>

</div>
<script>
const BASE_JSON_URL = "https://mstvnetwork.github.io/mstv4/epg.json";

const playlist = [
    { title: "Indian Idol", url: "https://vkprime.com/embed-k1ipwza01c0d.html" },
    { title: "Mtv", url: "https://vkprime.com/embed-e6r4icq8gcq1.html" }
];

let progressTimer;

async function loadEPG() {
    try {
        const res = await fetch(BASE_JSON_URL + "?v=" + Date.now());
        const data = await res.json();

        const nowTime = Date.now();

        let current = null;
        let next = null;

        for (let i = 0; i < data.schedule.length; i++) {
            const start = new Date(data.schedule[i].start).getTime();
            const end = new Date(data.schedule[i].end).getTime();

            if (nowTime >= start && nowTime < end) {
                current = data.schedule[i];
                next = data.schedule[i + 1] || null;
                break;
            }
        }

        if (!current) return;

        updateUI(current, next);
        syncVideo(current.title);
        startProgress(current);

    } catch (e) {
        console.error("EPG error:", e);
    }
}

function updateUI(current, next) {
    document.getElementById("nowTitle").textContent = current.title;
    document.getElementById("nextTitle").textContent = next ? next.title : "";
}

function startProgress(program) {
    clearInterval(progressTimer);

    progressTimer = setInterval(() => {
        const now = Date.now();
        const start = new Date(program.start).getTime();
        const end = new Date(program.end).getTime();

        const percent = ((now - start) / (end - start)) * 100;
        document.getElementById("progressBar").style.width = percent + "%";

    }, 1000);
}

function syncVideo(title) {
    const player = document.getElementById("videoPlayer");
    const video = playlist.find(v => v.title === title);

    if (video && player.src !== video.url) {
        player.src = video.url;
    }
}

window.onload = () => {
    loadEPG();
    setInterval(loadEPG, 60000);
};
</script>

</body>
</html>
