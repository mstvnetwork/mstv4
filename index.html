<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<!-- 1. ANTI-CACHE META TAGS: Prevents the browser from caching the HTML page itself -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>MSNET IPTV Cinema Mode</title>

<style>
:root { --bg-black: #000000; }
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; width: 100%; background-color: var(--bg-black); overflow: hidden; }

/* Fixed Fullscreen Player Container */
.player-wrapper {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background: #000;
    z-index: 1;
}

#videoPlayer {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border: none;
    display: block;
}

/* Invisible Lock Overlay */
#silentLockOverlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 9999; 
    pointer-events: none; 
    background: rgba(0, 0, 0, 0);
}

/* Hide UI elements from view */
#currentTitle, #lockStatus, #browser-error { display: none; }
</style>
</head>
<body>

<div id="browser-error" style="color: white; padding: 20px; text-align: center;">
    <h2>Chrome Required</h2>
</div>

<div id="chrome-only-content">
    <h2 id="currentTitle"></h2> <!-- Logic only -->
    <div class="player-wrapper">
        
      <iframe id="videoPlayer" sandbox="allow-scripts allow-same-origin allow-forms allow-presentation" playsinline></iframe>
       <div id="epg-info" style="margin-top:10px; font-family: sans-serif;">
    <strong>Now:</strong> <span id="now-playing">Loading...</span><br>
    <strong>Next:</strong> <span id="next-playing">---</span>
</div>

      <div id="silentLockOverlay"></div>
    </div>
    <p id="lockStatus"></p> <!-- Logic only -->
</div>

<script>
// Base URL for the JSON file
const BASE_JSON_URL = "https://raw.githubusercontent.com";

const playlist = [
    { title: "Indian Idol", url: "https://vkprime.com/embed-k1ipwza01c0d.html" },
    { title: "Mtv", url: "https://vkprime.com/embed-e6r4icq8gcq1.html" }
];

let silentLockTimer;
const lockOverlay = document.getElementById('silentLockOverlay');

function isStrictChrome() {
    const ua = navigator.userAgent;
    const isChrome = (ua.indexOf("Chrome") > -1 || ua.indexOf("CriOS") > -1);
    const isOther = (ua.indexOf("Edg") > -1 || ua.indexOf("SamsungBrowser") > -1 || ua.indexOf("OPR") > -1);
    return isChrome && !isOther;
}

async function loadEPG() {
    const freshUrl = BASE_JSON_URL + "?v=" + Date.now();
    
    try {
        const res = await fetch(freshUrl);
        if (!res.ok) throw new Error("Network response was not ok");
        
        const data = await res.json();
        const now = new Date();
        
        let currentProgramTitle = null;
        let nextProgramTitle = "No further scheduled programs";

        // Loop to find "Now" and "Next"
        for (let i = 0; i < data.schedule.length; i++) {
            const start = new Date(data.schedule[i].start);
            const end = new Date(data.schedule[i].end);

            if (now >= start && now < end) {
                currentProgramTitle = data.schedule[i].title;
                
                // If there's an item after this one in the JSON, that's "Next"
                if (data.schedule[i + 1]) {
                    nextProgramTitle = data.schedule[i + 1].title;
                }
                break;
            }
        }

        // Update the UI
        document.getElementById('now-playing').innerText = currentProgramTitle || "Rotation Active";
        document.getElementById('next-playing').innerText = nextProgramTitle;

        if(!currentProgramTitle) {
            rotateLocal();
        } else {
            syncVideo(currentProgramTitle);
        }

    } catch(e) {
        console.error("EPG Update Error:", e);
        document.getElementById('now-playing').innerText = "Offline";
        rotateLocal();
    }
}



function rotateLocal() {
    const player = document.getElementById('videoPlayer');
    const currentIndex = playlist.findIndex(v => v.url === player.src);
    const nextIndex = (currentIndex + 1) % playlist.length;
    syncVideo(playlist[nextIndex].title);
}

function syncVideo(liveTitle){
    const player = document.getElementById('videoPlayer');
    let liveVideo = playlist.find(v => v.title === liveTitle);

    if(liveVideo && player.src !== liveVideo.url){
        player.src = liveVideo.url;

        // Reset Interaction Lock for 40 seconds
        clearTimeout(silentLockTimer);
        lockOverlay.style.pointerEvents = 'none'; 

        silentLockTimer = setTimeout(() => {
            lockOverlay.style.pointerEvents = 'auto';
        }, 40000); 
    }
}

window.onload = function(){
    if(isStrictChrome()){
        document.getElementById('chrome-only-content').style.display='block';
        document.getElementById('browser-error').style.display='none';
        loadEPG();
        // Check for latest updates from JSON every 60 seconds
        setInterval(loadEPG, 60000); 
    } else {
        document.getElementById('browser-error').style.display='block';
        document.getElementById('chrome-only-content').style.display='none';
    }
};
</script>
</body>
  </html>
