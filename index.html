<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Apna Tv</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b0b0b;
    color: #fff;
}

/* HEADER */
.header {
    padding: 16px;
}

.header h1 {
    margin: 0;
    font-size: 22px;
}

.header p {
    margin: 4px 0 0;
    font-size: 13px;
    opacity: 0.7;
}

/* PLAYER 16:9 */
.player-container {
    width: 100%;
    max-width: 1000px;
    margin: auto;
    aspect-ratio: 16 / 9;
    background: black;
    position: relative;
}

#videoPlayer {
    width: 100%;
    height: 100%;
    border: none;
}

/* EPG SECTION */
.epg {
    max-width: 1000px;
    margin: 20px auto;
    padding: 0 12px;
    display: grid;
    gap: 12px;
}

.card {
    background: #1a1a1a;
    padding: 12px;
    border-radius: 10px;
}

.card-title {
    font-size: 12px;
    opacity: 0.6;
    margin-bottom: 4px;
}

.card-main {
    font-size: 16px;
    font-weight: bold;
}

/* PROGRESS BAR */
.progress-container {
    margin-top: 8px;
    height: 4px;
    background: rgba(255,255,255,0.15);
    border-radius: 2px;
}

.progress-bar {
    height: 100%;
    width: 0%;
    background: #00ffcc;
}

/* FOOTER */
.footer {
    text-align: center;
    font-size: 12px;
    opacity: 0.5;
    padding: 20px 10px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <h1>Apna Tv</h1>
    <p>Watch serials, web series & movies</p>
</div>

<!-- PLAYER -->
<div class="player-container">
    <iframe id="videoPlayer"></iframe>
</div>

<!-- EPG -->
<div class="epg">
    <div class="card">
        <div class="card-title">Live Now</div>
        <div class="card-main" id="nowTitle">Loading...</div>
        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>
    </div>

    <div class="card">
        <div class="card-title">Next</div>
        <div class="card-main" id="nextTitle"></div>
    </div>
</div>

<!-- FOOTER -->
<div class="footer">
    Apna TV 24/7 • Streaming everywhere
</div>

<script>
const BASE_JSON_URL = "https://raw.githubusercontent.com/your-username/your-repo/main/epg.json";

const playlist = [
    { title: "Indian Idol", url: "https://vkprime.com/embed-k1ipwza01c0d.html" },
    { title: "Mtv", url: "https://vkprime.com/embed-e6r4icq8gcq1.html" }
];

let progressTimer;

async function loadEPG() {
    try {
        const res = await fetch(BASE_JSON_URL + "?v=" + Date.now());
        const data = await res.json();

        const nowTime = Date.now();

        let current = null;
        let next = null;

        for (let i = 0; i < data.schedule.length; i++) {
            const start = new Date(data.schedule[i].start).getTime();
            const end = new Date(data.schedule[i].end).getTime();

            if (nowTime >= start && nowTime < end) {
                current = data.schedule[i];
                next = data.schedule[i + 1] || null;
                break;
            }
        }

        if (!current) return;

        updateUI(current, next);
        syncVideo(current.title);
        startProgress(current);

    } catch (e) {
        console.error("EPG error:", e);
    }
}

function updateUI(current, next) {
    document.getElementById("nowTitle").textContent = current.title;
    document.getElementById("nextTitle").textContent = next ? next.title : "";
}

function startProgress(program) {
    clearInterval(progressTimer);

    progressTimer = setInterval(() => {
        const now = Date.now();
        const start = new Date(program.start).getTime();
        const end = new Date(program.end).getTime();

        const percent = ((now - start) / (end - start)) * 100;
        document.getElementById("progressBar").style.width = percent + "%";

    }, 1000);
}

function syncVideo(title) {
    const player = document.getElementById("videoPlayer");
    const video = playlist.find(v => v.title === title);

    if (video && player.src !== video.url) {
        player.src = video.url;
    }
}

window.onload = () => {
    loadEPG();
    setInterval(loadEPG, 60000);
};
</script>

</body>
</html>
