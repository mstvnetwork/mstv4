<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MSTV Network | Watch Indian TV, Punjabi Channels & Live Cricket</title>

<!-- SEO Meta Tags -->
<meta name="description" content="Watch Indian TV channels live online. Free HD streaming on MSTV Network.">
<meta name="keywords" content="watch indian tv, punjabi tv live, hindi tv channels, cricket streaming, mstv network">

<!-- Player Libraries -->
<script defer src="./shaka.js"></script>
<script defer src="https://cdn.jsdelivr.net"></script>

<style>
  :root { --accent: #00FFA3; --bg: #0F1115; --card: #1A1D22; }
  body { 
    margin: 0; background: var(--bg); color: #fff; font-family: system-ui, sans-serif;
    display: flex; flex-direction: column; height: 100vh; overflow: hidden;
  }

  /* STICKY PLAYER AREA */
  #main-view { position: sticky; top: 0; z-index: 100; background: #000; width: 100%; }
  .player-container { width: 100%; aspect-ratio: 16/9; position: relative; background: #000; }
  video, iframe { width: 100%; height: 100%; border: none; display: none; z-index: 2; position: absolute; top:0; left:0; }
  
  #player-placeholder {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1;
  }

  #loading { 
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
    z-index: 10; display: none; color: var(--accent); font-weight: bold; 
  }

  .channel-details { padding: 10px 15px; background: #16191D; border-bottom: 1px solid #222; }
  #display-name { margin: 0; font-size: 1.1rem; color: var(--accent); min-height: 1.2em; }

  /* SCROLLABLE AREA */
  #sidebar { flex: 1; overflow-y: auto; padding: 0 15px 30px 15px; -webkit-overflow-scrolling: touch; }
  
  .title { 
    font-size: 1.9em; padding: 25px 0 5px 0; font-weight: bold; text-align: center; 
    background: linear-gradient(90deg, #90EE90, #00FFA3); -webkit-background-clip: text; color: transparent; 
  }
  .sub-header { font-size: 14px; color: #777; text-align: center; margin-bottom: 20px; }

  .channel-card { 
    display: flex; align-items: center; padding: 12px; margin-bottom: 10px; 
    background: var(--card); border-radius: 12px; cursor: pointer; border: 1px solid transparent;
  }
  .channel-card.active { border-color: var(--accent); background: #22272E; }
  .channel-card img { width: 48px; height: 48px; border-radius: 8px; margin-right: 15px; object-fit: cover; }
</style>
</head>

<body>

<div id="main-view">
    <div class="player-container">
        <div id="player-placeholder">
            <div style="font-size: 5rem; margin-bottom: 10px;">📺</div>
            <span style="opacity: 0.6;">Select a channel to start streaming</span>
        </div>
        <div id="loading">⚡ Loading...</div>
        <video id="video-player" autoplay playsinline controls></video>
        <!-- Corrected Sandbox for Ad-Blocking -->
        <iframe id="iframe-player" 
                sandbox="allow-scripts allow-same-origin allow-presentation allow-forms" 
                allow="autoplay; encrypted-media; picture-in-picture"></iframe>
    </div>
    <div class="channel-details"><h1 id="display-name"></h1></div>
</div>

<div id="sidebar">
    <div class="title">Aaina Tv</div>
    <div class="sub-header">Watch Indian, Punjabi & Religious TV Channels Live</div>
    <div id="channel-list"></div>
</div>

<script>
const video = document.getElementById('video-player');
const iframe = document.getElementById('iframe-player');
const loader = document.getElementById('loading');
const placeholder = document.getElementById('player-placeholder');
const displayName = document.getElementById('display-name');

let channels = [], hls = null, shakaPlayer = null;

async function stopAll() {
    loader.style.display = 'none';

    // 1. Aggressively kill Shaka
    if (shakaPlayer) {
        try {
            await shakaPlayer.detach(); // Disconnect from video element
            await shakaPlayer.destroy(); // Wipe from memory
        } catch (e) { console.error("Shaka cleanup error", e); }
        shakaPlayer = null;
    }

    // 2. Aggressively kill HLS.js
    if (hls) {
        hls.detachMedia(); // Disconnect from video element
        hls.destroy(); // Wipe from memory
        hls = null;
    }

    // 3. Factory Reset the Video Element
    video.pause();
    video.src = "";
    video.load(); // Force browser to release the stream buffer
    video.removeAttribute("src"); // Remove any remaining trace
    
    // 4. Reset Iframe
    iframe.src = 'about:blank';
    iframe.removeAttribute("src");

    // Hide everything for a clean slate
    video.style.display = 'none';
    iframe.style.display = 'none';
}

async function playChannel(index) {
    const ch = channels[index];
    if (!ch) return;

    // WAIT for complete cleanup before starting new engine
    await stopAll();
    
    placeholder.style.display = 'none';
    loader.style.display = 'block';
    displayName.textContent = ch.name;

    const isDash = ch.url.includes('.mpd') || ch.type === 'dash';
    const isHls = ch.url.includes('.m3u8') || ch.type === 'hls';

    // IFRAME Engine (Strictly Sandboxed)
    if (ch.type === 'iframe') {
        iframe.style.display = 'block';
        iframe.src = ch.url;
        iframe.onload = () => loader.style.display = 'none';
        return;
    }

    video.style.display = 'block';

    // ENGINE A: DASH EXCLUSIVE (Shaka)
    if (isDash) {
        if (window.shaka && shaka.Player.isBrowserSupported()) {
            shaka.polyfill.installAll();
            shakaPlayer = new shaka.Player(video);
            
            // Speed settings for low-network
            shakaPlayer.configure({
                streaming: { rebufferingGoal: 1, bufferingGoal: 4, lowLatencyMode: true }
            });

            try {
                await shakaPlayer.load(ch.url);
                video.play().catch(() => {});
            } catch (e) { console.error('DASH Fail', e); }
        }
        return; // EXIT: Ensure HLS engine is never even looked at
    }

    // ENGINE B: HLS EXCLUSIVE (Hls.js)
    if (isHls || ch.type === 'hls') {
        if (window.Hls && Hls.isSupported()) {
            hls = new Hls({ 
                capLevelToPlayerSize: true, 
                startLevel: 0, // Instant play on low speed
                enableWorker: true,
                appendErrorMaxRetry: 3 
            });
            hls.loadSource(ch.url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play().catch(() => {}));
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            // Native Safari fallback
            video.src = ch.url;
            video.play().catch(() => {});
        }
    }
}

function renderSidebar(data) {
    channels = data;
    const list = document.getElementById('channel-list');
    data.forEach((ch, i) => {
        const card = document.createElement("div");
        card.className = "channel-card";
        card.innerHTML = `<img src="${ch.logo || ''}" loading="lazy"><div class="name">${ch.name}</div>`;
        card.onclick = () => {
            window.scrollTo({top: 0, behavior: 'smooth'});
            document.querySelectorAll('.channel-card').forEach(c => c.classList.remove('active'));
            card.classList.add('active');
            playChannel(i);
        };
        list.appendChild(card);
    });
}

fetch('./channels.json').then(r => r.json()).then(renderSidebar);
</script>
</body>
</html>
