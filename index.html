<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Locked YouTube Playback</title>
    <style>
        /* 1. The Wrapper: Manages the 16:9 ratio and hides all scrollbars */
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 Ratio */
            height: 0;
            overflow: hidden;
            background: #000;
        }

        /* 2. The IFrame: Fits perfectly inside the wrapper */
        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
            pointer-events: none; /* Disables mouse/touch interaction inside the iframe */
        }

        /* 3. The Shield: An extra layer of protection to block clicks/drags entirely */
        .video-shield {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            cursor: default;
        }
    </style>
</head>
<body>

    <div class="video-wrapper">
        <!-- The Shield prevents any direct interaction with the video underneath -->
        <div class="video-shield"></div>

        <!-- 
          URL Parameters used:
          - autoplay=1 & mute=1: Necessary because users can't click "Play" 
          - controls=0: Hides the bar
          - disablekb=1: Disables keyboard jumps (spacebar, arrows)
          - rel=0: Limits related videos
        -->
        <iframe 
            src="https://www.youtube.com/embed/KMWcefrAKLg?si=cbCLpqbCnossfPvi" 
            allow="autoplay; encrypted-media" 
            tabindex="-1">
        </iframe>
    </div>

</body>
</html>
