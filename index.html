<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EPG Player</title>

<style>
body { font-family: Arial; background:#f4f4f2; margin:0; }
.main-content { max-width:900px; margin:auto; padding:20px; position:relative; }

/* Container */
.modern-header {
  display: flex;
  align-items: center;
  justify-content: center; /* center content horizontally */
  padding: 20px 30px;
  background-color: #0b0c17;
  flex-wrap: wrap;
  gap: 10px; /* optional: spacing between logo and title */
}

/* Logo */
.logo {
  width: 50px;
  height: auto;
}

/* Title wrapper */
.title-wrapper {
  display: flex;
  flex-direction: column;
  align-items: center; /* center title under logo horizontally */
  margin-left: 0; /* remove extra margin if centering */
}
/* Main title */
.site-title {
  font-family: 'Poppins', sans-serif;
  font-weight: 700;
  font-size: 2rem;
  background: linear-gradient(90deg, #ff6a00, #ffcc00);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin: 0;
  transition: transform 0.2s;
}

.site-title:hover {
  transform: scale(1.05);
}

/* Subtitle */
.site-subtitle {
  font-family: 'Poppins', sans-serif;
  font-weight: 300;
  font-size: 0.9rem;
  color: #bbb;
  margin: 2px 0 0 0;
}


.player-wrapper {
    width:100%;
    aspect-ratio:16/9;
    background:black;
    border-radius:10px;
    overflow:hidden;
    position:relative;
}

#videoPlayer { width:100%; height:100%; border:none; }

#silentLockOverlay {
    position: absolute;
    inset: 0;
    z-index: 9999;
    pointer-events: none;
    background: rgba(0,0,0,0);
}

.epg-section { margin-top:20px; }

.epg-card {
    background:yellow;
    padding:15px;
    border-radius:8px;
    margin-bottom:10px;
}

.epg-card.live {
    border:5px solid red;
}

.progress-wrapper {
    height:6px;
    background:#ddd;
    margin-top:10px;
}

#progressBar {
    height:100%;
    width:0%;
    background:red;
    transition:width 0.5s linear;
}
    /* Footer */
footer {
    background: var(--footer-bg);
    padding: 20px;
    text-align: center;
    font-size: 0.85rem;
    color: #666;
    margin-top: 40px;
}
</style>
</head>

<body>
    <header class="modern-header">
  <img src="https://cdn.jsdelivr.net/gh/mstvnetwork/mstv4/assets/apna1.webp" alt="Logo" class="logo">
  <div class="title-wrapper">
    <h1 class="site-title">ModernSite</h1>
    <p class="site-subtitle">Sleek & Lightweight</p>
  </div>
  
    </header>

<div class="main-content">

<div class="player-wrapper">
    <iframe id="videoPlayer" sandbox="allow-scripts allow-same-origin allow-forms allow-presentation"></iframe>
    <div id="silentLockOverlay"></div>
</div>

<div class="epg-section">

<div class="epg-card" id="nowCard">
    <div>Now Playing</div>
    <div id="currentTitle">Loading...</div>
    <div id="currentTimeRange">--</div>
    <div class="progress-wrapper">
        <div id="progressBar"></div>
    </div>
</div>

<div class="epg-card">
    <div>Next</div>
    <div id="nextTitle">--</div>
    <div id="nextStartTime"></div>
</div>

</div>
</div>
    <footer>
    <p>&copy; 2026 MSNET Streaming Services • All Rights Reserved</p>
    </footer>

<script>
const BASE_JSON_URL = "https://raw.githubusercontent.com/mstvnetwork/mstv4/main/schedule.json";

const playlist = [
    { title: "Indian Idol", url: "https://vkprime.com/embed-k1ipwza01c0d.html" },
    { title: "Mtv", url: "https://vkprime.com/embed-e6r4icq8gcq1.html" }
];

let rotateIndex = 0;
let lockTimer = null;

// helper
function getEl(id){ return document.getElementById(id); }

function createTime(base, timeStr){
    const [h,m] = timeStr.split(":").map(Number);
    const d = new Date(base);
    d.setHours(h,m,0,0);
    return d;
}

// 🔴 Lock overlay logic
function activateLock(){
    const overlay = getEl("silentLockOverlay");
    if(!overlay) return;

    clearTimeout(lockTimer);

    // unlock immediately
    overlay.style.pointerEvents = "none";

    // lock after 40 sec
    lockTimer = setTimeout(()=>{
        overlay.style.pointerEvents = "auto";
    }, 40000);
}

// 🔥 MAIN EPG LOGIC
function updateNowNext(schedule){
    const now = new Date();

    let current = null;
    let next = null;

    for(let i=0;i<schedule.length;i++){
        const item = schedule[i];

        const start = createTime(now, item.start);
        const end = createTime(now, item.end);

        if(end <= start) end.setDate(end.getDate()+1);

        if(now >= start && now < end){
            current = {...item, startDate:start, endDate:end};
            next = schedule[i+1] || null;
            break;
        }

        if(now < start && !next){
            next = item;
        }
    }

    const titleEl = getEl("currentTitle");
    const timeEl = getEl("currentTimeRange");
    const nextTitle = getEl("nextTitle");
    const nextTime = getEl("nextStartTime");
    const bar = getEl("progressBar");
    const card = getEl("nowCard");

    card.classList.remove("live");

    if(current){
        titleEl.textContent = current.title;
        timeEl.textContent = current.start + " - " + current.end;

        const percent = ((now - current.startDate)/(current.endDate - current.startDate))*100;
        bar.style.width = percent + "%";
        bar.style.background = "red";

        card.classList.add("live");
    } else {
        titleEl.textContent = "Off Air";
        timeEl.textContent = "--";
        bar.style.width = "0%";
    }

    if(next){
        nextTitle.textContent = next.title;
        nextTime.textContent = "Starts at " + next.start;
    } else {
        nextTitle.textContent = "N/A";
        nextTime.textContent = "";
    }

    return current ? current.title : null;
}

// 🔥 VIDEO SYNC
function syncVideo(title){
    const player = getEl("videoPlayer");
    const video = playlist.find(v=>v.title===title);

    if(video){
        if(!player.src.includes(video.url)){
            player.src = video.url;
            activateLock(); // reset lock on video change
        }
    } else {
        rotateVideo();
    }
}

// 🔥 VIDEO ROTATION FALLBACK
function rotateVideo(){
    const player = getEl("videoPlayer");
    const video = playlist[rotateIndex % playlist.length];
    player.src = video.url;
    rotateIndex++;
    activateLock(); // reset lock on rotation
}

// 🔥 FETCH AND UPDATE EPG WITH CACHE-BUSTER
async function loadEPG(){
    try{
        const url = BASE_JSON_URL + "?v=" + Date.now(); // cache-buster
        const res = await fetch(url, { cache: "no-store" });
        if(!res.ok) throw new Error("Failed to fetch JSON");

        const data = await res.json();

        const live = updateNowNext(data.schedule);

        if(live){
            syncVideo(live);
        } else {
            rotateVideo();
        }
    } catch(e){
        console.error("EPG fetch error:", e);
        rotateVideo();
    }
}

// INIT
loadEPG();
setInterval(loadEPG, 15000); // refresh every 15 sec
</script>

</body>
</html>
