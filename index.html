<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>MSTV Network | Live Indian TV</title>

<style>
/* BODY STABILITY */
html, body {
  overflow-x: hidden;
  scroll-behavior: smooth;
  touch-action: pan-x pan-y;
  overscroll-behavior: none;
  margin: 0;
  padding: 0;
  font-family: Arial, sans-serif;
  background: #0b0f14;
  color: #e6edf3;
}

/* HEADER */
.topbar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 100;
  background: #0b0f14;
  border-bottom: 1px solid #1f2937;
  display: flex;
  justify-content: center;
  height: 48px;
}

.topbar-inner {
  width: 95%;
  max-width: 1200px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 0;
  box-sizing: border-box;
}

/* BRAND */
.brand {
  display: flex;
  align-items: center;
  gap: 8px;
}

.logo-img {
  width: 36px;
  height: 36px;
}

.brand-text {
  display: flex;
  flex-direction: column;
  line-height: 1;
}

.brand-name {
  font-weight: 600;
  font-size: 14px;
  color: #00ffa3;
}

.brand-slogan {
  font-size: 10px;
  opacity: 0.7;
}

/* SEARCH */
#search {
  width: 180px;
  padding: 6px 10px;
  border-radius: 6px;
  border: 1px solid #1f2937;
  background: #121820;
  color: white;
  font-size: 13px;
}

/* STICKY PLAYER */
.player-sticky {
  position: fixed;
  top: 48px; /* below header */
  left: 50%;
  transform: translateX(-50%);
  z-index: 90;
  width: 95%;
  max-width: 1000px;
  display: flex;
  justify-content: center;
  padding: 6px 0;
  background: #0b0f14;
  border-bottom: 1px solid #1f2937;
}

.player-container {
  position: relative;
  width: 100%;
  aspect-ratio: 16/9;
  background: #000;
  border-radius: 12px;
  overflow: hidden;
}

/* CHANNEL GRID */
.channels {
  margin-top: 420px; /* header + player height */
  width: 95%;
  max-width: 1200px;
  padding: 20px 16px;
  margin-left: auto;
  margin-right: auto;
  box-sizing: border-box;
}

#channel-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 16px;
}

/* CHANNEL CARD */
.channel-card {
  background: #121820;
  border-radius: 10px;
  padding: 10px;
  text-align: center;
  cursor: pointer;
  border: 1px solid #1f2937;
  transition: 0.2s;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.channel-card img {
  width: 100%;
  height: 80px;
  object-fit: contain;
}

.channel-card span {
  font-size: 13px;
  margin-top: 4px;
  text-align: center;
}

/* LOADER & LIVE STAMP */
#loading {
  color: #90EE90;
  font-weight: bold;
  margin: 20px auto;
  display: none;
  text-align: center;
}

#live-stamp {
  position: absolute;
  top: 5px;
  left: 5px;
  background: #E50914;
  color: #fff;
  font-size: 0.75rem;
  font-weight: 700;
  padding: 6px 12px;
  border-radius: 6px;
  letter-spacing: 1px;
  z-index: 50;
  display: none;
  box-shadow: 0 0 12px rgba(229, 9, 20, 0.6);
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <img src="https://mstvnet.netlify.app/mstv-thumbnail.png" class="logo-img">
      <div class="brand-text">
        <div class="brand-name">MSTV Network</div>
        <div class="brand-slogan">Watch Indian TV Channels Live</div>
      </div>
    </div>
    <input id="search" placeholder="Search channel">
  </div>
</header>

<!-- PLAYER -->
<div class="player-sticky">
  <div class="player-container">
    <div id="placeholder">📺</div>
    <video id="video-player" autoplay playsinline controls></video>
    <iframe id="iframe-player" sandbox="allow-scripts allow-same-origin allow-presentation" allow="autoplay; encrypted-media; picture-in-picture"></iframe>
    <div id="live-stamp">LIVE</div>
  </div>
</div>

<!-- LOADING -->
<div id="loading">🌀 Wait Loading...</div>

<!-- CHANNEL GRID -->
<div class="channels">
  <div id="channel-grid"></div>
</div>

<!-- SCRIPT: Lazy Loading + Search + Playback -->
<script defer src="./shaka.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script>
const JSON_URL = './channels.json';
const select = document.getElementById('search');
const video = document.getElementById('video-player');
const iframe = document.getElementById('iframe-player');
const placeholder = document.getElementById('placeholder');
const loader = document.getElementById('loading');
const liveStamp = document.getElementById('live-stamp');
const grid = document.getElementById('channel-grid');

let allChannels = [];
let channels = [];
let rendered = 0;
const batchSize = 24;
let hls = null;
let shakaPlayer = null;

async function stopAll(){
  loader.style.display='none';
  liveStamp.style.display='none';
  if(hls){ hls.destroy(); hls=null; }
  if(shakaPlayer){ await shakaPlayer.destroy(); shakaPlayer=null; }
  video.pause(); video.removeAttribute('src'); video.load();
  iframe.removeAttribute('src'); iframe.src='about:blank';
  video.style.display='none'; iframe.style.display='none';
  placeholder.style.display='flex';
}

async function playChannel(index){
  const ch = channels[index]; if(!ch) return;
  await stopAll();
  loader.style.display='block';
  placeholder.style.display='none';
  liveStamp.style.display = ch.isLive ? 'block' : 'none';
  // Scroll player into view
  document.querySelector(".player-container").scrollIntoView({behavior:"smooth", block:"start"});

  if(ch.type==='iframe'){
    iframe.style.display='block';
    iframe.src = ch.url;
    iframe.onload = () => loader.style.display='none';
    return;
  }

  video.style.display='block';
  const isHls = ch.type==='hls' || ch.url.includes('.m3u8');
  if(isHls){
    if(window.Hls && Hls.isSupported()){
      hls = new Hls({ enableWorker:true, lowLatencyMode:true });
      hls.loadSource(ch.url);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, ()=> video.play());
    } else if(video.canPlayType('application/vnd.apple.mpegurl')){
      video.src = ch.url; video.play();
    }
    return;
  }

  if(window.shaka && shaka.Player.isBrowserSupported()){
    shaka.polyfill.installAll();
    shakaPlayer = new shaka.Player(video);
    try{
      await shakaPlayer.load(ch.url);
      video.play();
    }catch(e){ console.error(e); loader.style.display='none'; placeholder.style.display='flex'; liveStamp.style.display='none'; }
  }
}

video.onplaying = ()=> loader.style.display='none';

function getLogo(name){ return `https://logo.clearbit.com/${name.replace(/\s/g,'').toLowerCase()}.com`; }

function renderMore(){
  const next = channels.slice(rendered, rendered+batchSize);
  next.forEach((ch,i)=>{
    const index = rendered+i;
    const card = document.createElement('div'); card.className='channel-card';
    const logo = ch.logo || getLogo(ch.name);
    card.innerHTML = `<img loading="lazy" src="${logo}"><span>${ch.name}</span>`;
    card.onclick = ()=> playChannel(index);
    grid.appendChild(card);
  });
  rendered += batchSize;
}

function resetGrid(){
  grid.innerHTML='';
  rendered = 0;
  renderMore();
}

window.addEventListener("scroll", ()=>{
  if(window.innerHeight + window.scrollY >= document.body.offsetHeight-300){
    if(rendered < channels.length) renderMore();
  }
});

async function loadChannels(){
  try{
    const res = await fetch(JSON_URL,{cache:"force-cache"});
    const data = await res.json();
    allChannels = data;
    channels = [...allChannels];
    resetGrid();
  }catch(e){ console.error('Channels load failed', e); }
}

select.addEventListener("input", function(){
  const q=this.value.trim().toLowerCase();
  channels = q==='' ? [...allChannels] : allChannels.filter(ch => ch.name.toLowerCase().includes(q));
  resetGrid();
});

loadChannels();
</script>

</body>
</html>
