<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>Seamless HLS TV Channel</title>
    <!-- Include Hls.js Library -->
    <script src="https://cdn.jsdelivr.net"></script>
    <style>
        body { background: #000; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: sans-serif; }
        .video-container { position: relative; width: 100%; height: 100%; max-width: 1280px; aspect-ratio: 16 / 9; background: #111; }
        video { position: absolute; width: 100%; height: 100%; background: #000; transition: opacity 0.5s; }
        .hidden { opacity: 0; pointer-events: none; }
        #overlay { position: absolute; inset: 0; display: flex; justify-content: center; align-items: center; background: rgba(0,0,0,0.8); color: white; cursor: pointer; z-index: 100; font-size: 1.5rem; text-transform: uppercase; letter-spacing: 2px; }
        #live-indicator { position: absolute; top: 20px; left: 20px; background: red; color: white; padding: 5px 10px; font-weight: bold; border-radius: 4px; z-index: 50; display: none; }
    </style>
</head>
<body>

    <div id="overlay" onclick="startChannel()">Click to Tune In</div>
    <div id="live-indicator">LIVE</div>

    <div class="video-container">
        <video id="player1" playsinline></video>
        <video id="player2" class="hidden" playsinline></video>
    </div>

    <script>
        const playlist = [
            { 
                title: "Primary Stream", 
                duration: 3600, // Placeholder: Set exact seconds for perfect sync
                url: "https://hls.desiserials.se/media/e1fdfdf9fab3a6a6e4bcd8f8e3fef9c8ddd9f3eba7fae0e5ffecfbfae1e6fbeceafbece8fde0ffece1fceba7faebfaa6fccfbce4dfbadfbfe2c2c4cca6e1e5fabaa6b9b8a6b9bebcb1bca6b9ece2f3f3f3fdf0e2e3fff1d6e7a6e4e8fafdecfba7fdf1fd" 
            },
            { 
                title: "Backup/Next Show", 
                duration: 600, 
                url: "https://test-streams.mux.dev" 
            }
        ];

        // "Channel Launch" time to sync all viewers
        const channelStartTime = new Date("2024-01-01T00:00:00Z").getTime();
        
        let activePlayer = document.getElementById('player1');
        let idlePlayer = document.getElementById('player2');
        let hlsActive = null;
        let hlsIdle = null;

        function getSyncData() {
            const totalDuration = playlist.reduce((acc, vid) => acc + vid.duration, 0);
            const elapsed = (Date.now() - channelStartTime) / 1000;
            const timeInLoop = elapsed % totalDuration;

            let runningSum = 0;
            for (let i = 0; i < playlist.length; i++) {
                if (runningSum + playlist[i].duration > timeInLoop) {
                    return { index: i, seekTo: timeInLoop - runningSum };
                }
                runningSum += playlist[i].duration;
            }
        }

        function loadHls(player, url, startTime = 0) {
            return new Promise((resolve) => {
                if (Hls.isSupported()) {
                    const hls = new Hls({ startPosition: startTime });
                    hls.loadSource(url);
                    hls.attachMedia(player);
                    hls.on(Hls.Events.MANIFEST_PARSED, () => resolve(hls));
                } else if (player.canPlayType('application/vnd.apple.mpegurl')) {
                    player.src = url;
                    player.currentTime = startTime;
                    resolve(null);
                }
            });
        }

        async function startChannel() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('live-indicator').style.display = 'block';

            const data = getSyncData();
            hlsActive = await loadHls(activePlayer, playlist[data.index].url, data.seekTo);
            activePlayer.play();

            // Monitor for preloading the next video
            setInterval(checkPreload, 1000);
        }

        async function checkPreload() {
            const timeLeft = activePlayer.duration - activePlayer.currentTime;
            
            // Pre-load the next video 15 seconds before the current one ends
            if (timeLeft < 15 && idlePlayer.dataset.status !== "loading") {
                const nextIndex = (getSyncData().index + 1) % playlist.length;
                idlePlayer.dataset.status = "loading";
                hlsIdle = await loadHls(idlePlayer, playlist[nextIndex].url, 0);
                console.log("Pre-loading next stream...");
            }

            // Perform the seamless swap
            if (activePlayer.ended || (activePlayer.duration > 0 && timeLeft <= 0.2)) {
                switchPlayers();
            }
        }

        function switchPlayers() {
            console.log("Switching players...");
            activePlayer.classList.add('hidden');
            idlePlayer.classList.remove('hidden');

            activePlayer.pause();
            idlePlayer.play();

            // Swap roles
            let tempPlayer = activePlayer;
            activePlayer = idlePlayer;
            idlePlayer = tempPlayer;

            if (hlsActive) hlsActive.destroy();
            hlsActive = hlsIdle;
            hlsIdle = null;

            idlePlayer.dataset.status = "idle";
        }
    </script>
</body>
</html>
