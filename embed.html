<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Linear TV — Embed</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js"></script>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{background:#000;height:100%;overflow:hidden}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

  .video-wrap{position:relative;width:100vw;height:100vh;background:#000;overflow:hidden}
  video{width:100%;height:100%;object-fit:contain;display:block}
  #embedIframe{position:absolute;inset:0;width:100%;height:100%;border:none;display:none}

  .controls{position:absolute;bottom:0;left:0;right:0;padding:16px 20px 14px;background:linear-gradient(transparent,rgba(0,0,0,0.85));display:flex;align-items:center;gap:14px;opacity:0;transition:opacity 0.3s;z-index:10}
  .video-wrap:hover .controls{opacity:1}
  .btn-play{width:34px;height:34px;border:1px solid rgba(255,255,255,0.3);background:rgba(255,255,255,0.1);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background 0.2s;font-size:13px}
  .btn-play:hover{background:rgba(255,255,255,0.25)}
  .vol-wrap{display:flex;align-items:center;gap:7px;color:rgba(255,255,255,0.7);font-size:12px;transition:opacity 0.3s}
  input[type=range].vol{-webkit-appearance:none;appearance:none;width:70px;height:3px;background:rgba(255,255,255,0.25);outline:none;cursor:pointer}
  input[type=range].vol::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:#e8ff00;cursor:pointer}
  .live-tag{margin-left:auto;display:flex;align-items:center;gap:5px;font-family:monospace;font-size:9px;letter-spacing:2px;color:#ff4444;border:1px solid #ff4444;padding:3px 8px;text-transform:uppercase}
  .live-dot{width:5px;height:5px;border-radius:50%;background:#ff4444;animation:blink 1.2s ease-in-out infinite}
  .vol-iframe-note{display:none;align-items:center;font-family:monospace;font-size:9px;letter-spacing:1px;color:rgba(255,255,255,0.35);text-transform:uppercase}

  .progress-track{position:absolute;bottom:0;left:0;right:0;height:2px;background:rgba(255,255,255,0.1);z-index:10}
  .progress-fill{height:100%;background:#e8ff00;width:0%;transition:width 1s linear;box-shadow:0 0 6px rgba(232,255,0,0.6)}

  .loader{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#000;gap:12px;transition:opacity 0.4s;z-index:20}
  .loader.hidden{opacity:0;pointer-events:none}
  .loader-ring{width:36px;height:36px;border:2px solid #222;border-top-color:#e8ff00;border-radius:50%;animation:spin 0.9s linear infinite}
  .loader-text{font-family:monospace;font-size:9px;letter-spacing:2px;color:#555;text-transform:uppercase}

  .error-msg{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:#ff4444;font-family:monospace;font-size:10px;letter-spacing:1px;z-index:20}
  .error-msg.show{display:flex}

  .now-playing-overlay{position:absolute;top:12px;left:16px;font-family:monospace;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,0.4);pointer-events:none;z-index:10}
  .now-playing-overlay strong{display:block;font-family:sans-serif;font-size:13px;font-weight:500;color:rgba(255,255,255,0.85);letter-spacing:0;margin-top:2px;text-transform:none}

  .sync-toast{position:absolute;top:12px;right:12px;background:rgba(232,255,0,0.1);border:1px solid #e8ff00;color:#e8ff00;font-family:monospace;font-size:9px;letter-spacing:1.5px;padding:5px 10px;text-transform:uppercase;opacity:0;transition:opacity 0.4s;pointer-events:none;z-index:10}
  .sync-toast.show{opacity:1}
  .update-toast{position:absolute;top:46px;right:12px;background:rgba(0,200,100,0.1);border:1px solid #00c864;color:#00c864;font-family:monospace;font-size:9px;letter-spacing:1.5px;padding:5px 10px;text-transform:uppercase;opacity:0;transition:opacity 0.4s;pointer-events:none;z-index:10}
  .update-toast.show{opacity:1}
</style>
</head>
<body>
<div class="video-wrap">
  <div class="loader" id="loader"><div class="loader-ring"></div><div class="loader-text">Tuning in...</div></div>
  <div class="error-msg" id="errorMsg"><div style="font-size:28px">📡</div><div>Signal lost — retrying</div></div>
  <video id="vid" playsinline></video>
  <iframe id="embedIframe" allowfullscreen allow="autoplay; fullscreen"></iframe>
  <div class="now-playing-overlay"><strong id="nowPlayingTitle">—</strong></div>
  <div class="controls">
    <button class="btn-play" id="btnPlay">▶</button>
    <div class="vol-wrap" id="volWrap"><span>🔊</span><input type="range" class="vol" id="volSlider" min="0" max="1" step="0.05" value="0.8"></div>
    <div class="vol-iframe-note" id="volOverlay">🔊 Use player controls</div>
    <div class="live-tag"><div class="live-dot"></div>Live</div>
  </div>
  <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
  <div class="sync-toast" id="syncToast">⟳ Resynced</div>
  <div class="update-toast" id="updateToast">↻ Updated</div>
</div>

<script src="./player.js"></script>
<script>
initPlayer({
  videoId:'vid', iframeId:'embedIframe',
  loaderId:'loader', errorId:'errorMsg',
  btnPlayId:'btnPlay', volSliderId:'volSlider',
  progressFillId:'progressFill',
  syncToastId:'syncToast', updateToastId:'updateToast',
  nowTitleId:'nowPlayingTitle', volOverlayId:'volOverlay',
  showClock:false, showSchedule:false, showStatusBar:false
});
</script>
</body>
</html>
