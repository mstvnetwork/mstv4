<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Prevents mobile zooming which can glitch the shields -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>MSNET IPTV Cinema Mode</title>

    <style>
        :root {
            --primary-red: #ff0000;
            --bg-muddy: #1a1a1a; /* Darker for Cinema feel */
            --live-green: #00ff00;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: var(--bg-muddy);
            color: #fff; 
            overflow-x: hidden; 
        }

        /* --- CINEMA PLAYER (Large Default) --- */
        .main-content { max-width: 1200px; margin: 0 auto; padding: 20px; text-align: center; }

        .player-wrapper {
            width: 100%;
            background: #000;
            border-radius: 8px; 
            border: 1px solid #333;
            position: relative;
            padding-top: 56.25%; /* 16:9 Cinema Ratio */
            height: 0;
            overflow: hidden; 
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        #videoPlayer {
            position: absolute; 
            top: 0; 
            left: 0;
            width: 100%; 
            height: 100%;
            border: none;
            z-index: 1;
        }

        /* --- THE HARD LOCKS (100% Effectiveness) --- */
        /* Completely covers the bottom seek bar */
        .universal-seek-shield {
            position: absolute; 
            bottom: 0; 
            left: 0;
            width: 100% !important; 
            height: 65px;
            z-index: 2147483647 !important;
            pointer-events: auto !important;
            background: rgba(0,0,0,0);
        }

        /* Full center shield after 1 minute */
        #silent-touch-shield {
            display: none; 
            position: absolute; 
            top: 0; 
            left: 0;
            width: 100%; 
            height: calc(100% - 65px); 
            z-index: 2147483646 !important; 
            pointer-events: auto !important; 
            background: rgba(0,0,0,0);
        }

        /* Lock Status Icon */
        #lock-status-icon {
            display: none; 
            position: absolute; 
            top: 15px; 
            right: 15px; 
            z-index: 2147483647;
            background: rgba(0,0,0,0.7); 
            padding: 8px; 
            border-radius: 50%; 
            border: 1px solid red;
            animation: pulse-lock 2s infinite;
        }

        @keyframes pulse-lock {
            0%, 100% { opacity: 0.5; } 
            50% { opacity: 1; }
        }

        /* EPG SECTION */
        .epg-section { margin-top: 30px; text-align: left; }
        .epg-scroll-wrapper { width: 100%; overflow-x: auto; padding-bottom: 10px; scroll-behavior: smooth; }
        .epg-container { display: flex; gap: 15px; }
        .epg-card { 
            flex: 0 0 260px; 
            background: #222; 
            border: 1px solid #444;
            border-radius: 8px; 
            padding: 15px; 
            position: relative;
        }
        .epg-card.is-live { border-color: var(--live-green); }
        .channel-logo { height: 30px; margin-bottom: 10px; display: block; object-fit: contain; }
        .progress-bg { width: 100%; height: 4px; background: #444; margin-top: 10px; border-radius: 5px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--primary-red); transition: width 0.5s; }

        /* UI CONTROLS */
        #chrome-only-content { display: none; }
        #browser-error { padding: 100px 20px; text-align: center; }
    </style>
</head> 
<body>

    <div id="browser-error">
        <h2>Chrome Required</h2>
        <p>This Cinema experience is only available on <strong>Google Chrome</strong>.</p>
    </div>

    <div id="chrome-only-content" class="main-content">
        <h2 id="currentTitle" style="margin-bottom: 15px; color: #888;">Cinema Mode Initializing...</h2>
        
        <div class="player-wrapper">
            <!-- FULLSCREEN DISABLED: No allowfullscreen attribute to keep shields active -->
            <iframe id="videoPlayer" sandbox="allow-scripts allow-same-origin allow-forms allow-presentation" playsinline="1"></iframe>
            
            <!-- THE SHIELDS -->
            <div class="universal-seek-shield"></div>
            <div id="silent-touch-shield"></div>
            
            <!-- LOCK ICON -->
            <div id="lock-status-icon">
                <svg width="20" height="20" fill="red" viewBox="0 0 24 24">
                    <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zM9 6c0-1.66 1.34-3 3-3s3 1.34 3 3v2H9V6z"/>
                </svg>
            </div>
        </div>

        <div class="epg-section">
            <h3 style="color:#666; margin-bottom:10px;">Live Guide (AEDT)</h3>
            <div class="epg-scroll-wrapper">
                <div id="epg-grid" class="epg-container"></div>
            </div>
        </div>
    </div>

    <!-- SCRIPT SECTION FOLLOWS HERE -->

<script>
// FIXED: Added the '?' before 'v='
const GITHUB_JSON_URL = "https://raw.githubusercontent.com" + new Date().getTime();

let silentLockTimer;

// 2. FIXED BROWSER CHECK
function isStrictChrome() {
    const ua = navigator.userAgent;
    const isChrome = (ua.indexOf("Chrome") > -1 || ua.indexOf("CriOS") > -1);
    // Fixed typos from screenshot: added missing "=" and corrected variable names
    const isOther = (ua.indexOf("Edg") > -1 || ua.indexOf("SamsungBrowser") > -1 || ua.indexOf("OPR") > -1);
    return isChrome && !isOther;
}

// 3. CHANNEL PLAYLIST (Fixed & Optimized)
const playlist = [
    { 
        title: "Indian Idol", 
        url: "https://vkprime.com/embed-k1ipwza01c0d.html" 
    },
    { 
        title: "Mtv", 
        url: "https://vkprime.com/embed-e6r4icq8gcq1.html" 
    }
];

// 4. EPG FETCH & SYNC (MELBOURNE TIME)
async function loadEPG() {
    try {
        // 1. Double-check the URL is built correctly
    const finalURL = "https://raw.githubusercontent.com" + Date.now();
        const data = await res.json();
        const grid = document.getElementById('epg-grid');
        
        // Force Melbourne Time Zone
        const melbourneTime = new Date().toLocaleString("en-US", { timeZone: "Australia/Melbourne" });
        const now = new Date(melbourneTime);
        const currentTotalMin = now.getHours() * 60 + now.getMinutes();
        let liveTitle = "";

        grid.innerHTML = data.map((item, idx) => {
            const parse = (t) => {
                let [time, mod] = t.split(' ');
                let [h, m] = time.split(':').map(Number);
                if (mod === 'PM' && h < 12) h += 12;
                if (mod === 'AM' && h === 12) h = 0;
                return h * 60 + m;
            };
            
            const start = parse(item.time);
            const end = data[idx + 1] ? parse(data[idx + 1].time) : start + 60;
            const isLive = currentTotalMin >= start && currentTotalMin < end;
            
            if (isLive) liveTitle = item.program;

            let progPercent = 0;
            if (isLive) {
                progPercent = Math.floor(((currentTotalMin - start) / (end - start)) * 100);
            }

            return `
                <div class="epg-card ${isLive ? 'is-live' : ''}" id="${isLive ? 'liveCard' : ''}">
                    <div class="epg-header">
                        <img src="${item.logo}" class="channel-logo">
                        ${isLive ? '<div class="live-indicator">LIVE</div>' : ''}
                    </div>
                    <div class="epg-time">${item.time}</div>
                    <div class="epg-program">${item.program}</div>
                    <div style="color:#666; font-size:0.75rem;">${item.channel}</div>
                    ${isLive ? `<div class="progress-bg"><div class="progress-fill" style="width:${progPercent}%"></div></div>` : ''}
                </div>`;
        }).join('');

        // Auto-scroll to Live Card
        const target = document.getElementById('liveCard');
        if (target) {
            target.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
        }

        syncVideo(liveTitle);
    } catch (e) {
        console.error("EPG Error:", e);
    }
}

// 5. PLAYER SYNC LOGIC
function syncVideo(liveTitle) {
    const player = document.getElementById('videoPlayer');
    const titleHeader = document.getElementById('currentTitle');
    const liveVideo = playlist.find(v => v.title === liveTitle);

    if (liveVideo && !titleHeader.innerText.includes(liveTitle)) {
        player.src = liveVideo.url;
        titleHeader.innerText = "Playing: " + liveVideo.title;
        
        // Reset Silent Locks
        const silentShield = document.getElementById('silent-touch-shield');
        const lockIcon = document.getElementById('lock-status-icon');
        if (silentShield) silentShield.style.display = 'none';
        if (lockIcon) lockIcon.style.display = 'none';
        
        clearTimeout(silentLockTimer);
        
        // Re-lock after 1 minute
        silentLockTimer = setTimeout(() => { 
            if (silentShield) silentShield.style.display = 'block'; 
            if (lockIcon) lockIcon.style.display = 'block';
        }, 60000);
    }
}

// 6. INITIALIZE (Option A + Auto-Repair)
window.onload = function() {
    if (isStrictChrome()) {
        // OPTION A: Clear memory for testing
        localStorage.clear();
        console.log("Memory Cleared for Fresh Test");

        document.getElementById('chrome-only-content').style.display = 'block';
        document.getElementById('browser-error').style.display = 'none';
        
        // AUTO-REPAIR: Load EPG and then start sync
        loadEPG().then(() => {
            console.log("EPG loaded. Syncing player...");
            setInterval(loadEPG, 60000); // Check every minute
        });
    } else {
        document.getElementById('browser-error').style.display = 'block';
        document.getElementById('chrome-only-content').style.display = 'none';
    }
};
</script>
</html>
</body>
