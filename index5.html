<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Chrome Only Player</title>
    <style>
        :root { 
            --primary-red: #ff0000; 
            --bg-muddy: #353530; 
            --nav-bg: #2b2b27; 
            --text-white: #ffffff; 
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-muddy); color: var(--text-white); }
        
        .main-content { max-width: 1100px; margin: 30px auto; padding: 0 20px; text-align: center; }
        
        /* THE PLAYER WRAPPER */
        .player-wrapper {
            width: 100%;
            background: #000;
            border-radius: 6px;
            border: 1px solid #555;
            position: relative;
            padding-top: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
            overflow: hidden;
        }

        #videoPlayer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* THE SEEK BAR BLOCKER (Invisible Wall) */
        .seek-lock {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60px; /* Adjust height to match the specific player's seek bar */
            background: rgba(0,0,0,0);
            z-index: 9999;
            pointer-events: auto; /* This captures clicks so they don't hit the seek bar */
        }

        /* BROWSER RESTRICTION UI */
        #chrome-only-content { display: none; }
        #browser-error { 
            padding: 50px 20px; 
            background: #1a1a1a; 
            border-radius: 8px; 
            margin-top: 50px; 
            border: 1px solid #444;
        }
        .error-title { color: var(--primary-red); font-size: 1.5rem; margin-bottom: 15px; }
    </style>
</head>
<body>
    
    <div class="main-content">
        <!-- 1. Error Message (Shown by default) -->
        <div id="browser-error">
            <h2 class="error-title">Access Restricted</h2>
            <p>This video content is exclusively available on <strong>Google Chrome</strong>.</p>
            <p style="margin-top:10px; color:#aaa;">Please open this page in the Chrome browser to continue.</p>
        </div>

        <!-- 2. Protected Content (Hidden by default) -->
        <div id="chrome-only-content">
            <h3 id="currentTitle" style="margin-bottom: 15px; color: #ccc;">Loading...</h3>
            <div class="player-wrapper">
                <!-- Removed allowfullscreen to prevent bypass via full-screen mode -->
                <iframe id="videoPlayer" sandbox="allow-scripts allow-same-origin allow-forms allow-presentation"></iframe>
                
                <!-- The Invisible Blocker -->
                <div class="seek-lock"></div>
            </div>
            <p style="margin-top:10px; font-size: 0.8rem; color: #888;">Note: Forward seeking is disabled.</p>
        </div>
    </div>

    <script>
        // --- BROWSER DETECTION LOGIC ---
        function isStrictChrome() {
            const ua = window.navigator.userAgent;
            const vendor = window.navigator.vendor;
            const isChromium = window.chrome !== null && typeof window.chrome !== "undefined";
            const isGoogle = vendor === "Google Inc.";
            
            // Exclude common Chromium browsers that aren't "Pure" Chrome
            const isEdge = ua.indexOf("Edg") > -1;
            const isSamsung = ua.indexOf("SamsungBrowser") > -1;
            const isOpera = ua.indexOf("OPR") > -1 || ua.indexOf("Opera") > -1;

            return isChromium && isGoogle && !isEdge && !isSamsung && !isOpera;
        }

        // --- PLAYLIST & ROTATION LOGIC ---
        const playlist = [
            { title: "Star Plus - Anupamaa", url: "https://vkprime.com/embed-krk6z9lcyouj.html?autoplay=1&mute=1&rel=0"},
            { title: "Sony TV - CID Special", url: "https://vkprime.com/embed-xkhlust7wikn.html?autoplay=1&mute=1&rel=0"},
            { title: "Zee TV - Latest", url: "https://www.dailymotion.com" }
        ];

        let currentIndex = 0;

        function rotateVideo() {
            const player = document.getElementById('videoPlayer');
            if (player) {
                player.src = playlist[currentIndex].url;
                document.getElementById('currentTitle').innerText = "Playing: " + playlist[currentIndex].title;
                currentIndex = (currentIndex + 1) % playlist.length;
            }
        }

        // --- INITIALIZATION ---
        window.onload = function() {
            if (isStrictChrome()) {
                // User is on Chrome: Show content and start player
                document.getElementById('chrome-only-content').style.display = 'block';
                document.getElementById('browser-error').style.display = 'none';
                
                rotateVideo();
                setInterval(rotateVideo, 1200000); // 20 minute rotation
            } else {
                // Not on Chrome: Keep error message visible
                console.log("Access denied: Not Google Chrome.");
            }
        };
    </script>
</body>
</html>
