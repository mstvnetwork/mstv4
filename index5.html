<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Prevents mobile zooming which can glitch the shields -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>MSNET IPTV Cinema Mode</title>

    <style>
        :root {
            --primary-red: #ff0000;
            --bg-muddy: #1a1a1a; /* Darker for Cinema feel */
            --live-green: #00ff00;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: var(--bg-muddy);
            color: #fff; 
            overflow-x: hidden; 
        }

        /* --- CINEMA PLAYER (Large Default) --- */
        .player-wrapper {
    width: 100%;
    max-width: 100%;
    aspect-ratio: 16 / 9;
    background: #000;
    position: relative;
    overflow: hidden;
}

/* iframe fills perfectly */
#videoPlayer {
    position: absolute;
    width: 100%;
    height: 100%;
    border: none;
}

/* Ticker bar */
#epg-ticker {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 40px;
    background: rgba(0,0,0,0.7);
    overflow: hidden;
    z-index: 9999;
    display: flex;
    align-items: center;
}

/* Scrolling content */
#epg-track {
    display: inline-block;
    white-space: nowrap;
    padding-left: 100%;
    animation: scrollTicker 40s linear infinite;
    font-size: 14px;
}

@keyframes scrollTicker {
    0% { transform: translateX(0); }
    100% { transform: translateX(-100%); }
}
        /* --- THE HARD LOCKS (100% Effectiveness) --- */
        /* Completely covers the bottom seek bar */
        .universal-seek-shield {
            position: absolute; 
            bottom: 0; 
            left: 0;
            width: 100% !important; 
            height: 65px;
            z-index: 2147483647 !important;
            pointer-events: auto !important;
            background: rgba(0,0,0,0);
        }

        /* Full center shield after 1 minute */
        #silent-touch-shield {
            display: none; 
            position: absolute; 
            top: 0; 
            left: 0;
            width: 100%; 
            height: calc(100% - 65px); 
            z-index: 2147483646 !important; 
            pointer-events: auto !important; 
            background: rgba(0,0,0,0);
        }

        /* Lock Status Icon */
        #lock-status-icon {
            display: none; 
            position: absolute; 
            top: 15px; 
            right: 15px; 
            z-index: 2147483647;
            background: rgba(0,0,0,0.7); 
            padding: 8px; 
            border-radius: 50%; 
            border: 1px solid red;
            animation: pulse-lock 2s infinite;
        }

        @keyframes pulse-lock {
            0%, 100% { opacity: 0.5; } 
            50% { opacity: 1; }
        }

        /* EPG SECTION */
        .epg-section { margin-top: 30px; text-align: left; }
        .epg-scroll-wrapper { width: 100%; overflow-x: auto; padding-bottom: 10px; scroll-behavior: smooth; }
        .epg-container { display: flex; gap: 15px; }
        .epg-card { 
            flex: 0 0 260px; 
            background: #222; 
            border: 1px solid #444;
            border-radius: 8px; 
            padding: 15px; 
            position: relative;
        }
        .epg-card.is-live { border-color: var(--live-green); }
        .channel-logo { height: 30px; margin-bottom: 10px; display: block; object-fit: contain; }
        .progress-bg { width: 100%; height: 4px; background: #444; margin-top: 10px; border-radius: 5px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--primary-red); transition: width 0.5s; }

        /* UI CONTROLS */
        #chrome-only-content { display: none; }
        #browser-error { padding: 100px 20px; text-align: center; }
    </style>
</head> 
<body>

    <div id="browser-error">
        <h2>Chrome Required</h2>
        <p>This Cinema experience is only available on <strong>Google Chrome</strong>.</p>
    </div>

    <div id="chrome-only-content" class="main-content">
        <h2 id="currentTitle" style="margin-bottom: 15px; color: #888;">Cinema Mode Initializing...</h2>
        
        <div class="player-wrapper">
<iframe
    id="videoPlayer"
    allow="autoplay; fullscreen; encrypted-media; picture-in-picture"
    referrerpolicy="no-referrer"
    sandbox="allow-scripts allow-same-origin allow-forms allow-presentation"
    style="width:100%; height:100%; border:none;"
></iframe>
    <!-- TICKER -->
    <div id="epg-ticker">
        <div id="epg-track"></div>
    </div>
        </div>
            <!-- THE SHIELDS -->
            <div class="universal-seek-shield"></div>
            <div id="silent-touch-shield"></div>
            
            <!-- LOCK ICON -->
            <div id="lock-status-icon">
                <svg width="20" height="20" fill="red" viewBox="0 0 24 24">
                    <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zM9 6c0-1.66 1.34-3 3-3s3 1.34 3 3v2H9V6z"/>
                </svg>
            </div>
        </div>

        <div class="epg-section">
            <h3 style="color:#666; margin-bottom:10px;">Live Guide (AEDT)</h3>
            <div class="epg-scroll-wrapper">
                <div id="epg-grid" class="epg-container"></div>
            </div>
        </div>
    </div>

    <script>
// ===============================
// 1. CONFIG
// ===============================
const GITHUB_JSON_URL = "https://raw.githubusercontent.com/mstvnetwork/mstv4/refs/heads/main/epg.json?v=" + Date.now();

let silentLockTimer;

// ===============================
// 2. CHANNEL PLAYLIST
// ===============================
const playlist = [
    { title: "Indian Idol", url: "https://vkprime.com/embed-k1ipwza01c0d.html" },
    { title: "Mtv", url: "https://vkprime.com/embed-e6r4icq8gcq1.html" }
];

// ===============================
// 3. LOAD EPG + BUILD TICKER
// ===============================
async function loadEPG() {
    try {
        const res = await fetch(GITHUB_JSON_URL);
        const data = await res.json();

        const ticker = document.getElementById('epg-track');

        // Melbourne Time
        const melbourneTime = new Date().toLocaleString("en-US", { timeZone: "Australia/Melbourne" });
        const now = new Date(melbourneTime);
        const currentTotalMin = now.getHours() * 60 + now.getMinutes();

        let liveTitle = "";

        const items = data.map((item, idx) => {

            const parse = (t) => {
                let [time, mod] = t.split(' ');
                let [h, m] = time.split(':').map(Number);
                if (mod === 'PM' && h < 12) h += 12;
                if (mod === 'AM' && h === 12) h = 0;
                return h * 60 + m;
            };

            const start = parse(item.time);
            const end = data[idx + 1] ? parse(data[idx + 1].time) : start + 60;

            const isLive = currentTotalMin >= start && currentTotalMin < end;

            if (isLive) {
                liveTitle = item.program;
            }

            return `${item.time} • ${item.program} (${item.channel})`;
        });

        // Smooth infinite ticker
        ticker.innerHTML = items.join(" 🔴 ") + " 🔴 " + items.join(" 🔴 ");

        // Sync player
        syncVideo(liveTitle);

    } catch (e) {
        console.error("EPG Error:", e);
    }
}

// ===============================
// 4. PLAYER SYNC
// ===============================
function syncVideo(liveTitle) {
    const player = document.getElementById('videoPlayer');

    const liveVideo = playlist.find(v =>
        liveTitle && v.title.toLowerCase().includes(liveTitle.toLowerCase())
    );

    if (liveVideo && player.src !== liveVideo.url) {
        player.src = liveVideo.url;

        // 🔁 auto-retry if player fails
        setTimeout(() => {
            if (!player.contentWindow) return;
            player.src = liveVideo.url;
        }, 5000);
    }
}

// ===============================
// 5. INIT
// ===============================
window.onload = function () {
    loadEPG();

    // refresh every 60 sec
    setInterval(loadEPG, 60000);
};
    </script>
</body>
</html>
