<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        .video-container {
            position: relative;
            width: 100%;
            max-width: 700px;
            aspect-ratio: 16 / 9;
            margin: 20px auto;
            background: #000;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* 1. THE TOTAL BLOCKER: Covers everything except the center */
        .seek-lock {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 999;
            /* Using a border-image or box-shadow to "punch a hole" in the middle */
            pointer-events: auto; 
        }

        /* 2. THE MASKING TEXT: Placed exactly over the source play button */
        .play-mask {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #ff0000; /* Matches typical play button colors */
            color: white;
            padding: 15px 30px;
            border-radius: 8px;
            font-weight: bold;
            font-family: sans-serif;
            z-index: 1001;
            
            /* KEY PROPERTY: This allows the click to pass through to the iframe */
            pointer-events: none; 
            
            white-space: nowrap;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        /* 3. INVISIBLE SHIELD FOR THE SEEK BAR ONLY */
        /* This covers the bottom 20% of the video permanently */
        .bottom-lock {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background: rgba(0,0,0,0);
            z-index: 1002;
            pointer-events: auto;
        }
    </style>
</head>
<body>

<div class="video-container">
    <!-- The Source Video -->
    <iframe src="https://vkprime.com/embed-8o62hu1w5m8k.html"></iframe>

    <!-- This text covers the real button but lets the click "pass through" -->
    <div class="play-mask" id="mask">CLICK TO START WATCHING</div>

    <!-- This invisible wall stays on the bottom to block the seek bar forever -->
    <div class="bottom-lock"></div>
</div>

<script>
    // Optional: Hide the red "Mask" after the first click so it doesn't stay on screen
    document.querySelector('.video-container').addEventListener('click', function() {
        setTimeout(() => {
            document.getElementById('mask').style.display = 'none';
        }, 500); 
    });
</script>

</body>
</html>
