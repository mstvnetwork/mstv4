<!DOCTYPE html>
<html>
<head>
    <style>
        /* Container to hold the video and the blocker */
        .video-wrapper {
            position: relative;
            width: 100%;
            max-width: 800px;
            aspect-ratio: 16 / 9;
            margin: 0 auto;
            background: #000;
        }

        /* The actual video iframe */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* The invisible "shield" that blocks clicks on the seek bar */
        .seek-bar-blocker {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 55px; /* Adjust height based on the player's control bar size */
            background: rgba(255, 0, 0, 0); /* Keep at 0 to stay invisible */
            z-index: 9999;
            cursor: default;
        }
    </style>
</head>
<body>

<div class="video-wrapper">
    <!-- Attributes removed: allowfullscreen, webkitallowfullscreen, mozallowfullscreen -->
    <!-- Attributes added: playsinline to force inline play on mobile -->
    <iframe 
        src="https://vkprime.com/embed-8o62hu1w5m8k.html" 
        playsinline="1">
    </iframe>
    
    <!-- This div covers the controls to prevent jumping -->
    <div class="seek-bar-blocker"></div>
</div>

<p style="text-align:center; font-family: sans-serif; color: #333;">
    Skipping is disabled for this video.
</p>

</body>
</html>
