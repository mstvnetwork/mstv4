  <!-- Custom Play Button Overlay -->
  <div id="play-overlay" style="position:absolute; top:0; left:0; width:100%; height:100%; display:flex; align-items:center; justify-content:center;">
    <div style="background:rgba(0,0,0,0.7); color:white; padding:15px 30px; border-radius:50px; font-weight:bold;">
      PLAY VIDEO
    </div>
  </div>
</div>
document.getElementById('video-container').addEventListener('click', function() {
  const videoID = 'YOUR_VIDEO_ID'; // e.g., dQw4w9WgXcQ
  const container = document.getElementById('video-container');
  
  // Replace thumbnail with autoplaying iframe
  container.innerHTML = `
    <iframe 
      width="100%" 
      height="100%" 
      src="https://vkprime.com/embed-9mos5jmhnpey.html?autoplay=1&mute=1&rel=0"
