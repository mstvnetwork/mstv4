<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MSTV Player</title>
    <!-- Verified CDN for Hls.js -->
    <script src="https://cdn.jsdelivr.net"></script>
    <style>
        body { margin:0; background:#000; color:#fff; font-family:sans-serif; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; }
        video { width: 95%; max-width: 900px; aspect-ratio: 16/9; background:#111; border: 2px solid #90EE90; border-radius: 8px; }
        .btn { margin-top:20px; color:#90EE90; text-decoration:none; border:1px solid #90EE90; padding:8px 20px; border-radius:20px; }
    </style>
</head>
<body>
    <h2 id="name">Loading...</h2>
    <video id="v" controls autoplay playsinline></video>
    <a href="https://mstvnet.netlify.app" class="btn">Back to Site</a>
    <script>
    const params = new URLSearchParams(window.location.search);
    const source = params.get('source');
    if(source) {
        const v = document.getElementById('player');
        if(typeof Hls !== 'undefined' && Hls.isSupported()){
            const h = new Hls({
                xhrSetup: function(xhr) {
                    xhr.setRequestHeader('User-Agent', 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36');
                }
            });
            h.loadSource(source);
            h.attachMedia(v);
            h.on(Hls.Events.MANIFEST_PARSED, () => v.play());
        } else { v.src = source; v.play(); }
    }
</script>

</body>
</html>
