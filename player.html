<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Live Player</title>
    <!-- Load HLS.js properly without document.write -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { margin: 0; background: #000; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        video { width: 100%; height: 100%; max-width: 1000px; background: #000; }
    </style>
</head>
<body>
    <video id="video" controls autoplay playsinline></video>

    <script>
        const video = document.getElementById('video');
        // Get the stream URL from the browser address bar (?url=...)
        const urlParams = new URLSearchParams(window.location.search);
        const videoSrc = urlParams.get('url');

        if (videoSrc) {
            if (Hls.isSupported()) {
                const hls = new Hls();
                hls.loadSource(videoSrc);
                hls.attachMedia(video);
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                // Native support for Safari/iOS
                video.src = videoSrc;
            }
        } else {
            document.body.innerHTML = "<h2 style='color:white'>No stream URL provided.</h2>";
        }
    </script>
</body>
</html>
