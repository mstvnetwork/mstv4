<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MSTV Player</title>
    <!-- Verified CDN for Hls.js -->
    <script src="https://cdn.jsdelivr.net"></script>
    <style>
        body { margin:0; background:#000; color:#fff; font-family:sans-serif; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; }
        video { width: 95%; max-width: 900px; aspect-ratio: 16/9; background:#111; border: 2px solid #90EE90; border-radius: 8px; }
        .btn { margin-top:20px; color:#90EE90; text-decoration:none; border:1px solid #90EE90; padding:8px 20px; border-radius:20px; }
    </style>
</head>
<body>
    <h2 id="name">Loading...</h2>
    <video id="v" controls autoplay playsinline></video>
    <a href="https://mstvnet.netlify.app" class="btn">Back to Site</a>
    <script>
        const p = new URLSearchParams(window.location.search);
        const s = p.get('source');
        if(p.get('name')) document.getElementById('name').innerText = p.get('name');
        
        if(s) {
            const vid = document.getElementById('v');
            if(typeof Hls !== 'undefined' && Hls.isSupported()){
                const h = new Hls(); h.loadSource(s); h.attachMedia(vid);
                h.on(Hls.Events.MANIFEST_PARSED, () => vid.play());
            } else if (vid.canPlayType('application/vnd.apple.mpegurl')) {
                vid.src = s; vid.play();
            }
        }
    </script>
</body>
</html>
