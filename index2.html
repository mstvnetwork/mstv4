<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Desi IPTV Hub | Live Sync Fix</title>
    <style>
        :root { --bg-muddy: #353530; --nav-bg: #2b2b27; --text-white: #ffffff; }
        html, body { height: 100%; margin: 0; overflow: hidden; background: var(--bg-muddy); color: var(--text-white); font-family: 'Segoe UI', sans-serif; }
        header { background: var(--nav-bg); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #444; }
        .logo { font-size: 1.5rem; font-weight: bold; color: #ff0000; text-decoration: none; }
        .main-content { max-width: 1000px; margin: 20px auto; padding: 0 15px; text-align: center; }
        .player-wrapper { width: 100%; background: #000; border-radius: 8px; position: relative; padding-top: 56.25%; border: 1px solid #444; overflow: hidden; }
        iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        #startOverlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 100; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .btn { background: #ff0000; color: white; padding: 15px 40px; border-radius: 50px; font-weight: bold; }
    </style>
</head>
<body>

<div id="startOverlay" onclick="syncLiveTV()">
    <div class="btn">CLICK TO UNMUTE & WATCH LIVE</div>
</div>

<header>
    <a href="#" class="logo">DESI IPTV HUB</a>
    <div style="color:#aaa; font-size: 0.8rem;">Live Sync Active</div>
</header>

<div class="main-content">
    <div class="player-wrapper">
        <iframe id="videoPlayer" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen src="about:blank"></iframe>
    </div>
    <div style="margin-top:15px; text-align:left;">
        <h2 id="currentTitle">Synchronizing...</h2>
        <p id="timeInfo" style="color:#888; font-size:0.9rem;"></p>
    </div>
</div>

<script>
    const playlist = [
    { 
        title: "Star Plus - Anupamaa", 
        id: "4yedhlkshnwv", // Just the ID from the VK URL
        type: "vk" 
    },
    { 
        title: "Sony TV - CID Special", 
        id: "xkhlust7wikn", // Just the ID from the VK URL
        type: "vk" 
    },
    { 
        title: "Zee TV - Latest", 
        id: "x8m6m7b", // Just the ID from the Dailymotion URL
        type: "dm" 
    }
];


    const ROTATION_TIME = 8 * 60; 
    const TOTAL_PLAYLIST_TIME = playlist.length * ROTATION_TIME;

    function syncLiveTV() {
        document.getElementById('startOverlay').style.display = 'none';
        updatePlayer();
        setInterval(updatePlayer, 1000); 
    }

    function updatePlayer() {
        const now = new Date();
        const totalSecondsToday = (now.getHours() * 3600) + (now.getMinutes() * 60) + now.getSeconds();
        const currentCyclePosition = totalSecondsToday % TOTAL_PLAYLIST_TIME;
        const videoIndex = Math.floor(currentCyclePosition / ROTATION_TIME);
        const startAtSecond = currentCyclePosition % ROTATION_TIME;

        const currentVideo = playlist[videoIndex];
        const player = document.getElementById('videoPlayer');
        
        if (player.dataset.lastIndex != videoIndex) {
            let finalUrl = "";
            if (currentVideo.type === "vk") {
                // VKPrime Fix: Use ?autoplay=1&mute=1. Some versions use 't' for start time.
                finalUrl = `https://vkprime.com{currentVideo.id}.html?autoplay=1&mute=1&t=${startAtSecond}`;
            } else if (currentVideo.type === "dm") {
                // Dailymotion Fix: Uses startTime (in seconds) and mute=true
                finalUrl = `https://www.dailymotion.com{currentVideo.id}?autoplay=1&mute=true&startTime=${startAtSecond}`;
            }

            player.src = finalUrl;
            player.dataset.lastIndex = videoIndex;
            document.getElementById('currentTitle').innerText = "LIVE: " + currentVideo.title;
        }

        const remaining = ROTATION_TIME - startAtSecond;
        document.getElementById('timeInfo').innerText = `Syncing Global Time... Next serial in: ${Math.floor(remaining / 60)}m ${remaining % 60}s`;
    }
</script>
</body>
</html>
