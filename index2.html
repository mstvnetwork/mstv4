<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>Desi IPTV | Memory Sync</title>
    <style>
        :root { --bg-muddy: #353530; --nav-bg: #2b2b27; --red: #ff0000; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; overflow: hidden; background: var(--bg-muddy); color: #fff; font-family: sans-serif; }
        
        header { background: var(--nav-bg); padding: 12px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #444; }
        .logo { font-size: 1.3rem; font-weight: bold; color: var(--red); text-decoration: none; }
        
        .main-content { width: 100%; max-width: 800px; margin: 15px auto; padding: 0 10px; }
        .player-wrapper { width: 100%; background: #000; border-radius: 6px; position: relative; padding-top: 56.25%; border: 1px solid #555; }
        iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        #startOverlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .play-btn { background: var(--red); color: white; padding: 18px 40px; border-radius: 50px; font-weight: bold; font-size: 1.2rem; }
    </style>
</head>
<body>

<div id="startOverlay" onclick="startPlayer()">
    <div class="play-btn">RESUME WATCHING</div>
</div>

<header>
    <a href="#" class="logo">DESI IPTV HUB</a>
    <div style="font-size: 0.7rem; color: #aaa;">PROGRESS SAVED</div>
</header>

<div class="main-content">
    <div class="player-wrapper">
        <iframe id="videoPlayer" allow="autoplay; fullscreen" src="about:blank"></iframe>
    </div>
    <div style="margin-top: 20px;">
        <h3 id="currentTitle" style="font-size:1.1rem;">Ready to Play</h3>
        <p id="timerText" style="color:#aaa; font-size:0.85rem; margin-top:8px;"></p>
    </div>
</div>

<script>
    const playlist = [
        { title: "Star Plus - Anupamaa", url: "https://vkprime.com/embed-krk6z9lcyouj.html?autoplay=1&mute=1&rel=0"},
        { title: "Sony TV - CID Special", url: "https://vkprime.com/embed-xkhlust7wikn.html?autoplay=1&mute=1&rel=0"},
        { title: "Zee TV - Latest", url: "https://www.dailymotion.com&?autoplay=1&mute=1&rel=0" }
    ];

    const ROTATION_SEC = 8 * 60; // 8 minutes

    // Retrieve saved progress or start at 0
    let savedIndex = parseInt(localStorage.getItem('last_idx')) || 0;
    let savedSeconds = parseInt(localStorage.getItem('last_sec')) || 0;

    function startPlayer() {
        document.getElementById('startOverlay').style.display = 'none';
        
        loadVideo();
        
        // Save progress to memory every second
        setInterval(function() {
            savedSeconds++;
            
            // Switch video if 8 minutes reached
            if (savedSeconds >= ROTATION_SEC) {
                savedSeconds = 0;
                savedIndex = (savedIndex + 1) % playlist.length;
                loadVideo();
            }

            // Store in LocalStorage
            localStorage.setItem('last_idx', savedIndex);
            localStorage.setItem('last_sec', savedSeconds);
            
            updateTimerDisplay();
        }, 1000);
    }

    function loadVideo() {
        const video = playlist[savedIndex];
        const player = document.getElementById('videoPlayer');
        let finalUrl = "";

        if (video.type === "vk") {
            // Added mute=1 for mobile autoplay
            finalUrl = "https://vkprime.com" + video.id + ".html?autoplay=1&mute=1&t=" + savedSeconds;
        } else if (video.type === "dm") {
            finalUrl = "https://www.dailymotion.com" + video.id + "?autoplay=1&mute=true&startTime=" + savedSeconds;
        }

        player.src = finalUrl;
        document.getElementById('currentTitle').innerText = "NOW PLAYING: " + video.title;
    }

    function updateTimerDisplay() {
        const remaining = ROTATION_SEC - savedSeconds;
        const m = Math.floor(remaining / 60);
        const s = remaining % 60;
        document.getElementById('timerText').innerText = "Next switch in: " + m + "m " + (s < 10 ? '0' + s : s) + "s (Auto-Saving)";
    }
</script>

</body>
</html>
