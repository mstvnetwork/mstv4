<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linear Iframe Player Layout</title>
    <style>
        body { margin: 0; background: #111; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; color: #fff; }
        .video-container { width: 100%; max-width: 800px; padding: 20px; box-sizing: border-box; }
        
        /* Main wrapper holding the layout layers */
        .player-wrapper { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 8px; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; }
        
        /* The Shield Layout: Surrounds the central play button area to block side links/popups */
        .shield-edge { position: absolute; z-index: 9999; background: rgba(0,0,0,0); pointer-events: auto; }
        
        /* Leaving a clear 120x120px native-touch gap dead-centre for the player button */
        .shield-top    { top: 0; left: 0; width: 100%; height: calc(50% - 60px); }
        .shield-bottom { bottom: 0; left: 0; width: 100%; height: calc(50% - 60px); }
        .shield-left   { top: calc(50% - 60px); left: 0; width: calc(50% - 60px); height: 120px; }
        .shield-right  { top: calc(50% - 60px); right: 0; width: calc(50% - 60px); height: 120px; }
        
        .now-playing { margin-top: 15px; text-align: center; font-size: 1.2rem; }
    </style>
</head>
<body>

<div class="video-container">
    <div class="player-wrapper">
        <!-- Structural shield segments preventing touch triggers on player control edges -->
        <div class="shield-edge shield-top"></div>
        <div class="shield-edge shield-bottom"></div>
        <div class="shield-edge shield-left"></div>
        <div class="shield-edge shield-right"></div>
        
        <!-- Native wrapper iframe utilizing sandbox restrictions -->
        <iframe id="linear-iframe" src="about:blank" sandbox="allow-scripts allow-same-origin" allow="autoplay; encrypted-media"></iframe>
    </div>
    <div class="now-playing">
        <span id="show-title">Loading Schedule...</span>
    </div>
</div>

<script>
    const jsonSchedule = {
      "schedule": [
        {
          "title": "Anupama",
          "start": "02:27:00",
          "end": "02:32:00",
          "url": "https://hlsplayers.pages.dev/player2?url=https://s2.videoapne.to/hls/,bdohws7v7bboxuzvta2p4g2ws2khimvq24xbpns7osntfggpd74dnpjxuvna,.urlset/master.m3u8",
        },
        {
          "title": "The Great Indian Kapil Show",
          "start": "02:32:00",
          "end": "02:45:00",
          "url": "https://videoapne.to"
        }
      ]
    };

 const iframe = document.getElementById('linear-iframe');
    const titleEl = document.getElementById('show-title');
    let currentActiveUrl = "";

    function timeToSeconds(timeStr) {
        const parts = timeStr.split(':');
        const hrs = parseInt(parts[0], 10) || 0;
        const mins = parseInt(parts[1], 10) || 0;
        const secs = parseInt(parts[2], 10) || 0;
        return (hrs * 3600) + (mins * 60) + secs;
    }

    function checkSchedule() {
        const now = new Date();
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        const seconds = String(now.getSeconds()).padStart(2, '0');
        const currentTimeStr = `${hours}:${minutes}:${seconds}`;
        
        const currentSeconds = timeToSeconds(currentTimeStr);

        const activeSlot = jsonSchedule.schedule.find(slot => {
            const startSec = timeToSeconds(slot.start);
            const endSec = timeToSeconds(slot.end);
            return currentSeconds >= startSec && currentSeconds < endSec;
        });

        if (activeSlot) {
            const targetUrl = activeSlot.url + "&autoplay=true&muted=true";

            if (currentActiveUrl !== targetUrl) {
                currentActiveUrl = targetUrl;
                titleEl.textContent = `Now Playing: ${activeSlot.title}`;
                iframe.src = targetUrl;
            }
        } else {
            titleEl.textContent = "Off Air - No Scheduled Program";
            if(iframe.src !== "about:blank") {
                iframe.src = "about:blank";
                currentActiveUrl = "";
            }
        }
    }

    checkSchedule();
    setInterval(checkSchedule, 2000);
</script>

</body>
</html>
