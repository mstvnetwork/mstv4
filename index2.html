<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>Desi IPTV | Memory Sync</title>
    <style>
        :root { --bg-muddy: #353530; --nav-bg: #2b2b27; --red: #ff0000; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; overflow: hidden; background: var(--bg-muddy); color: #fff; font-family: sans-serif; }
        header { background: var(--nav-bg); padding: 12px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #444; }
        .logo { font-size: 1.3rem; font-weight: bold; color: var(--red); text-decoration: none; }
        .main-content { width: 100%; max-width: 900px; margin: 15px auto; padding: 0 10px; }
        .player-wrapper { width: 100%; background: #000; border-radius: 6px; position: relative; padding-top: 56.25%; border: 1px solid #555; }
        iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        #startOverlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .play-btn { background: var(--red); color: white; padding: 18px 40px; border-radius: 50px; font-weight: bold; font-size: 1.2rem; }
    </style>
</head>
<body>

<div id="startOverlay" onclick="startTV()">
    <div class="play-btn">RESUME WATCHING</div>
</div>

<header>
    <a href="#" class="logo">DESI IPTV HUB</a>
    <div style="color:#aaa; font-size: 0.7rem;">Auto-Save Active</div>
</header>

<div class="main-content">
    <div class="player-wrapper">
        <iframe id="videoPlayer" allow="autoplay; fullscreen" referrerpolicy="no-referrer-when-downgrade" src="about:blank"></iframe>
    </div>
    <div style="margin-top: 20px;">
        <h3 id="currentTitle">Loading your stream...</h3>
        <p id="timerText" style="color:#aaa; font-size:0.85rem; margin-top:8px;"></p>
    </div>
</div>

<script>
    const playlist = [
        { title: "Star Plus - Anupamaa", url: "https://vkprime.com/embed-krk6z9lcyouj.html?autoplay=1&mute=1&rel=0"},
        { title: "Sony TV - CID Special", url: "https://vkprime.com/embed-xkhlust7wikn.html?autoplay=1&mute=1&rel=0"},
        { title: "Zee TV - Latest", url: "https://www.dailymotion.com&?autoplay=1&mute=1&rel=0" }
    ];


    const ROTATION_SEC = 8 * 60; 

    // Load saved data or start fresh
    let currentIndex = parseInt(localStorage.getItem('iptv_index')) || 0;
    let currentSeconds = parseInt(localStorage.getItem('iptv_seconds')) || 0;

    function startTV() {
        document.getElementById('startOverlay').style.display = 'none';
        updatePlayer(true); // Force reload on first click
        
        // Save progress every second
        setInterval(tick, 1000);
    }

    function tick() {
        currentSeconds++;
        
        // If 8 minutes pass, move to next video
        if (currentSeconds >= ROTATION_SEC) {
            currentSeconds = 0;
            currentIndex = (currentIndex + 1) % playlist.length;
            updatePlayer(true);
        } else {
            updatePlayer(false); // Just update the timer text
        }

        // SAVE TO BROWSER MEMORY
        localStorage.setItem('iptv_index', currentIndex);
        localStorage.setItem('iptv_seconds', currentSeconds);
    }

    function updatePlayer(shouldReload) {
        const vid = playlist[currentIndex];
        const player = document.getElementById('videoPlayer');
        const titleElem = document.getElementById('currentTitle');

        if (shouldReload) {
            let url = "";
            if (vid.type === "vk") {
                url = `https://vkprime.com{vid.id}.html?autoplay=1&mute=1&t=${currentSeconds}`;
            } else if (vid.type === "dm") {
                url = `https://www.dailymotion.com{vid.id}?autoplay=1&mute=true&startTime=${currentSeconds}`;
            }
            player.src = url;
        }

        titleElem.innerText = "PLAYING: " + vid.title;
        
        const rem = ROTATION_SEC - currentSeconds;
        document.getElementById('timerText').innerText = `Next switch in: ${Math.floor(rem/60)}m ${rem%60}s (Progress Saved)`;
    }
</script>
</body>
</html>
