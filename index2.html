<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linear Iframe Player Layout</title>
    <style>
        body { margin: 0; background: #111; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; color: #fff; }
        .video-container { width: 100%; max-width: 800px; padding: 20px; box-sizing: border-box; }
        
        /* The main relative wrapper holding the player items */
        .player-wrapper { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 8px; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; }
        
        /* The Design Trick: A completely transparent shield sitting on top of the iframe */
        .interaction-shield { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999; background: rgba(0,0,0,0); pointer-events: auto; }
        
        .now-playing { margin-top: 15px; text-align: center; font-size: 1.2rem; }
    </style>
</head>
<body>

<div class="video-container">
    <div class="player-wrapper">
        <!-- 1. The structural shield blocking browser-engine touch triggers -->
        <div class="interaction-shield"></div>
        
        <!-- 2. Your native wrapper iframe utilizing sandbox restrictions -->
        <iframe id="linear-iframe" src="about:blank" sandbox="allow-scripts allow-same-origin" allow="autoplay; encrypted-media"></iframe>
    </div>
    <div class="now-playing">
        <span id="show-title">Loading Schedule...</span>
    </div>
</div>

<script>
    // Adjusted test times matching your early morning Victoria clock (1:23 AM)
    const jsonSchedule = {
      "schedule": [
        {
          "title": "Anupama",
          "start": "01:48:00",
          "end": "01:55:00",
          "url": "https://hlsplayers.pages.dev/player2?url=https://s2.videoapne.to/hls/,bdohws7v7bboxuzvta2p4g2ws2khimvq24xbpns7osntfggpd74dnpjxuvna,.urlset/master.m3u8",
        },
        {
          "title": "The Great Indian Kapil Show",
          "start": "01:55:00",
          "end": "02:25:00",
          "url": "https://hlsplayers.pages.dev/player2?url=https://si.videoapne.to/hls/,bdohws6n7bboxuzvta2p4hct3roxtnt3veh2nxklit5prwibjscxjipymnfa,.urlset/master.m3u8"
        }
      ]
    };
const iframe = document.getElementById('linear-iframe');
    const shield = document.getElementById('player-shield');
    const titleEl = document.getElementById('show-title');
    let currentActiveUrl = "";

    // The Click-Through Trick: Drops the shield for 100ms to allow the play trigger
    shield.addEventListener('click', (e) => {
        shield.style.pointerEvents = 'none'; // Temporarily turn off the shield
        
        // Emulate the click exactly where you pressed on the screen
        const elementBehind = document.elementFromPoint(e.clientX, e.clientY);
        if (elementBehind) {
            elementBehind.click();
        }

        // Instantly wrap the shield back over the video after 100 milliseconds
        setTimeout(() => {
            shield.style.pointerEvents = 'auto';
        }, 100);
    });

    // Also catch mobile touch events for absolute compatibility on Samsung Browser
    shield.addEventListener('touchend', (e) => {
        shield.style.pointerEvents = 'none';
        setTimeout(() => {
            shield.style.pointerEvents = 'auto';
        }, 100);
    });

    function timeToSeconds(timeStr) {
        const parts = timeStr.split(':');
        const hrs = parseInt(parts[0], 10) || 0;
        const mins = parseInt(parts[1], 10) || 0;
        const secs = parseInt(parts[2], 10) || 0;
        return (hrs * 3600) + (mins * 60) + secs;
    }

    function checkSchedule() {
        const now = new Date();
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        const seconds = String(now.getSeconds()).padStart(2, '0');
        const currentTimeStr = `${hours}:${minutes}:${seconds}`;
        
        const currentSeconds = timeToSeconds(currentTimeStr);

        const activeSlot = jsonSchedule.schedule.find(slot => {
            const startSec = timeToSeconds(slot.start);
            const endSec = timeToSeconds(slot.end);
            return currentSeconds >= startSec && currentSeconds < endSec;
        });

        if (activeSlot) {
            const targetUrl = activeSlot.url + "&autoplay=true&muted=true";

            if (currentActiveUrl !== targetUrl) {
                currentActiveUrl = targetUrl;
                titleEl.textContent = `Now Playing: ${activeSlot.title}`;
                iframe.src = targetUrl;
            }
        } else {
            titleEl.textContent = "Off Air - No Scheduled Program";
            if(iframe.src !== "about:blank") {
                iframe.src = "about:blank";
                currentActiveUrl = "";
            }
        }
    }

    checkSchedule();
    setInterval(checkSchedule, 2000);
</script>

</body>
</html>
