<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Desi IPTV Hub | Pseudo-Live</title>
    <style>
        :root { --bg-muddy: #353530; --nav-bg: #2b2b27; --text-white: #ffffff; }
        
        /* 1. STRIP OFF SCROLLBARS */
        html, body { 
            height: 100%; 
            margin: 0; 
            overflow: hidden; /* Removes main scrollbar */
            background-color: var(--bg-muddy);
            color: var(--text-white);
            font-family: 'Segoe UI', sans-serif;
        }

        /* 2. LAYOUT STYLING */
        header { background: var(--nav-bg); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #444; }
        .logo { font-size: 1.5rem; font-weight: bold; color: #ff0000; text-decoration: none; }
        .main-content { max-width: 1000px; margin: 20px auto; padding: 0 15px; text-align: center; }
        .player-wrapper { width: 100%; background: #000; border-radius: 8px; position: relative; padding-top: 56.25%; border: 1px solid #444; overflow: hidden; }
        iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        
        /* Start Button for Autoplay Permission */
        #startOverlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .btn { background: #ff0000; color: white; padding: 15px 40px; border-radius: 50px; font-weight: bold; }
    </style>
</head>
<body>

<div id="startOverlay" onclick="syncLiveTV()">
    <div class="btn">ENTER LIVE TV</div>
</div>

<header>
    <a href="#" class="logo">DESI IPTV HUB</a>
    <div style="color:#aaa; font-size: 0.8rem;">Live Sync Active</div>
</header>

<div class="main-content">
    <div class="player-wrapper">
        <iframe id="videoPlayer" allow="autoplay; fullscreen" sandbox="allow-scripts allow-same-origin allow-forms allow-presentation" src="about:blank"></iframe>
    </div>
    <div style="margin-top:15px; text-align:left;">
        <h2 id="currentTitle">Waiting to Sync...</h2>
        <p id="timeInfo" style="color:#888; font-size:0.9rem;"></p>
    </div>
</div>

<script>
    const playlist = [
        { title: "Star Plus - Anupamaa", url: "https://vkprime.com/embed-4yedhlkshnwv.html?autoplay=1&mute=1&rel=0" },
        { title: "Sony TV - CID Special", url: "https://vkprime.com/embed-xkhlust7wikn.html?autoplay=1&mute=1&rel=0 "},
        { title: "Zee TV - Latest", url: "https://www.dailymotion.com&?autoplay=1&mute=1&rel=0    " }
    ];


    const ROTATION_TIME = 8 * 60; // 8 minutes in seconds (480s)
    const TOTAL_PLAYLIST_TIME = playlist.length * ROTATION_TIME;

    function syncLiveTV() {
        document.getElementById('startOverlay').style.display = 'none';
        updatePlayer();
        // Update exactly when the next video is scheduled
        setInterval(updatePlayer, 1000); 
    }

    function updatePlayer() {
        const now = new Date();
        // Global seconds passed today
        const totalSecondsToday = (now.getHours() * 3600) + (now.getMinutes() * 60) + now.getSeconds();
        
        // Find where we are in the total playlist loop
        const currentCyclePosition = totalSecondsToday % TOTAL_PLAYLIST_TIME;
        const videoIndex = Math.floor(currentCyclePosition / ROTATION_TIME);
        const startAtSecond = currentCyclePosition % ROTATION_TIME;

        const currentVideo = playlist[videoIndex];
        const player = document.getElementById('videoPlayer');
        
        // Build URL with specific start time (Seek)
        let finalUrl = "";
        if (currentVideo.type === "vk") {
            // VKPrime uses ?start=XX
            finalUrl = `https://vkprime.com{currentVideo.id}.html?autoplay=1&mute=1&start=${startAtSecond}`;
        } else if (currentVideo.type === "dm") {
            // Dailymotion uses ?start=XX
            finalUrl = `https://www.dailymotion.com{currentVideo.id}?autoplay=1&mute=true&start=${startAtSecond}`;
        }

        // Only refresh the iframe if it's a NEW video index
        if (player.dataset.lastIndex != videoIndex) {
            player.src = finalUrl;
            player.dataset.lastIndex = videoIndex;
            document.getElementById('currentTitle').innerText = "LIVE: " + currentVideo.title;
        }

        // Show countdown to next switch
        const remaining = ROTATION_TIME - startAtSecond;
        document.getElementById('timeInfo').innerText = `Next serial in: ${Math.floor(remaining / 60)}m ${remaining % 60}s`;
    }
</script>

</body>
</html>
